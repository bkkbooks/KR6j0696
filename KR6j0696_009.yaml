body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第九色界天阿難世間一切所修心人不假禪那無有智慧但能執身不行淫欲若行若坐想念俱無愛染不生無留欲界是人應念身為梵侶能戒如是一類名梵衆天超越欲界欲習既除離欲心現於諸律儀愛樂隨順是人應時能行梵德能戒定如是一類名梵輔天超越梵衆身心妙圓威儀不缺清淨禁戒加以明悟是人應時能統梵衆為大梵王能戒定慧如是一類名大梵天超越梵輔阿難此三勝流一切苦惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪阿難其次梵天統攝梵人圓滿梵行澄心不動寂湛生光如是一類名少光天光光相然照耀無盡映十方界遍成琉璃如是一類名無量光天吸持圓光成就教體發化清淨應用無盡如是一類名光音天阿難此三勝流一切憂懸所不能逼雖非正修真三摩地清淨心中粗漏已伏名為二禪疏梵衆即諸天之類離欲所生相念俱無無淫欲之想也梵輔即臣佐之屬溫陵初天但能伏欲此則又得定共戒故能於諸律儀愛樂隨順大梵由前淨心威儀戒行進至於妙圓清淨又加以明悟超達則盛德之至故為梵王疏梵志經大梵依住忍辱溫良是也初禪名離生喜樂地故一切苦惱所不能及四少光天此躡大梵之行以為升進謂前初得定未能生光此則寂湛故名少光五無量光天謂身境俱發故十方界變成琉璃六光音天有教體之用故曰發化教以言音為體名曰光音俱舍云禪天有正思惟等為言説因故如來藏經云九地菩薩具四無礙辨於二千梵中得自在力善説法故二禪名定生喜樂地故憂懸不逼阿難如是天人圓光成音教體披音露妙發成精行通寂滅樂如是一類名少淨天淨空現前引發無際身心輕安成寂滅樂如是一類名無量淨天世界身心一切圓淨淨德成就勝託現前歸寂滅樂如是一類名遍淨天阿難此三勝流具大隨順身心安隱得無量樂雖非正得真三摩地安隱心中歡喜畢具名為三禪七少淨天前天言教此則發成精行故入寂滅樂不事言音為少淨故八無量淨天前天少淨今淨境無量身心二行俱得輕安故九遍淨天前天依身引淨今則身境俱圓勝託現前故俱舍云上流那含唯託勝因往上界故勝因者即純善業行故有往無還大品云菩薩依第四靜慮起空處定故十福生天下天喜樂皆為粗重今既捨之故淨福性生阿難復次天人不逼身心苦因已盡樂非常住久必壞生苦樂二心俱時頓捨粗重相滅淨福性生如是一類名福生天捨心圓融勝解清淨福無遮中得妙隨順窮未來際如是一類名福愛天阿難從是天中有二岐路若於先心無量淨光福德圓明修證而住如是一類名廣果天若於先心雙厭苦樂精研捨心相續不斷圓窮捨道身心俱滅心慮灰凝經五百劫是人既以生滅為因不能發明不生滅性初半劫滅後半劫生如是一類名無想天阿難此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪四禪九天一福愛前天捨有遮限未能圓融今所捨既廣心無所託故勝解清淨二廣果三無想此二悉是三禪取果之處謂廣果無想乃福愛同分所居名二岐路俱以淨光為因而廣果取有故福德圓明無想取空故灰凝心慮初半劫者謂生此天中猶經半劫方得無想俱舍云第四定離內災故説彼名不動然非常住由不共一地相應彼器體非常故阿難此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙忘下無卜居故於捨心衆同分中安立居處阿難苦樂兩滅鬬心不交如是一類名無煩天機括獨行研交無地如是一類名無熱天十方世界妙見圓澄更無塵象一切沉垢如是一類名善見天精見現前陶鑄無礙如是一類名善現天究竟群幾窮色性性入無邊際如是一類名色究竟天五不還天般若云阿那含名為不來即此天故苦樂雙忘者兼指禪天之結皆盡四禪為捨念清淨地名捨心同分俱舍云雜修淨慮有五品不同故生五淨居一無煩者苦樂相傾日以心鬪今既兩滅故云不交二無熱天上云苦樂僅得不交而已今乃研交無地故機括獨行三善見天前無煩熱是於心境得清涼義此既圓澄塵象則法眼清明故得善見四善現天陶鑄者造作之義由機發自然善善現故五色究竟天羣機者即造作性也究竟謂機括允終無復流動即色性窮極與空為鄰入無邊際阿難此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間粗人所不能見阿難是十八天獨行無交未盡形纍自此已還名為色界即此淨居經論多説是如來成正覺處如入大乘論云如來在淨居天成於正覺以福德果報有定處故仁王經云十地菩薩作第四禪大淨天王得理盡三昧同佛行處盡三界原教化衆生入大乘論又云十地菩薩獲如來祕藏得無邊禁呪方術自在無礙作摩兮首羅天為世間依止又云此天有二一淨居摩兮首羅是菩薩鄰於佛地得首楞嚴三昧受佛灌頂登如來地能於世間顯現色身其二謂毗舍摩兮首羅言但有欽聞者釋問經云諸天聞名有天為色究竟願生彼中常得阿那含復次阿難從是有頂色邊際中其間復有二種岐路若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為回心大阿羅漢若在捨心捨厭成就覺身為礙銷礙入空如是一類名為空處諸礙既銷無礙無滅其中唯留阿賴耶識全於末那半分微細如是一類名為識處空色既亡識心都滅十方寂然逈無攸往如是一類名無所有處識性不動以滅窮研於無盡中發宣盡性如存不存若盡非盡如是一類名為非想非非想處此等窮空不盡空理從不還天聖道窮者如是一類名不回心鈍阿羅漢若從無想諸外道天窮空不歸迷漏無聞便入輪轉阿難是諸天上各各天人則是凡夫業果酬答答盡入輪彼之天王即是菩薩遊三摩提漸次增進回向聖倫所修行路阿難是四空天身心滅盡定性現前無業果色從此逮終名無色界此皆不了妙覺明心積妄發生妄有三界中間妄隨七趣沉溺補特伽羅各從其類無色界者顯宗論云無色界中都無方所由生勝劣以於是處得彼定者即彼處生故俱舍云非雜修定上流人隨品品定起噉味心於三無色次第生已復生有頂方入涅槃又云前五淨居那含是毗婆舍那行此是奢摩他行樂定樂慧不同故然佛性論説空界唯有定所生色無業生色故初空處覺身為礙銷礙入空者俱舍云空天唯命意捨三根以無身故二識處以滅色故無礙留識故無滅全末那者猶有執取分別念慮故毗婆沙云意識於無色界有二分別謂隨念自性除計度故三無所有處識性寂然見無攸動便以為滅是以滅研窮也又識性寂然有似於滅故曰若存而實非滅故曰若盡婆沙云外道以此為世間塔以在諸有頂故吳興此等窮空通指凡聖欣厭未盡名不盡空理以未得滅受想定故疏四空既是凡聖通修故從不還天窮者此屬聖流從無想窮者此屬外道外道窮空自無想始也入輪者如頭藍弗得非想定還墜狸身故諸外道天若窮空不止無想壽盡必入空處復次阿難是三界中復有四種阿修羅類若於鬼道以護法力乘通入空此阿修羅從卵而生鬼趣所攝若於天中降德貶墜其所卜居鄰於日月此阿修羅從胎而出人趣所攝有修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿修羅因變化有天趣所攝阿難別有一分下劣修羅生大海心沉水穴口旦遊虗空暮歸水宿此阿修羅因溼氣有畜生趣攝阿難如是地獄餓鬼畜生人及神仙天洎修羅精研七趣皆是昏沉諸有為相妄想受生妄想隨業於妙圓明無作本心皆是空華元無所有一本作著但一虗妄更無根緒阿難此等衆生不識本心受此輪回經無量劫不得真淨皆由隨順殺盜淫故反此三種又則出生無殺盜淫有名鬼倫無名天趣有無相傾起輪回性若得妙發三摩提者則妙常寂有無二無無二亦滅尚無不殺不偷不淫云何更隨殺盜淫事阿難不斷三業各各有私因各各私衆私同分非無定處自妄發生生妄無因無可尋究汝勗修行欲得菩提要除三惑不盡三惑縱得神通皆是世間有為功用習氣不滅落於魔道雖欲除妄倍加虗偽如來説為可哀憐者汝妄自造非菩提咎作是説者名為正説若他説者即魔王説溫陵修羅此云非天福力等天而無天行隨業輕重有四生之異水穴即尾閭也如是下結明業惑由殺盜淫三為根本有是三業則名鬼倫無是三業則名天趣因有而墜因無而升有無相傾起輪回性有無二無言相傾業斷無二亦滅言分別情亡因各各私衆私成同非無定處此答明前經也七辨魔分寄五陰修證禪那為體即時如來將罷法座於師子牀攬七寶几回紫金山再來憑倚普告大衆及阿難言汝等有學緣覺聲聞今日回心趣大菩提無上妙覺吾今已説真修行法汝猶未識修奢摩他毗婆舍那微細魔事魔境現前汝不能識洗心非正落於邪見或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認再見賊為子又復於中得少眼目為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄汝應諦聽吾今為汝子細分別阿難起立并其會中同有學者歡喜頂禮伏聽慈誨佛告阿難及諸大衆汝等當知有漏世界十二類生本覺妙明覺圓心體與十方佛無二無別由汝妄想迷理為咎癡愛發生生發遍迷故有空性化迷不息有世界生則此十方微塵國土非無漏者皆是迷頑妄想安立當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶汝等一人發真歸元此十方空皆悉銷殞云何空中所有國土而不振裂汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通㳷當處湛然一切魔王及與鬼神諸凡夫天見其宮殿無故崩裂大地振坼水陸飛騰無不驚懾凡夫昏暗不覺遷訛彼等咸得五種神通唯除漏盡戀此塵勞如何令汝摧裂其處是故鬼神及諸天魔魍魎妖精於三昧時僉來惱汝然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅氷暖氣漸鄰不日銷殞徒恃神力但為其客成就破亂由於心中五陰主人主人若迷客得其便當處禪那覺悟無惑則彼魔事無奈汝何陰銷入明則彼群邪咸受幽氣明能破暗近自銷殞如何敢留擾亂禪定若不明悟被陰所迷則汝阿難必為魔子成就魔人如摩登伽殊為眇劣彼唯呪汝破佛律儀八萬行中秪毀一戒心清淨故尚未淪溺此乃隳汝寶覺全身如宰臣家忽逢籍沒宛轉零落無可哀救溫陵前法既終當機無問故將罷法座而又攬寶几回金容無問自説者以止觀中微細魔事非一切智莫能辨識能隳寶覺破法王家故須特告乃最後深慈也疏覺圓真體生佛無殊由迷真理隨迷轉化故有漏世界皆迷頑者之所安立非無漏聖人有此相也故一人發真則見其消殞如片雲等言易壞也心精通吻謂寶覺圓融見聞不隔凡夫昏暗故不覺遷訛然彼下言正定勝邪而邪亦勝正是則成就破亂皆由心中五陰主人如魔登伽者舉劣比勝令深防也阿難當知汝坐道場銷落諸念緣念其念若盡則諸離念一切精明動靜不移憶忘如一當住此處入三摩提如明目人處大幽暗精性妙淨心未發光此則名為色陰區宇區局性真若目明朗十方洞開無復幽黯名色陰盡是人則能超越劫濁觀其所由堅固妄想以為其本阿難當在此中精研妙明四大不織少選之間身能出礙此名精明流溢前境斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受群邪阿難復以此心精研妙明其身內徹是人忽然於其身內拾出蟯蛔身相宛然亦無傷毀此名精明流溢形體斯但精行暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心內外精研其時魂魄意志精神除執受身餘皆涉入互為賓主忽於空中聞説法聲或聞十方同敷密義此名精魄遞相離合成就善種暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心澄露皎徹內光發明十方遍作閻浮檀色一切種類化為如來于時忽見毗盧遮那踞天光臺千佛圍繞百億國土及與蓮華俱時出現此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心精研妙明觀察不停抑按降伏制止超越於時忽然十方虗空成七寶色或百寶色同時遍滿不相留礙青黃赤白各各純境此名抑按功力逾分暫得如是非為聖證不作聖心名聖境界若作聖解即受羣邪色陰十魔陰以覆蔽為義故名區宇處於幽暗者色陰未破之相也十魔皆依境起一身能出礙者由觀照力故使精明心與四大身兩不相涉故能出礙此名精明流逸前境指所因也二流逸形體者即精明心內徹於身故蟯蛔可拾三精魄離合者承前流逸通徹之力故精神四大遞相涉入也四靈悟所染者由前四大遞為賓主染此靈悟故見千億佛俱時出現五功力逾分者由觀察過越使精明遍徹故十方虗空現重重色又以此心研究澄徹精光不亂忽於夜半在暗室內見種種物不殊自晝而暗室物亦不除滅此名心細密澄其見所視洞幽暫得如是非為聖證不作聖心名善境界若作聖解即受群邪又以此心圓入虗融四體忽然同於草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木此名塵併排四大性一向入純暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心成就清淨淨心功極忽見大地十方山河皆成佛國具足七寶光明遍滿又見恆沙諸佛如來遍滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受羣邪又以此心研究深遠忽於中夜遙見遠方市井街巷親戚眷屬或聞其語此名迫心逼極飛出故多隔見非為聖證不作聖心名善境界若作聖解即受羣邪又以此心研究精極見善知識形體變移少選無端種種遷改此名邪心含受魑魅或遭天魔入其心腹無端説法通達妙義非為聖證不作聖心魔事消歇若作聖解即受羣邪阿難如是十種禪那現境皆是色陰用心交互故現斯事衆生迷頑不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等當於如來滅後於末法中宣示斯義及現身法無令天魔得其方便保持覆護成無上道疏六密沉其見由定心澄徹精光不亂故暗能見物不除滅者言皆實境也七由排擯力故四體虗融故刀火無損八由厭想日深淨心功極故見十方皆成佛國九由觀照力功用深遠迫心飛出故多隔見十由色盡受現受屬於心故有邪心含受幽魅及種種遷改者皆陰盡之相也阿難彼善男子修三摩提奢摩他中色陰盡者見諸佛心如明鏡中顯現其像若有所得而未能用猶如魘人手足宛然見聞不惑心觸客邪而未能動此則名為受陰區宇若魘咎歇其心離身反觀其面去住自由無復留礙名受陰盡是人則能超越見濁觀其所由虗明妄想以為其本溫陵受以領納前境為義已破色陰內外虗融故見諸佛心如鏡現像然妙體雖具而未能得用受陰消歇則能離身反觀去住無礙也因違順之幻境生損益之妄受此虗明妄想之咎也阿難彼善男子當在此中得大光耀其心發明內抑過分忽於其處發無窮悲如是乃至觀見蚊虻猶如赤子心生憐愍不覺流淚此名功用抑摧過越悟則無咎非為聖證覺了不迷久自消歇若作聖解則有悲魔入其心腑見人則悲啼泣無限失於正受當從淪墜阿難又彼定中諸善男子見色陰消受陰明白勝相現前感激過分忽於其中生無限勇狂躁其心猛利志齊諸佛謂三僧祇無數劫一念能越此名功用陵率驟躁過越悟則無咎非為聖證覺了不迷久則消歇若作聖解則有狂魔入其心腑見人則誇我慢無比其心乃至上不見佛下不見人失於正受當從淪墜又彼定中諸善男子見色陰消受陰明白前無新證歸失故居智力衰微入中隳地逈無所見心中忽然生大枯渴於一切時沉憶不散將此以為勤精進相此名修心無慧自失悟則無咎非為聖證若作聖解則有憶魔入其心腑旦夕撮心懸在一處失於正受當從淪墜又彼定中諸善男子見色陰消受陰明白慧力過定失於猛利以諸勝性懷於心中自心已疑是盧舍那得少為足此名用心忘失恆審溺於知見悟則無咎非為聖證若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失於正受當從淪墜又彼定中諸善男子見色陰消受陰明白新證未獲故心已亡歷覽二際自生艱險於心忽然生無盡憂如坐鐵床如飲毒藥心不欲活常求於人令害其命早取解脫此名修行失於方便悟則無咎非為聖證若作聖解則有一分常憂愁魔入其心腑手執刀劒自割其肉欣其捨壽或常憂愁走入山林不耐見人失於正受當從淪墜受有邪正正受屬定邪受屬魔故失其正受則當從淪墜大光曜者即正受之心明白之境也一摧抑過分發無窮悲示魔事之由也由前色陰皆依境起此獨依心故生悲含受二勇猛精勤生於功用陵率三智力衰微生於無慧自失四疑慮之心生於忘失恆審五憂懸之心生於失其方便又彼定中諸善男子見色陰消受陰明白處清淨中心安隱後忽然自有無限喜生心中歡悅不能自止此名輕安無慧自禁悟則無咎非為聖證若作聖解則有一分好喜樂魔入其心腑見人則笑於衢路傍自歌自舞自謂已得無礙解脫失於正受當從淪墜又彼定中諸善男子見色陰消受陰明白自謂已足忽有無端大我慢起如是乃至慢與過慢及慢過慢或增上慢或卑劣慢一時俱發心中尚輕十方如來何況下位聲聞緣覺此名見勝無慧自救悟則無咎非為聖證若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是疊華肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄地中疑誤衆生入無間獄失於正受當從淪墜又彼定中諸善男子見色陰消受陰明白於精明中圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在此名因慧獲諸輕清悟則無咎非為聖證若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑誤衆生墮阿鼻獄失於正受當從淪墜又彼定中諸善男子見色陰消受陰明白於明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解悟則無咎非為聖證若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常於信心檀越飲酒噉肉廣行淫穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿與酒肉等一種俱空破佛律儀誤入人罪失於正受當從淪墜又彼定中諸善男子見色陰消受陰明白味其虗明深入心骨其心忽有無限愛生愛極發狂便為貪欲此名定境安順入心無慧自持誤入諸欲悟則無咎非為聖證若作聖解則有欲魔入其心腑一向説欲為菩提道化諸白衣平等行欲其行淫者名持法子神鬼力故於末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬魔心生厭離其身體威德既無陷於王難疑誤衆生入無間獄失於正受當從淪墜阿難如是十種禪那現境皆是受陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等亦當將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道疏第六無慧自持生無限喜第七以見勝無慧生大我慢第八以因慧輕清生于輕安第九以空心現前撥無因果第十以愛盡想現故有貪欲之事蓋受相有三則諸境中發為悲哀衰微憂懸者即苦違境也發為勇猛大喜我慢貪欲者順樂境也發為輕安空心疑慮者中容境也想陰十魔阿難彼善男子修三摩地受陰盡者雖未漏盡心離其形如鳥出籠已能成就從是凡身上歷菩薩六十聖位得意生身隨往無礙譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其言此則名為想陰區宇若動念盡浮想消除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁觀其所由融通妄想以為其本疏總敘受空想現以明入位之深故得上歷菩薩六十聖位即從三漸次乃至等妙二覺為六十位故意生身者一名意生法身謂所去迅速猶如意根由離執受超色根故此有三種楞伽謂從三地得正受樂意生身故寱言者即想陰之相謂眼等五根明了不寐想從意生引熏五識故令咸悟其言由是細相妄想故云不自覺知蓋十魔以變化為相貪欲為境由想屬融通故多變化屬煩惱濁故多貪欲成實云一切煩惱皆在第六識中以想行第六故而以眼等為開道故阿難彼善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛圓明鋭其精思貪求善巧爾時天魔候得其便飛精附人口説經法其人不覺是其魔著自言謂得無上涅槃來彼求巧善男子處敷座説法其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或寢暗室身有光明是人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲口中好言災祥變異或言如來某處出世或言劫火或説刀兵恐怖於人令其家資無故耗散此名怪鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄疏一心愛圓明者謂欲圓明諸法以遍知一切由心愛故是以鋭其精思貪求善巧其人不覺是其魔著所謂主人若迷也故十魔皆以心愛而起阿難又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛遊蕩飛其精思貪求經歷爾時天魔候得其便飛精附人口説經法其人亦不覺知魔著亦言自得無上涅槃來彼求遊善男子處敷座説法自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚一衆聽人各各如是得未曾有是人愚迷惑為菩薩淫逸其心破佛律儀潛行貪欲口中好言諸佛應世某處某人當是某佛化身來此某人即是某菩薩等來化人間其人見故心生傾渴邪見密興種智消滅此名魃鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄疏二心愛遊蕩即經歷之事自形無變指魔著之人又此十魔即前貪物為罪怪等十鬼也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛綿㳷澄其精思貪求契合爾時天魔候得其便飛精附人口説經法其人實不覺知魔著亦言自得無上涅槃來彼求合善男子處敷座説法其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易或得宿命或有他心或見地獄或知人間好惡諸事或口説偈或自誦經各各歡娛得未曾有是人愚迷惑為菩薩綿愛其心破佛律儀潛行貪欲口中好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然其人見故洗滌本心易入邪悟此名魅鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄疏三心愛綿㳷即冥合之事潛冥契合皆是妄想未聞法前心即開悟人間好惡亦能有知皆冥契事也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛根本窮覽物化性之終始精爽其心貪求辨析爾時天魔候得其便飛精附人口説經法其人先不覺知魔著亦言自得無上涅槃來彼求元善男子處敷座説法身有威神摧伏求者令其座下雖未聞法自然心伏是諸人等將佛涅槃菩提法身即是現前我肉身上父父子子遞代相生即是法身常住不絶都指現在即為佛國無別淨居及金色相其人信受亡失先心身命歸依得未曾有是等愚迷惑為菩薩推究其心破佛律儀潛行貪欲口中好言眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處彼無知者信是穢言此名蠱毒魘勝惡鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄疏四窮覽物化即本末之事爽精明也然物有本末事有終始但入禪者非今境界徒為魔擾圓覺云非彼所聞終不可取父父子子遞代相生此物化之理也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應周流精研貪求冥感爾時天魔候得其便飛精附人口説經法其人元不覺知魔著亦言自得無上涅槃來彼求應善男子處敷座説法能令聽衆暫見其身如百千歲心生愛染不能捨離身為奴僕四事供養不覺疲勞各各令其座下人心知是先師本善知識別生法愛粘如膠漆得未曾有是人愚迷惑為菩薩親近其心破佛律儀潛行貪欲口中好言我於前世於某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或言別有大光明天佛於中住一切如來所休居地彼無知者信是虗誑遺失本心此名厲鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知入無間獄疏五心愛懸應即遠知之事現身千歲知是先師本善知識此懸應遠知也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛深入剋己辛勤樂處陰寂貪求靜謐爾時天魔候得其便飛精附人口説經法其人本不覺知魔著亦言自得無上涅槃來彼求陰善男子處敷座説法令其聽人各知本業或於其處語一人言汝今未死已作畜生敕使一人於後踏尾頓令其人起不能得於是一衆傾心欽伏有人起心已知其肇佛律儀外重加精苦誹謗比丘罵詈徒衆訐露人事不避譏嫌口中好言未然禍福及至其時毫髮無失此大力鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄疏六心愛深入即深知之事樂處陰寂貪求靜密所以剋深入之功也各知本業未死作畜深入之驗又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛知見勤苦研尋貪求宿命爾時天魔候得其便飛精附人口説經法其人殊不覺知魔著亦言自得無上涅槃來彼求知善男子處敷座説法是人無端於説法處得大寶珠其魔或時化為畜生口䘖其珠及雜珍寶簡策符牘諸奇異物先授彼人後著其體或誘聽人藏於地下有明月珠照耀其處是諸聽者得未曾有多食藥草不餐嘉饌或時日餐一麻一麥其形肥充魔力持故誹謗比丘罵詈徒衆不避譏嫌口中好言他方寶藏皆潛區異事十方聖賢潛匿之處隨其後者往往見有奇異之人此名山林土地城隍川嶽鬼神年老成魔或有宣淫破佛戒律與承事者潛行五欲或有精進純食草木無定行事惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄疏七心愛知見即明見之事得知珠寶及知聖人此明見無疑也宣淫宣談也左傳陳靈公宣淫於朝君臣為謔又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力爾時天魔候得其便飛精附人口説經法其人誠不覺知魔著亦言自得無上涅槃來彼求通善男子處敷座説法是人或復手執火光手撮其光分於所聽四衆頭上是諸聽人頂上火光各長數尺亦無熱性曾不焚燒或水上行如履平地或於空中安坐不動或入瓶內或處囊中越牖透垣曾無障礙惟於刀兵不得自在自言是佛身著白衣受比丘禮誹謗禪律罵詈徒衆訐露人事不避譏嫌口中常説神通自在或復令人旁見佛土鬼力惑人非有真實讚嘆行淫不毀粗行將諸猥媟以為傳法此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅或壽終仙再活為魅或仙期終計年應死其形不化他怪所附年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄疏八心愛神通即變化之事研究化元求變化所由也分火行空踰墻透墉以明神通變化也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛入滅研究化性貪求深空爾時天魔候得其便飛精附人口説經法其人終不覺知魔著亦言自得無上涅槃來彼求空善男子處敷座説法於大衆內其形忽空衆無所見還從虗空突然而出存沒自在或現其身洞如琉璃或垂手足作旃檀氣或大小便如厚石密誹毀戒律輕賤出家口中常説無因無果一死永滅無復後身及諸凡聖雖得空寂潛行貪欲受其欲者亦得空心撥無因果此名日月薄蝕精氣金玉芝草麟鳳龜鶴經千萬年不死為靈出生國土年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄疏九心愛入滅即存沒之事研究化性貪求深空所以致存之理也其形忽空還從空出存歿自在又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲棄分段生頓希變易細相常住爾時天魔候得其便飛精附人口説經法其人竟不覺知魔著亦言自得無上涅槃來彼求生善男子處敷座説法好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物或於一處在一宅中數步之間令其從東詣至西壁是人急行纍年不到因此心信疑佛現前口中常説十方衆生皆是吾子我生諸佛我出世界我是元佛出世自然不因修得此名住世自在天魔使其眷屬如遮文茶及四天王毗舍童子未發心者利其虗明食彼精氣或不因師其修行人親自觀見稱執金剛與汝長命現美女身盛行貪欲未逾年歲肝腦枯竭口兼獨言聽若妖魅前人未詳多陷王難未及遇刑先已乾死惱亂彼人以至殂殞汝當先覺不入輪回迷惑不知墮無間獄疏十心愛長壽以想空入行行為恆審細相變易故有希求永歲之愛乘分段之粗求常住之細此破陰已深故顯理益微他方往還萬里瞬息數步之間纍年不到皆變易之驗也陀羅尼經有遮文茶天毗舍童子即毗舍遮鬼隸四天王已發心則護人未發心則害人以彼定力虗明為則故食其精氣或不因師者不因魔附之師而親見魔現也口兼獨言者間出異言也阿難當知是十種魔於末世時在我法中出家修道或附人體或自現形皆言已成正遍知覺讚嘆淫欲破佛律儀先惡魔師與魔弟子淫淫相傳如是邪精魅其心腑近則九生多逾百世令真修行總為魔眷命終之後必為魔民失正遍知墮無間獄汝今未須先取寂滅縱得無學留願入彼末法之中起大慈悲救度正心深信衆生令不著魔得正知見我今度汝已出生死汝尊佛語名報佛恩阿難如是十種禪那現境皆是想陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等必須將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道疏阿難下總結前經戒勗修證言魔於我法出家者涅槃云末世魔現比丘等像混壞正法非毀戒律是也鎮澄讚曰修羅天道苦樂條然精妍皆是受生淵妄鏡中天法座垂全詳辨陰魔怨傳如截流曰躡前十仙廣明天道斯從勝想得升方乎三惡及以人倫苦樂雖有不同無非生死輪轉結云此等衆生不識本心受此輪回又云精研七趣無非昏沉諸有為相使悟此有為始獲無漏耳上之七趣蓋通明三世因果今詳約當世進修明諸魔境大要務在了達身心本空魔佛一體行人於禪定中所發境界不取則魔亦是佛取著則佛亦是魔如色陰中云斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受群邪此陰境之要旨也助道大分由初卷云衆生無始種種顛倒業種自然如惡叉聚諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬故今杜此多岐正道可階也音釋逈戶頂切貶必斂切勗虛玉切憑音平魑丑知切魅音媚吻音愍坼恥格切懾之涉切眇彌沼切隳呼為切黯乙減切蟯音撓魘於琰切虻眉庚切寱音藝鋭俞芮切耗䐇娛析音昔粘尼占切膠音交謐音密踏徒言切肇音兆誂甫尾切詈音吏訐音結牘音讀饌音撰猥烏賄切媟私列切薄蝕音博食瞬音舜
