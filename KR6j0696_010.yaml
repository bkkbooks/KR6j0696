body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第十辨魔分之二阿難彼善男子修三摩提想陰盡者是人平常夢想銷滅寤寐恆一覺明虗靜猶如晴空無復粗重前塵影事觀諸世間大地山河如鏡鑒明來無所黏過無蹤跡虗受照應了罔陳習唯一精真生滅根元從此披露見諸十方十二衆生畢殫其類雖未通其各命由緒見同生基猶如野馬熠熠清擾為浮根塵究竟樞穴此則名為行陰區宇若此清擾熠熠元性性入元澄一澄元習如波瀾大波滅化為澄水名行陰盡是人則能超衆生濁觀其所由幽隱妄想以為其本疏夜之夢寐即晝之想像想陰盡則覺寐為一塵影既滅故山河如鏡無所分別即虗應而已陳習謂宿習想緣生滅根元行陰體也十方衆生同此生基熠熠恍惚狀也想滅則此心為澄空行現故遊塵清擾於其間識為立命由緒其性元澄行破還元則流習頓滅故為澄水因心所計亦有十魔然行想二魔即見思為體行中諸見有六十二即六十二見釋曰六十二見古德未詳其義遂令百世同迷而經論雖有其名未出其體惟長阿含所說與此經合但義類多含而詮別不一經中之義皆依世界劫量起計故自四遍常至四矯論總十六見為本劫本見從十六我見至五涅槃總四十四見為末劫末見故長阿含以二無因論居本末之間共六十二此經論次第所以各依本起也阿難當知是得正知奢摩他中諸善男子凝明正心十類天魔不得其便方得精研窮生類本於本類中生元露者觀彼幽清圓擾動元於圓元中起計度者是人墜入二無因論一者是人見本無因何以故是人既得生機全破乘于眼根八百功德見八萬劫所有衆生業流灣環死此生彼秪見衆生輪回其處八萬劫外冥無所觀便作是解此等世間十方衆生八萬劫來無因自有由此計度亡正遍知墮落外道惑菩提性二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本竪畜生本橫白非洗成黑非染造從八萬劫無復改移今盡此形亦復如是而我本來不見菩提云何更有成菩提事當知今日一切物象皆本無因由此計度亡正遍知墮落外道惑菩提性是則名為第一外道立無因論一圓元計度為二無因論謂周遍計度本元之因而以乘眼根功德見過去八萬劫者此以方涉世之數而依本劫本見起計故八萬劫外冥無所觀遂計本來無因業流灣環者即人還生人鳥還生鳥也二者見末無因與上義同但觀未來自體依末劫末見起計釋曰阿含以二無因論居四矯論之後在十六我見之前又約自觀宿命起計謂第一無因者有從無想中來自憶前事本無所有第二無因者以世智觀察作如是計釋曰諸見皆有定心世智二相以依根本後得二境故阿難是三摩中諸善男子凝明正心魔不得便窮生類本觀彼幽清常擾動元於圓常中起計度者是人墜入四遍常論一者是人窮心境性二處無因修習能知二萬劫中十方衆生所有生滅咸皆循環不曾散失計以為常二者是人窮四大元四性常住修習能知四萬劫中十方衆生所有生滅咸皆體恆不曾散失計以為常三者是人窮盡六根末那執受心意識中本元由處性常恆故修習能知八萬劫中一切衆生循環不失本來常住窮不失性計以為常四者是人既盡想元生理更無流止運轉生滅想心今已永滅理中自然成不生滅因心所度計以為常由此計常亡正遍知墮落外道惑菩提性是則名為第二外道立圓常論二圓常計度為四遍常論此遍常論為四者一觀心境二觀四大三觀八識四觀陰理總計為常名四遍常又阿含四遍常論約觀劫量起計一能憶二十成敗劫二能憶四十成敗劫三能憶八十成敗劫四以自智觀察世間並計彼我皆常名四遍常又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於自他中起計度者是人墜入四顛倒見一分無常一分常論一者是人觀妙明心遍十方界湛然以為究竟神我從是則計我遍十方凝明不動一切衆生於我心中自生自死則我心性名之為常彼生滅者真無常性二者是人不觀其心遍觀十方恆沙國土見劫壞處名為究竟無常種性劫不壞處名究竟常三者是人別觀我心精細微密猶如微塵流轉十方性無移改能令此身即生即滅其不壞性名我性常一切死生從我流出名無常性四者是人知想陰盡見行陰流行陰常流計為常性色受想等今已滅盡名為無常由此計度一分無常一分常故墮落外道惑菩提性是則名為第三外道一分常論三自他計度為顛倒論有四一者所觀以湛寂之理為常生滅之性無常二者別觀恆沙國土謂三禪以下為三災所壞名無常性四禪以上三災不及名究竟常三者觀心精細流轉即細相生滅四者以陰行流性為常色受想為無常又阿含顛倒論約觀天人起計一以梵天為常衆生無常二以戲樂命終者為無常餘者為常三以失意變滅者為無常四以自智觀世間計常無常名四顛倒論又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於分位中生計度者是人墜入四有邊論一者是人心計生元流用不息計過未者名為有邊計相續心名為無邊二者是人觀八萬劫則見衆生八萬劫前寂無聞見無聞見處名為無邊有衆生處名為有邊三者是人計我遍知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性四者是人窮行陰空以其所見心路籌度一切衆生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊由此計度有邊無邊墮落外道惑菩提性是則名為第四外道立有邊論四分位計度為有邊論有四者一以觀過未有分位為有邊相續無分位名無邊二觀無聞見處其境叵測名無邊有聞見處其境可了名有邊三者觀我遍知之性其知無涯名無邊彼所觀者其境有極為無邊四者於密移中觀造化性故計一身半生半滅即以生為有邊滅為無邊又阿含四有邊者約觀世界起計其初二三以四方上下為有邊無邊第四以自智觀世間計有邊無邊又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於知見中生計度者是人墜入四種顛倒不死矯亂遍計虗論一者是人觀變化元見遷流處名之為變見相續處名之為恆見所見處名之為生不見見處名之為滅相續之因性不斷處名之為增正相續中中所離處名之為減各各生處名之為有互互亡處名之為無以理都觀用心別見有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減於一切時皆亂其語令彼前人遺失章句二者是人諦觀其心互互無處因無得證有人來問唯答一字但言其無除無之餘無所言說三者是人諦觀其心各各有處因有得證有人來問唯答一字但言其是除是之餘無所言說四者是人有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰由此計度矯亂虗無墮落外道惑菩提性是則名為第五外道四顛倒性不死矯亂遍計虗論五知見計度為四種矯論此由分別境相立知見名字第一約解總觀八境故知見多端報答不定二三約證偏觀一境故唯見一義第四於有無雙觀報答矯亂此四知見第一圓知二三遍詖第四折中又阿含四種矯論約觀因果起計異問異答一者善惡之報異問異答二者他世有無異問異答三何者善惡異問異答四以愚冥暗鈍異問異答已上十六見每論前三皆以定意三昧現證後一以捷疾相智觀察即從真立俗之義又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於無盡流生計度者是人墜入死後有相發心顛倒或自固身云色是我或見我圓含遍國土云我有色或彼前緣隨我回復云色屬我或復我依行中相續云我在色皆計度言死後有相如是循環有十六相從此或計畢竟煩惱畢竟菩提兩性並驅各不相觸由此計度死後有故墮落外道惑菩提性是則名為第六外道立五陰中死後有相心顛倒論六無盡計度有十六相者經標四計兼出其因一者謂由計色是我故自固其身二者由見我性遍含故計我有色三者由見前緣隨我故計色屬我四者由見諸行相續故計我在色并受想行三亦如是計為十六見寶積經論云我者謂主宰性我所者謂五陰性又阿含十六我見約觀來世生處有想起計即末劫末見一者謂我終後生有色有想二者生無色有想三者生亦有色亦無色有想四者生非有色非無色有想五者生有邊有想六者生無邊有想七者生亦有邊亦無邊有想八者生非有邊非無邊有想九者生有樂有想十者生有苦有想十一者生亦有樂亦有苦有想十二者生非有樂非有苦有想十三者生唯有一想十四者生有若干想十五者生有少想十六者生有無量想又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於先除滅色受想中生計度者是人墜入死後無相發心顛倒見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性銷散縱有生理而無受想與草木同此質現前猶不可得死後云何更有諸相因之勘校死後相無如是循環有八無相從此或計涅槃因果一切皆空徒有名字究竟斷滅由此計度死後無故墮落外道惑菩提性是則名為第七外道立五陰中死後無相心顛倒論七前滅計度有八相者溫陵曰陰性消散謂色受想滅也生理即行陰此以四陰現在因亡未來果滅因果合論故成八相疏阿含云或有沙門婆羅門於末劫末見生無想論謂我終後生有色無想有生無色無想有生亦有色亦無色無想有生非有色非無色無想有生有邊無想有生無邊無想有生亦有邊亦無邊無想有生非有邊非無邊無想是為八見又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於行存中兼受想滅雙計有無自體相破是人墜入死後俱非起顛倒論色受想中見有非有行遷流內觀無不無如是循環窮盡陰界八俱非相隨得一緣皆言死後有相無相又計諸行性遷訛故心發通悟有無俱非虗實失措由此計度死後俱非後際昏瞢無可道故墮落外道惑菩提性是則名為第八外道立五陰中死後俱非心顛倒論八存滅計度有八相者謂前三已滅故色受想中見有非有後一猶存故行遷流內觀無不無前後雙觀有無俱非故成八相即非有色受想行非無色受想行也阿含八俱非論者謂有沙門婆羅門於末劫末見生非想非非想論謂我此終後生有色非有想非無想有生無色非有想非無想有生亦有色亦無色非有想非無想有生非有色非無色非有想非無想有生有邊非有想非無想有生無邊非有想非無想有生亦有邊亦無邊非有想非無想有生非有邊非無邊非有想非無想是為八見又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後無生計度者是人墜入七斷滅論或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅如是循環窮盡七際現前銷滅滅已無復由此計度死後斷滅墮落外道惑菩提性是則名為第九外道立五陰中死後斷滅心顛倒論九後無計度為七斷滅論者阿含云或有沙門婆羅門於末劫末見起斷滅論總有七見或計我身從因緣生必歸磨滅或計我於欲天斷滅或計我於色天斷滅或計我於無色界空處斷滅或計我於識處斷滅或計我於不用斷滅即無所有處或計我於有想無想處斷滅是為七見又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後有生計度者是人墜入五涅槃論或以欲界為正轉依觀見圓明生愛慕故或以初禪性無憂故或以二禪心無苦故或以三禪極悅隨故或以四禪苦樂二亡不受輪回生滅性故迷有漏天作無為解五處安隱為勝淨依如是循環五處究竟由此計度五現涅槃墮落外道惑菩提性是則名為第十外道立五陰中五現涅槃心顛倒論阿難如是十種禪那狂解皆是行陰用心交互故現斯悟衆生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄汝等必須將如來語於我滅後傳示末法遍令衆生覺了斯義無令心魔自起深孽保持覆護銷息邪見教其身心開覺真義於無上道不遭枝岐勿令心祈得少為足作大覺王清淨標指十後有計度為五涅槃論者以行盡還元故取五種果唯欲界具根塵識故觀見圓明而生愛樂阿含云於現在法生泥洹論盡入五見中謂有說我於現在五欲自恣是現在泥洹或以初禪為現在泥洹或以二禪為現在泥洹或以三禪為現在泥洹或以四禪為現在泥洹是為五見又云若沙門婆羅門於末劫末見皆入此四十四見中或有於本劫本見盡八十六見中或有於本劫本見末劫末見盡入六十二見中唯有如來知此見處如是執如是持其所知亦復過是雖知不著是為如來微妙大法光明釋曰此六十二見世尊亦如是知如是見但不執著耳蓋外道以知見立知故成見網如來以知見無見故成菩提所以結云墮落外道惑菩提性又總論諸見所起者大毗婆沙云梵網經說六十二見以身見為本依等起說故師子吼經說種種異見皆依有無約推求說故釋曰法華云若有若無等依止此諸見具足六十二即推求義也又若統論諸見所起不出五利使此即唯識之說故涅槃經云身邊邪見戒取見取是五見主六十二見識陰十魔阿難彼善男子修三摩提行陰盡者諸世間性幽清擾動同分生機倐然隳裂沉細綱紐補特伽羅酬業深脉感應懸絶於涅槃天將大明悟如雞後鳴瞻顧東方已有精色六根虗靜無復馳逸內外湛明入無所入深達十方十二種類受命元由觀由執元諸類不召於十方界已獲其同精色不沉發現幽祕此則名為識陰區宇若於群召已獲同中銷磨六門合開成就見聞通鄰互用清淨十方世界及與身心如吠琉璃內外明徹名識陰盡是人則能超越命濁觀其所由罔象虗無顛倒妄想以為其本溫陵通敘行滅識現也行為世間遷流之體性擾動生機之綱紐衆生酬業之深脉故行陰盡者生機綱紐倐然隳裂酬業深脉感應懸絶而涅槃性天將大明悟矣疏識為受命之元行窮識現故深達命元六根虗盡無復馳逸即生機不擾也行陰遷流不出根境之法由感應懸絶故內外湛明諸類不召故入無所入十方世界已獲其同即越異生之性也由消磨六門故合開成就由見聞通鄰故六塵不隔而諸根互用矣然識為還元之地故諸乘於此妄立因依而取果證總成十魔阿難當知是善男子窮諸行空於識還元已滅生滅而於寂滅情妙未圓能令己身根隔合開亦與十方諸類通覺覺知通㳷能入圓元若於所歸立真常因生勝解者是人則墮因所因執娑毗迦羅所歸冥諦成其伴侶迷佛菩提亡失知見是名第一立所得心成所歸果違遠圓通背涅槃城生外道種一因所因執溫陵識由行流故行空則還元然即以此為真所歸地而立為真因故墮因所因執疏密嚴經云阿賴耶識是諸聖人現法樂住三昧之境人天等趣諸佛國土悉以為因常與諸乘而作種性即此義也阿難又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸覽為自體盡虗空界十二類內所有衆生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅現無邊身成其伴侶迷佛菩提亡失知見是名第二立能為心成能事果違遠圓通背涅槃城生大慢天我遍圓種二能非能執執識元為自體而謂一切衆生自此流出遂執我能生彼而實不能也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸有所歸依自疑身心從彼流出十方虗空咸其生起即於都起所宣流地作真常身無生滅解在生滅中早記常住既惑不生亦迷生滅安住沈迷生勝解者是人則墮常非常執計自在天成其伴侶迷佛菩提亡失知見是名第三立因依心成妄計果違遠圓通背涅槃城生倒圓種三常非常執以識元為所歸依故疑彼能生我及一切法遂計生起流出之地為真常之體此在生滅中妄計常住既惑真不生性又迷現生滅法也故密嚴云外所執勝性微塵自在時等悉是清淨阿賴耶識又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所知知遍圓故因知立解十方草木皆稱有情與人無異草木為人人死還成十方草樹無擇遍知生勝解者是人則墮知無知執婆吒霰尼執一切覺成其伴侶迷佛菩提亡失知見是名第四計圓知心成虗謬果違遠圓通背涅槃城生倒知種四知無知執所知即識元也謂識有知而一切法由知變起因計知體圓遍諸法遂謂無情有知無所揀擇又善男子窮諸行空已滅生滅而於寂滅精明未圓若於圓融根互用中已得隨順便於圓化一切發生求火光明樂水清淨愛風周流觀塵成就各各崇事以此羣塵發作本因立常住解是人則墮生無生執諸迦葉波并婆羅門勤心役身事火崇水求出生死成其伴侶迷佛菩提亡失知見是名第五計著崇事迷心從物立妄求因求妄冀果違遠圓通背涅槃城生顛化種五生無生執疏由於根互用中得圓融性於是計一切法皆能生化故崇火事水愛風觀塵為圓化之因異生勝果又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓明計明中虗非滅羣化以永滅依為所歸依生勝解者是人則墮歸無歸執無想天中諸舜若多成其伴侶迷佛菩提亡失知見是名第六圓虗無心成空亡果違遠圓通背涅槃城生斷滅種六歸無歸執溫陵觀理不諦誤墮虗妄故於圓明性中計皆虗無於是絶滅羣化歸於永滅因以空為歸又善男子窮諸行空已滅生滅而於寂滅精明未圓若於圓常固身常住同於精圓長不傾逝生勝解者是人則墮貪非貪執諸阿斯陀求長命者成其伴侶迷佛菩提亡失知見是名第七執著命元立固妄因趣長勞果違遠圓通背涅槃城生妄延種七貪非貪執識精元明湛不搖處名之為常今見其常乃執色身同於精元身本無常實不可貪空長勞耳又善男子窮諸行空已滅生滅而於寂滅精妙未圓觀命互通却留塵勞恐其銷盡便於此際坐蓮華宮廣化七珍多增寶媛恣縱其心生勝解者是人則墮真無真執吒枳迦羅成其伴侶迷佛菩提亡失知見是名第八發邪思因立熾塵果違遠圓通背涅槃城生天魔種八真非真執以識陰為命元互通三際識陰若盡我命亦盡故化諸欲境以留塵勞不令消盡自以為真又善男子窮諸行空已滅生滅而於寂滅精妙未圓於命明中分別精粗疏決真僞因果相酬唯求感應背清淨道所謂見苦斷集證滅修道居滅已休更不前進生勝解者是人則墮定性聲聞諸無聞僧增上慢者成其伴侶迷佛菩提亡失知見是名第九圓精應心成趣寂果違遠圓通背涅槃城生纏空種九定性聲聞疏依識明理曰命明謂生滅由識精粗由業依四諦法分別決擇以苦集為粗僞滅道為精真專修道因求感滅果居滅即休即不前進名定性聲聞日明經云畏苦厭身志存泥洹墮阿羅漢又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融清淨覺明發研深妙即立涅槃而不前進生勝解者是人則墮定性辟支諸緣獨倫不回心者成其伴侶迷佛菩提亡失知見是名第十圓覺㳷心成湛明果違遠圓通背涅槃城生覺圓明不化圓種十定性辟支妙圓真體惑習俱盡名清淨覺明於寂妙中極其本真發研深妙以此為果名定性辟支故日明經云著佛身相不達善權中道而止墮緣覺道然此識陰總統八識而八識者是諸乘根本故於此中通敘聲聞辟支諸修證法故密嚴云佛及諸菩薩悉是賴即名佛及辟支聲聞見理無怯人所觀皆此識阿難如是十種禪那中途成狂因依迷惑於未足中生滿足證皆是識陰用心交互故生斯位衆生頑迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提大妄語成外道邪魔所感業終墮無間獄聲聞緣覺不成增進汝等存心秉如來道將此法門於我滅後傳示末世普令衆生覺了斯義無令見魔自作沈孽保綏哀救銷息邪緣令其身心入佛知見從始成就不遭岐路如是法門先過去世恆沙劫中微塵如來乘此心開得無上道識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨琉璃內含寶月如是乃超十信十住十行十回向四加行心菩薩所行金剛十地等覺圓明入直入無漸次於如來妙莊嚴海圓滿菩提歸無所得此是過去先佛世尊奢摩他中毗婆舍那覺明分析微細魔事魔境現前汝能諳識心垢洗除不落邪見陰魔銷滅天魔摧碎大力鬼神褫魄逃逝魑魅魍魎無復出生直至菩提無諸少乏下劣增進於大涅槃心不迷悶若諸末世愚鈍衆生未識禪那不知說法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼呪若未能誦寫於禪堂或帶身上一切諸魔所不能動汝當恭欽十方如來究竟修進最後垂範阿難下總結前經金剛乾慧等者結修證也此禪那所修不歷諸位故超信等直入妙莊嚴海成就普賢行也八結經分阿難即從座起聞佛示誨頂禮欽奉憶持無失於大衆中重復白佛如佛所言五陰相中五種虗妄為本想心我等平常未蒙如來微細開示又此五陰為併銷除為次第盡如是五重詣何為界惟願如來發宣大慈為此大衆清明心目以為末世一切衆生作將來眼佛告阿難精真妙明本覺圓淨非留死生及諸塵垢乃至虗空皆因妄想之所生起斯元本覺妙明真精妄以發生諸器世間如演若多迷頭認影妄元無因於妄想中立因緣性迷因緣者稱為自然彼虗空性猶實幻生因緣自然皆是衆生妄心計度阿難知妄所起說妄因緣若妄元無說妄因緣元無所有何況不知推自然者是故如來與汝發明五陰本因同是妄想疏真精妙明下復明遣妄即禪那之餘以雙擯因緣自然令情空理寂結一經之大致蓋終而不泯則歸塗扶疏所以指五妄根本泯其歸寄阿難下言五陰虗妄為本想心此問生起因緣又此五陰為併消除為次第盡此問還滅因緣佛告下破因緣自然之情釋曰按經論釋因緣義略有多種顯宗論云因謂能生緣能長養由因攝助因方能生生已相續緣力長養或因惟一緣乃衆多又因不共共者是緣如眼如色又作自事名因作他事名緣又因能引起緣以任持又近名因遠名緣因者能生緣者能辨又正有義名因能助顯發義名緣因親緣疏故因緣中觀疏數廣又自然者或名自性或名自相或名自體或名自法或名自覺等汝體先因父母想生汝心非想則不能來想中傳命如我先言心想醋味口中涎生心想登高足心酸起懸崕不有醋物未來汝體必非虗妄通倫口水何如因談醋出是故當知汝現色身名為堅固第一妄想即此所說臨高想心能令汝形真受酸澀由因受生能動色體汝今現前順益違損二現驅馳名為虗明第二妄想由汝念慮使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想化理不住運運密移甲長髮生氣銷容皺日夜相代曾無覺悟阿難此若非汝云何體遷如必是真汝何無覺則汝諸行念念不停名為幽隱第四妄想又汝精明湛不搖處名恆常者於身不出見聞覺知若實精真不容習妄何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後忽然覆覩前異記憶宛然曾不遺失則此精了湛不搖中念念受熏有何籌算阿難當知此湛非真如急流水望如恬靜流急不見非是無流若非想元寧受想習非汝六根互用開合此之妄想無時得滅故汝現在見聞覺知中串習幾則湛了內罔象虗無第五顛倒微細精想一堅固妄想為受身因緣溫陵想為虗妄影像欲愛深脉遺體自想愛中流出陰心乘想愛冥求酢梅等說以驗體因妄結故與妄理相應也二虗明妄想為違順因緣臨高空想而酸澀真發違順皆妄而損益現馳融通妄想為形取因緣念慮者虗情色身者實質虗實不倫而能相使者由想融之也幽隱妄想為體遷因緣密移非汝云何體遷若即汝體自應有覺精微妄想為串習因緣吳興見聞為精明動用為常體以識無所存遍在諸根諸根對境用在無記未起善惡之先皆精明之體佛恐衆生計此為常故以習妄為破疏精明者識性澄湛之體也住精明則澄空滯寂廢建化之門即識陰未破所謂坐竿頭之人也故佛說為非真令破陰顯智免纏空之見入起行之門阿難是五受陰五妄想成汝今欲知因界淺深唯色與空是色邊際唯觸及離是受邊際唯記與忘是想邊際唯滅與生是行邊際湛入合湛歸識邊際此五陰元重疊生起生因識有滅從色除理則頓悟乘悟併銷事非頓除因次第盡我已示汝劫波巾結何所不明再此詢問汝應將此妄想根元心得開通傳示將來末法之中諸修行者令識虗妄深厭自生知有涅槃不戀三界五受陰亦名五取陰然有簡別俱舍云是有取說名陰有但陰非取謂無漏有為釋曰唯識云佛果報身有為無漏以非惑業所生故俱舍云此中以惑為取陰從取生故名取陰如草糠火或陰屬取名取陰如王臣湛入合湛者上湛六識湛精下湛八識湛體六湛精明元八識所分今既入合妙湛兩湛相冥是其邊際阿難若復有人遍滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度於意云何是人以此施佛因緣得福多不阿難答言虗空無盡珍寶無邊昔有衆生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充遍皆施珍寶窮劫思議尚不能及是福云何更有邊際佛告阿難諸佛如來語無虗妄若復有人身具四重十波羅夷瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷能以一念將此法門於末劫中開示未學是人罪障應念銷滅變其所受地獄苦因成安樂國得福超越前之施人百倍千倍千萬億倍如是乃至算數譬喻所不能及阿難若有衆生能誦此經能持此呪如我廣說窮劫不盡依我教言如教行道直成菩提無復魔業佛說此經已比丘比丘尼優婆塞優婆夷一切世間天人阿修羅及諸他方菩薩二乘聖仙童子并初發心大力鬼神皆大歡喜作禮而去若復下校量福勝盈寶奉施不如將此法門開示末劫此名流通之益也俱舍云分別種種法門皆為弘持若正說者佛正教法便住世間所以者何頌曰大師世眼久已閉堪為證者多散滅不見真理無制人由鄙尋思亂聖教釋曰堪為證者謂佛正教法由多散滅故不能引證如惟則師引天台釋悉檀云悉遍也檀施也而天台亦無所據乃取思大之說而思大之說亦非引證之言此皆文獻可徵而不徵之咎也又如清涼以五蘊約三世釋六十二見由不引教乃以尋思為斷遂有彼失故茲著疏釋例皆引聖言而為證量鎮澄讚曰楞嚴海會阿難因緣摩登伽女意牽纏光攝世尊前顯性拔還唱誦利人天真鑑偈曰稽首本師說法主異口同音諸世尊佛頂顯密首楞嚴即非十界如來藏圓通本尊觀自在各入圓明衆聖賢三尊威力默加持祕旨微言令開發注釋不違於本意始終語脉得融通契機契理契佛心於佛智海同消滴倘獲管窺符聖意流通緣具速傳持見聞現未結良因同證聞熏不思議傳如截流曰如是法門先過去世界恆沙劫中微塵如來乘此心開得無上道識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨琉璃內含寶月如是乃超十信十住十行十回向四加行心菩薩所行金剛十地等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得知菩提尚不可得何況他物能達斯旨羣魔自息矣言從互用能入菩薩金剛乾慧此通指金剛之智不獨指信前為乾慧故言如是乃超十信等位又言菩薩所行金剛十地細研超及行字知乾慧通徹諸位甚明前云經文錯綜者以此魔境之後重請修斷五陰諸相答文其要云理須頓悟乘悟併銷事非頓除因次第盡故佛責言我已示汝劫波羅巾何所不明再此詢問汝應將此妄想根元心得開通者明自利也傳示將來末法之中令識虗妄者明利他也深厭自生知有涅槃不戀三界者明功用也正宗止此下惟廣明勝益結勸弘持為流通分耳是經始緣阿難不了佛身非色聲亦非聲致登伽淫躬幻呪之所轉佛乃因其發心徵其心因其見相辨其見以至四科七大至於盡經重請五陰盡相曾未外此是故能了頂光化佛色聲本幻如是則摩登在夢受轉者其誰耶噫大佛頂之為教也亦至矣當於現量一體形教以及文言可也又悟象忘言今截流意也皇明天啓元年秋九月重陽日告竣音釋殫音丹緒音序熠羊入切樞昌朱切灣烏關切孽魚列切綴陟衛切秉音丙媛于願切霰蘇見切褫勑爾切串古患切題楞嚴疏解後佛弟子極聰明者莫如阿難大凡聰明之人極是誤事何以故惟聰明生意見意見一生便不忍捨割𨓏𨓏溺于愛河欲海者皆極聰明之人阿難惟聰明之極不忍捨割直至迦葉時方得度為第二祖然必待迦葉力擯不與話言又待大衆星散視之如仇故阿難慌忙無措及至無可奈何之極然後捨却從前見解方乃印可迦葉傳法為第二祖設使阿難猶有一毫聰明可倚何以悟此妄身其微如塵其幻如漚其不溺于愛河欲海者幾希故佛說楞嚴無非為阿難聰明難捨開方便門種種曉諭直使還其本來面目真于愛河欲海中接引援拔也陸象山有言此理與溺于利欲之人即易入與溺于意見之人言難入人謂象山之學近禪豈謂是歟不知學無禪儒妄自分別此有宋諸儒不唯意見用事亦多利欲昏心試參楞嚴必不妄生分別打破異同古閩樂純思白父撰
