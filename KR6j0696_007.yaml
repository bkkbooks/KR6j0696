body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第七二結壇取證阿難汝問攝心我今先説入三摩地修學妙門求菩薩道要先持此四種律儀皎如氷霜自不能生一切枝葉心三口四生必無因阿難如是四事若不遺失心尚不緣色香味觸一切魔事云何發生若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶薩怛多般怛羅無上神呪斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所説心呪且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢彼尚淫女無心修行神力冥資速證無學云何汝等在會聲聞求最上乘決定成佛譬如以塵揚於順風有何艱險若有末世欲坐道場先持比丘清淨禁戒要當選擇戒清淨者第一沙門以為其師若其不遇真清淨僧汝戒律儀必不成就戒成已後著新淨衣然香間居誦此心佛所説神呪一百八遍然後結界建立道場求於十方現住國土無上如來放大悲光來灌其頂阿難如是末世清淨比丘若比丘尼白衣檀越心滅貪淫持佛淨戒於道場中發菩薩願出入澡浴六時行道如是不寐經三七日我自現身至其人前摩頂安慰令其開悟溫陵內攝為要故宣説妙門先持四律四律潔淨則枝葉不生緣塵不偶而魔事潛消正定可入疏其次不能斷結是宿疾深重故須神呪冥資使業障輕微則惑根漸伏摩訶薩怛多般怛囉此云大白傘蓋即無見頂相也大白傘蓋陀羅尼經翻梵語云一切如來頂髻中出白傘蓋佛母餘無能總持持是矣言摩登伽宿世因緣恩愛習氣者按摩登女經阿難既反女啼不止續念阿難隨至寺門佛使追呼問曰汝逐阿難何索女言我聞阿難無婦我又無夫佛言阿難沙門無髮汝寧剃頭女歸白母已許剃髮佛問汝愛阿難何等答曰我愛阿難眼愛阿難耳愛阿難口愛阿難鼻佛言阿難眼中但有淚耳中但有垢口中但有唾鼻中但有涕身中但有屎尿有夫妻者便有惡露惡露中生子有子便有死有死便有啼哭是身何益汝何所愛女聞是語便自正心即得阿羅漢道佛言是摩登女先時五百世為阿難婦常相敬重常相貪愛於今夫妻相見如兄如弟故同於我經戒中得道今言由於神呪是冥資之功也淨戒為師則真精陰速故感佛放光來灌其頂誦呪百八表百八煩惱也阿難白佛言世尊我蒙如來無上悲誨心已開悟自知修證無學道成末法修行建立道場云何結界合佛世尊清淨軌則佛告阿難若末世人願立道場第一築臺先取雪山大力白牛食其山中肥膩香草此牛唯飲雪山清水其糞微細可取其糞和合栴檀以泥其地若非雪山其牛臭穢不堪塗地別於平原穿去地皮五尺以下取其黃土和上栴檀沈水蘇合薰陸金白膠青木零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地方圓丈六為八角壇二規製壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉取八圓鏡各安其方圍繞華鉢鏡外建立十六蓮華十六香爐三供養間華鋪設莊嚴香爐純燒沈水無令見火取白牛乳置十六器乳為煎餅并諸砂糖油餅乳糜蘇合蜜薑純酥純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩每以食時若在中夜取蜜半升用蘇三合壇前別安一小火爐以兜樓婆香煎取香水沐浴其炭然令猛熾投是酥蜜於炎爐內燒令煙盡享佛菩薩行人所修不獲由無始宿障故須結壇若佛來應則可證入夫壇為建設之基信為入道之本雪山白牛表純淨大力茹退遺餘則內實真淨二相和合理信冥會也香以達信必十種者圓達之相除地為場封土為壇理圓事方壇有八角方圓丈六表四果四向由十六心見道也此壇取數蓋依阿闍黎法大教王經云四法十六法八法并十二阿闍黎事業彼等成就法所謂表法者經云信解心為線稱分量所作以智慧絣量住三業觀想十二肘量作四方與四隅四門四樓閣謂結壇有佛菩薩等法及喝姹等法各有肘量之數彼經云阿闍黎者一依其教不得相違即前淨戒僧為師者是華以開覺水表真理此華在中表根本妙觀四忍四智為大圓鏡次以十六蓮華食器者即十六心理智之表也信力真純名燒沉水真智內冥名無見煙令其四外遍懸幡華於壇室中四壁敷設十方如來及諸菩薩所有形像應於當陽張盧舍那釋迦彌勒阿閦彌陀諸大變化觀音形像兼金剛藏安其左右帝釋梵王烏芻瑟摩并藍地迦諸軍茶利與毗俱胝四天王等頻那夜迦張於門側左右安置又取八鏡覆懸虗空與壇場中所安之鏡方而相對使其形影重重相涉於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恆於六時誦呪圍壇至心行道一時常行一百八遍第二七中一向專心發菩薩願心無間斷我毗奈耶先有願教第三七中於十二時一向持佛般怛羅呪至第七日十方如來一時出現鏡交光處承佛摩頂即於道場修三摩地能令如是末世修學身心明淨猶如琉璃阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就從三七後端坐安居經一百日有利根者不起于座得須陀洹縱其身心聖果未成決定自知成佛不謬見之真而守之固汝問道場建立如是當陽正位張盧舍那者即佛部主觀音等即賢聖部主烏芻瑟摩等金剛部主頻那夜迦天神部主如密部廣説也蓋壇局闍黎之法以致其精位置八部之聖以會其通故三七日禮佛稱名誦毗尼而發大願以明三業交勤冥資密剋經云身語心三種此名為祕密諸佛菩薩等此名為集會當知所用法祕蜜數如是鏡交光處則生佛智照摩頂之次則感應冥會即於此中修三摩提獲得身心明淨猶如琉璃則德合涅槃而奢摩他之體顯矣安居百日證須陀洹則前交光佛現即是此中得果前相三説呪冥加阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故