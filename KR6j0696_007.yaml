世來未及懺悔若能讀誦書寫此呪身上帶持若安住處莊宅園館如是積業猶湯銷雪不久皆得悟無生忍次明勸持有七種功德一若諸世界下明書寫功德二若我滅後下明讀誦功德樺皮貝葉等者言隨遇而書無簡擇也世間金銀草木等皆有毒氣唯誦呪能銷滅也三當知是呪下明擁護功德精心陰速者擁呪金剛以妙精明冥發神識也第一劫者發心之初至後身者成佛時也四是善男子下明供養功德五阿難下明滅罪功德比丘以犯四波羅夷戒為四棄比丘尼以破八不敬法為八棄唯持此呪能銷滅之故勸令受持也復次阿難若有女人未生男女欲求孕者若能至心憶念斯呪或能身上帶此悉怛多般怛羅者便生福德智慧男女求長命者即得長命欲求果報速圓滿者速得圓滿身命色力亦復如是命終之後隨願往生十方國土必定不生邊地下賤何況雜形阿難若諸國土州縣聚落飢荒疫癘我復刀兵賊難鬬諍兼餘一切厄離之地寫此神呪安城四門并諸支提或脫闍上令其國土所有衆生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地一切災厄悉皆銷滅阿難在在處處國土衆生隨有此呪天龍歡喜風雨順時五穀豐殷兆庶安樂亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢阿難是娑婆界有八萬四千災變惡星二十八大惡星而為上首復有八大惡星以為其主作種種形出現世時能生衆生種種災異有此呪地悉皆銷滅十二由旬成結界地諸惡災祥汞不能入是故如來宣示此呪於未來世保護初學諸修行者入三摩地身心泰然得大安隱更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害汝及衆中諸有學人及未來世諸修行者依我壇場如法持戒所受戒主逢清淨僧於此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語何等激勸何等𢢪切六若有女人下明隨求功德七若諸國土下明息災功德支提佛國脫闍幢也災異有八謂飢荒疫癘刀兵財難鬪諍風雪刑罰及災變惡星也夫日月失其行則薄蝕為妖風雨非其時則毀拆為災五星失其行則周國受殃此反常逆理由人所致則天以變應之也故誅暴則多飄風枉法則多蟲螟殺不辜則國赤地令不收則多淫雨言八萬四千者則周天列宿也二十八星為周天之經八大者乃循經之緯即羅計孛兼五星也順應為福逆則為災故謂之災變惡星今以呪力消禳故反違從吉所有厄難悉皆消滅是故如來下明感通功德言父母生身得心通者此現應之符也説是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所説我當誠心保護如是修菩提者爾時梵王并天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏復有無量山神海神一切土地水陸空行萬物精祇并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事爾時八萬四千那由他恆河沙俱胝金剛藏王菩薩在大會中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩提正修行者世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒衆常當隨從侍衛此人縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外除彼發心樂修禪者世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恆令此人所作如願總顯護持之力已上羣靈皆獲本妙心能建大義故用二方便或逆或順而作利益釋曰案經中每言呪功之益蓋誦持者而寡於獲效則是傳授失真未識其義故密部持誦自有作法苟非其事雖玄無益今讀尊那菩薩儀軌所誦大明本唯一呪隨事施用即有不同如誦云唵引左隸祖隸尊禰若作息災法則云莎訶作增益法則云冒沙吒作愛敬法則云南無作調伏法則云弱呬吽發吒作勾召法則云紇哩作發遣法則云吽此持誦不同之一也所祀聖像又多不一如畫頻那夜迦天像或二臂六臂至十六臂者各有所表也或用旃陀羅摩登伽舍以至人香五辣之法皆因其所宜而施非可訾也又持明人或慈或威種種不一如數珠之一事若作禁止法則水晶為珠作信受法赤檀為珠作降伏法木槵為珠必取珠日皆有時方宿曜種種各異如加持之法或用菖蒲檀木白芥子等而諸部真言亦各有異如蓮華灌頂部等語言章句又有清濁呼吸之差若稍存訛略即呼召不相應故謂之真言者乃五部聖賢本語也此非口授難明理不可以玄妙通知明矣故圓通顯密之説自謂徹祕密之閾欲冀感通獲效恐無此理修證分之二文三初十二類生阿難即從座起頂禮佛足而白佛言我輩愚純好為多聞於諸漏心未求出離蒙佛慈誨得正熏修身心快然獲大饒益世尊如是修證佛三摩提未到涅槃云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩作是語已五體投地大衆一心佇佛慈音瞪瞢瞻仰爾時世尊讚阿難言善哉善哉汝等乃能普為大衆及諸末世一切衆生修三摩提求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝説阿難大衆合掌刳心默然受教佛言阿難當知妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃二轉依號疏此中第二修證亦因前經第二發心之文以世界相涉顯本功德故此問明修行地位亦約衆生世界宣明十二類生之因乃至三種漸次成就五十菩提所以酬發心第二義也問中初乾慧地即斷惑所顯如實之性信住行向及四加行名四十四心從此見道得修行目歡喜已去名為十地十地之後名為等覺佛言下答修證之由所謂生滅真妄菩提涅槃皆名相者也妙性之中本來無有由迷悟相因故有修有證於是轉不覺而依菩提轉生死而依涅槃故有二依名字欲修正受先識妄因故談衆生世界二種顛倒所以明流轉之本示類生之緣也阿難汝今欲修真三摩地直詣如來大涅槃者先當識此衆生世界二顛倒因顛倒不生斯則如來真三摩地阿難云何名為衆生顛倒阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸衆生疏阿難下釋有為諸相性明心即性覺妙明之心性明圓即無不遍明之性因明發性即照了之性起也由妄明而發妄覺因妄性而有妄相於是從無相真成有相妄此衆生世界所由始也所有即生相生相本無所因故以非因而為所因住相本唯妄住故皆了無根本此所謂衆生世界之相有為生滅之體也今釋有為依三種差別謂因果及識俱舍云意識相應貪瞋慢能遍行三世五識相應貪瞋慢唯系自世以是別相惑故由此義故建立三世諸有為相疏今初釋有為體者婆娑云有為之法以生住異滅為體俱舍云有三有為相謂生住異滅又婆娑云有為以四義安立世相一約類安立二約相安立三約分位安立四約相待安立又有四種差別一依覺慧觀察差別二依色相觀察差別三依剎那相續差別四依分位差別釋曰由上諸義婆沙於此立宗説三世是有故云若人説一切有宗決定應許去來世有以依三世皆定實有故許是説一切有宗若人唯説現在及未來世未與果故説無未來及過去世已與果業彼可許為分別説部疏次釋有為剎那者毗婆沙云有為之法一剎那中俱有三相以作用異故故不相違顯宗論破云如體不同用有別故執所相外無別生等一一剎那有四相者如斯過失不可救療釋曰毗沙恐執世相故約作用有異而立四相同時顯宗恐破世相故依體性立三世有異而俱舍則有三義釋成三世有異及四相同時俱無有礙故論云有別義故生即是滅謂色生色滅有別義故別生別滅謂未來生現世滅有別義故世生正生世所攝故從現世生未來世不同剎那故疏三辨有無者謂有為之法性相二宗各有所立譬喻論師云諸有為法非實有體毗婆沙師為破彼執諸三世俱有釋曰譬喻師説非有者是約性説婆沙師説俱有者是約相説經云性妄見生生即相也又云從畢竟無成究竟有者性相義也故二論各據為破立也然經意欲顯此體非有非無故總以妄見破性相之二見毗婆沙云言非生非滅者此顯有為本唯是妄迷本圓明是生虗妄妄性無體非有所依將欲復真欲真已非真真如性非真求復宛成非相非生非住非心非法展轉發生生力發現熏以成業同業相感因有感業相滅相生由是故有衆生顛倒阿難云何名為世界顛倒是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成三世四方和合相涉變化衆生成十二類是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉是故世間聲香味觸窮十二變為一旋復乘此輪轉顛倒相故是有世界卵生胎生溼生化生有色無色有想無想若非有色若非無色若非有想若非無想疏此明還滅之相言將欲復真者除真如外凡有修證皆屬於妄故曰已非非生非住牒性見妄生住所住相也非心非法牒非真求復宛成非相也生力發明示感業之事生即是果力即是業熏即遠業之惑如現在生身由過去業力之所發明復由現在起惑重引未來之果故婆娑云有為者屬因屬緣因緣和合有生滅相取果與果墮在三世有前後際有上中下既非真性常住故有三世遷流三世和合故變化衆生成十二類也然類生之體略有七義一名二義三情四合五業六緣七果一名者按俱舍陳云衆生唐名有情有情即類生也二義者顯宗論云言類生者是衆生義三情者謂衆生依情立名不依趣顯宗云趣雖有情而非遍故此唯情遍獨立生名四合者謂衆生由業由緣合生顯宗云業緣合起故説為生亦無有緣而得生起五業者謂有唯業生顯宗云彼業力強不待緣故六緣者謂從緣生立名顯宗云有緣卵等從卵標名名卵生等七果者謂依現果立生名婆沙云若受欲界果者名欲界有情等是故下結明業惑果三因動有聲動即業力六亂妄想即是惑類是有世界卵生胎生等者即果類也阿難由因世界虗妄輪回動顛倒故和合氣成八萬四千飛沉亂想如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞由因世界雜染輪回欲顛倒故和合滋成八萬四千橫豎亂想如是故有胎遏蒲曇流轉國土人畜龍仙其類充塞由因世界執著輪回趣顛倒故和合暖成八萬四千翻覆亂想如是故有溼相蔽尸流轉國土含蠢蠕動其類充塞由因世界變易輪回假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南流轉國土轉蛻飛行其類充塞疏卵以想緣合業妄動名動顛倒飛沈唯氣即動業之力也故感卵為緣生為魚鳥胎因情有雜染欲情也以滋漫橫豎故緣胎而為人畜濕唯緣合執著趣赴所趣無定故合濕為緣生為蠢蠕化以虗假不待於緣由業力強故變易轉蛻此四生者以業緣俱勝相合為類故分四種由因世界留礙輪回障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞由因世界銷散輪回惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散銷沈其類充塞由因世界罔象輪回影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞由因世界愚純輪回癡顛倒故和合頑成八萬四千枯稿亂想如是故有無想羯南流轉國土精神化為土木金石其類充塞有色者由緣偏勝從果立生精耀留礙即業果之色也故有休咎吉凶之殊如爝火蚌珠之類無色者銷散陰隱如四空之類以業力強不待緣故有想者唯業所生故罔象虗無由想結沈凝不待緣合而精明為鬼無想者以情業劣故愚鈍頑癡此但由緣故為金石土木此四生者以緣業偏勝相離為類故分為四種由因世界相待輪回偽顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞由因世界相引輪回性顛倒故和合呪成八萬四千呼召亂想由是故有非無色相無色羯南流轉國土呪詛厭生其類充塞由因世界合妄輪回罔顛倒故和合異成八萬四千回互亂想如是故有非有想相成想羯南流轉國土彼蒲盧等異質相成其類充塞由因世界怨害輪回殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞是名衆生十二種類次非有色成色者以無待有偽為因依彼業力微故必假於緣如水母等須蝦為目非無色無色者以有引無呼召成體由緣業俱微故受生時必資乎呪詛非有想成想者彼業微故妄取他緣如彼蒲盧無為蜂想業緣微故附異成蜂非無想成想者以妄想心附離他緣如土梟附塊破鏡毒果子成害母多有想心此四生者以緣業俱微附離成化故分為四種已上類生之屬但依緣業有厚薄感果有勝劣故三四十二以是為差唯佛世尊能窮衆生輕重業性將明流轉之因故云顛倒之性也鎮澄讚曰堅持淨戒建立壇場頂光神呪大敷揚修道事功亡頂禮慈王更演後佳章傳如截流曰廣明菩薩行相令持四種律儀皎如氷霜自不能生一切枝葉者益萬行雖多此為根本今人果能不緣色香味觸魔事自銷奈何宿習所牽則心齊于諸佛暮則行歉乎下凡聞見愈多惑業愈熾非假神呪之功畢竟無由解脫今明建壇誦呪能克聖果化佛為不思議佛呪為不思議法壇為不思議境淨戒諸侶為不思議人同如是人發如是心入如是境行如是法獲如是果決定無疑呪有勝益故天龍八部一切鬼神發願擁護受持之者得無魔事末世捨呪心而談楞嚴者徒益多聞耳行者勉之以上理行既備若不開聖位其何以顯證果之相初卷云心言直故如是乃至終始地位中間永無諸委曲相今須詳明是故請云云何名為乾慧之地四十四心至何漸次得終行目詣何方所名入地中云何名為等覺菩薩然問辭列漸次於諸位之中蓋先令知三漸次以通含諸位故也佛將示諸聖位次先示衆生世界二顛倒因者性顛別故轉菩提為煩惱則成十二類生性不顛倒轉生死為涅槃則成六十聖位此為迷悟之源不可不辨指要而言性明元心瞥起妄明能覆所覆皆為無住本此無住建立世界及諸衆生若了無住則知妄本無依真亦不有一欲復真斯為顛倒之本而十二類生肇焉是故世界因動有聲至六亂妄想成業性故十二區分由此輪轉者此明依正妄織為十二類生生起之本也是故世間聲香味觸窮十二變為一旋復者重結依報之中三世四方和合相涉能變有情成十二之數也色聲香味為能變即世界之本世界宛轉相涉為十二數旋復即宛轉義下云乘是輪轉顛倒相故是有世間卵生等如是則不可以窮十二變之能變為所變耳十二類生各各具十二顛倒者以同一理性彼彼互具也天台所明現起之一名事造餘冥伏者為理具具無所具全一覺體若以六即收之所謂理即是也由生類即佛故可進修一聞理即便為名字今三漸次中自除其助因刳其正性此屬觀行相似二即文自父母肉身不須天眼自然觀見十方至宿命清淨得無艱險此屬相似即第三違其現業是又躡前觀行相似二位進明分證耳文云反流全一六用不行者即圓伏五住同前觀行位也十方國土皎然清淨至一切如來密圓淨妙皆現其中者此見思先斷同前相似位也是人即獲無生法忍者此從十信超入初住無明初破為分證位也從是漸修安立聖位指分證位中當位升進之相非直接乾慧之位也以乾慧之文合前者欲愛乾枯根境不偶同前反流全一六用不行之義執心虗明純是智慧慧性圓明瑩十方界同前十方國土皎然清淨等義若作未破見思即屬觀行將成之相若作見思已破即同十信位中相似之相今乾慧既居十信之前當直作觀行位釋然十卷有云從互用中能入菩薩金剛乾慧乃至云如是乃超十信十住等者斯是經文錯綜非謂六根互用始入信前乾慧耳此後信住行向乃至等覺諸位無不屬此金剛觀察之觀故後文云至等覺已是覺始獲金剛心中初乾慧地不言妙覺之中獲者圓滿菩提歸無所得故也今自乾慧至妙覺重以六即定之者乾慧以前凡夫本具聖位是理即從此得聞為名字即乾慧為觀行即十信為相似即十住至等覺為分證即妙覺為究竟即也經始自乾慧終至妙覺為單復十二者逐位別開為單每位具十曰復故十信十住十行十向十地為五復乾慧暖頂忍世第一等妙為七單以單七復五數為十二解如長水經云是種種地皆以金剛觀察十種深喻奢摩他中用諸毗婆舍那清淨修證漸次深入觀察乃心之異名也更詳皆以二字亦應曰至等覺已是覺始獲金剛心中初信二信乃至十地今云是覺始獲金剛心中初乾慧地者猶云發心究竟二不別非等覺心中別有一乾慧也華嚴明善財童子始謁文殊終會文殊旨不異此又云漸次深入則知漸次通貫諸位不可以三漸次直接乾慧地也如是皆以三增進故善能成就五十五位真菩提路以諸位之中遞遞增進由觀行之相似由相似之分證由分證之究竟又非截三漸次居乾慧之前耳單七復五共五十七今云五十位真菩提路者乾慧非真妙覺非路止五十五解如吳興音釋澡音早軌古委切膩乃計切膠音交糜忙皮切釤斯鑒切怛當割切步逮切跢丁箇切揭居列切剌盧達切毖音祕瓢步宵切嚂呼覽切叱昌栗切儜女耕切赭音者啒音骨菟音兔握劬勿切𤙖虗今切罌音鶯謎莫計切粹音邃枳音紙叉音詣姥莫補切堙音因昵尼質切鉗巨淹切憚徒按切迄許勿切盎烏浪切辮皮典切樺胡化切氎音疊詛莊切厭邀琰切蠱音古磣初錦切癘音利闍視遮切杻勑九切械音戒刳音枯邏郎個切蠢尺尹切蠕乳尹切蛻音稅稿音考蝦虛加切梟音澆塊音快
