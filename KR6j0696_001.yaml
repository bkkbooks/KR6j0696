body:
  text: 鋟楞嚴緣起遲日間居白雲封戶黃巖之擊竹成風晦堂之華香盈座忽跫然履聲有客啓扉而入兀坐良久嘆曰人生駒隙終日忙忙究竟何如余漫應之曰腰紫紱肘黃金如是足矣客不應余復謂之曰生前簡白死後翰青如是止矣客曰嘻吾所謂究竟不有人生一大涅槃乎余未解客亦逡巡而退越數日取楞嚴讀之乃後知一切事法莫不有究竟吾夫子所云生知學知困知安行利行勉行歸根到知之一成功一皆一切究竟法人患不學耳學者併心一路則即利即鈍即漸即頓何上乘人下乘人之別溫陵老人曰導達禪乘決擇正見觀心主人曰廣含法界細剖鄰虗是楞嚴杜旁門塞岐路皈依一切究竟法作明心了性之真詮然旨奧義繁世又多鈍根學必先漸入舍注疏蔑證真詮茫茫大海中舍寶筏誰登彼岸矇朧兩眼舍金針孰轉雙瞳澄法師誠度河之寶筏撥眼之金針矣余維是手加披閲廣譯窮搜採天如之會解摘真光之正脈薈天都之標指葺觀心之參標益以雲棲祖之摸象繼以天台師之截流若長水孤山溫陵醉季吳興憨山等法師不下數十家盈篇纍牘展卷燦然一新世界法眼庀工鳩材歷春夏而告成倐焉金颷薦冷玉露橫秋閉關偃息焚香結趺坐莊誦楞嚴數過客復叩關請曰子悟究竟法乎法一也子作出世法屏除妄想脫離幻相從此明心了性蓮華日日現前子作入世法斷却因循二字從此竿頭更進皂囊白簡功垂青史拾紫如拾芥耳余霍然而解與客晤對終日天啓元年七月上弦日吳興天池居士凌弘憲叔度父識刻楞嚴經標指序余師事宣尼氏遊心古文辭見謂六經渾渾噩噩聖人之言哉丘明艷而則其文皮國策辨而詭其文宕屈平幽而怨其文激莊周宏而肆其文奇韓非辨而刻其文達馬班博而裁其文雄由漢以前百氏諸書雖言人人殊大都洋洋纚纚正正奇奇秉六經而建旗鼓靡不俯首顏行扶服奔奏見謂千古勝遊至矣盡矣蔑有尚矣然皆世間諦耳非出世諦也楞嚴出世諦也有有無無有無無有幽奇幻怪不可為名辟太虗空其來無首其去無尾聲為萬籟色為百昌在目滿目在耳盈耳去者成故來者成新彼虗空體何有何無何名何相故高如須彌表可測也深如瀛渤渡可窺也莊嚴如浮幢華可飾也幻如偃師巧可造也音如迦陵聲可寫也隱見出沒如蜃樓如化城影可望也若乃不表而高不度而深非華而嚴無巧而幻見弗以影音弗以聲非有非無誰為名相世儒執有卑者專舊守殘用塗耳目其次繡為鞶帨用博世資即百氏未遊其籓何暇論乎六籍之外夫雕玉為楮孰與造化之巧棘刺為猴孰與形性之工丘樊而遊孰與四虗之達故有方內遊有方外遊今人拘於冥室中目無見耳無聞愀然不樂也穿穴隙見雨零則快然而嘆之況出室坐堂見日月光乎見日月光肆然而喜況登泰山履石封視天都若蓋江河若帶萬物在其間乎登泰山尚曠然而樂又況旁日月挾宇宙電為鞭策雷為車輪縱志舒節遊太虗空其為樂豈不大哉百氏六籍方之內也楞嚴方之外也遊方之外遊之至也遊方之內遊之不至也雖然無世間心其操不實無出世想其趣不高實則高之高則實之其説蓋出于儒世之讀楞嚴者皆出世想也循經則辭奧循傳則義繁兩者俱無當焉故離為章節句讀以直剖古人之心既融通部之意以分支又融通支之意以分章既融通節之意以分句又融通句之意以標義要使血脈流通按經絡之微茫而不慁神情注結定孔輪之幽眇而有常既如常山之蛇首擊尾應又如照妖之鏡形現神彰掃千年之蕪穢噓萬古之神光豈謂能遊亦唯是百家六籍外更有如來寶藏昱耀乎天壤間者故願寓目焉以為宣尼左袒云萬歷丙午春佛出世日新安俞王言臯如著楞嚴摸象記引如經所言有諸盲人羣手摸象其摸鼻者云象如箕其摸股者云象如柱其摸尾者云象如其摸腹者云象如石乃至模眼則云如鼓風橐摸耳則云如倒垂葉摸蹄則云如覆地杯人執所摸互相是非觀者捧腹今日談經何以異是佛已涅槃咨詢無繇出情識手為想像摸彼此角立如盲譏盲豫實慨焉知己亦盲救弊為急因入盲侶與衆同摸唯首楞嚴於諸經中更多疑義由是諸盲競共鼓噪交臂攢指莫可誰何爰取是經百有餘則略為剖析以例全帙昔佛弟子各陳己見佛謂衆言汝等所説皆非我意然各當理足以利物則彼羣摸除悖理者以理而摸雖不得象未嘗非象故不患摸唯執是患若虗其中不主先入會文切理理協文順厥旨自彰象之為象躍如卓如不於摸外別得一象如執所摸堅壁自持摸之彌勤失之彌遠秪增戲論成謗法咎則何益矣此特教事其談禪者為摸尤甚或有摸馬謂是象者或有摸空謂是象者或有俱摸謂一切處咸是象者或於一切摸之不得謂無象者種種異見未易更僕願諸仁者反摸其眼得具眼已象不須摸萬歷三十年歲次壬寅千佛澡浴日後學雲棲寺沙門袾宏書于翠竹山房姓氏譯天竺沙門般剌密帝譯語烏萇國沙門彌伽釋迦筆授菩薩戒弟子前正議大夫同中書門下平章事房融證譯羅浮沙門懷迪證疏西蜀沙門界澄以上墨本會譯資中法師弘沇真際法師崇節𭬥李法師洪敏長水法師子璿孤山法師智圓吳興法師仁嶽泐潭法師曉月溫陵法師戒環師子林沙門惟則師子窟沙門鎮澄京都沙門真鑑吳興沙門廣莫觀心居主人王應乾天都居士俞王言憨山禪師德清以上朱解訂解雲棲沙門袾宏總論天台沙門傅如參考點釋天池居士凌弘憲以上黛解閲正玉華山人徐武獨孤子高繼賢𧓍菴居士施扆賓盛山山人盛文明旦菴主人凌啓康天目山人凌惇德五老山人凌汝標廣成子凌元爌雲秋山人凌雲堯光山人凌元燦科經蓮池謂序正流通三分溫陵長水所定略同而正宗中開為見修證結助五科亦甚當理初見道分從阿難啓請以至宣勝義中真勝義性使行人最初明見自己常住真心以為修行準的也二修道分從初心二決定義以至宣説神呪使行人依真見而起真修不于心外別有造作也三證道分從云何名為乾慧之地以至方盡妙覺成無上道使行人知因真果正因地不真果招迂曲也四結經分從何名此經至汝當奉持使行人知五種名義攝今題二十字中也五助道分從地獄七趣以至微細魔事使行人正助交資乘戒雙急則能速到薩婆若海也中間細科或小不同亦無大礙後學只須遵古不必別立新科增益繁碎為得其解余用是當與衆共遵之凡例是經墨刻悉遵澄師證疏參考諸本間有差脫未敢竄改但以黛刻標于其上而下則或或以指明之是經朱刻大槩開闡法王神髓搜集諸師議論以補證疏之缺略間有字句未盡者則又細注于旁以備玄覽是經黛解訂人宏師摸象間有詞章繁蔓略刪字句以存大意別有管見諸師所未及者更低一字以備參稽經中諸師直稱名者尊佛之意如儒書集注集説通稱名也經中綱領及要問處俱用節目及要答處俱用經中大段絡則用小分界則用經中開演透悟神會處則用譯語精美明露處則用經中綱領節目外有旁分縷悉處則用經中句逗則用疏中證經明透亦俱用未見佛雖名為讚是名為謗既見佛思作是讚實無可讚不可讚不可説不可思議是故名為佛人文子摹是象已乞居士重摹摹象而作讚語居士實無所讚因説偈曰法本法無法無法法亦法今付無法時法法何曾法懌迦付法迦葉迦葉付法阿難如是如是是即為讚𧓍庵居士施扆賓焚香寫大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第一疏經有五名題中存三而略其二謂大方廣等是諸部通稱今名取別故題從簡言大佛頂者表於尊勝兼明密呪從頂説故溫陵曰覺王示之以大法使不迷於小徑而默得乎無外之體喻之以佛頂使不滯於相見而妙極乎無上之致疏如來者按經云本如來藏妙真如性即般若所謂諸法如義也今言密因即指衆生本覺之心諸佛因此以成菩提所以名為如來密因因心本具隱而未顯曰密修證顯了受稱從果則名如來故如來名通因通果有性有修從因趨果名菩薩萬行以果通因則曰如來梵語首楞嚴涅槃翻一切事究竟即大定之名也一緣起分文四如是我聞一時佛在首序佛所居室羅筏城祇桓精舍與次序佛所與大比丘衆千二百五十人俱皆是無漏內冥中道不漏落取相不取相二邊大阿羅漢佛子住持三序諸比丘之德善超諸有能於國土成就威儀從佛轉輪妙堪遺囑嚴淨毗尼弘開擴範師範三界欲界色界無色界應身無量度脫衆生拔挩起濟接過未來越諸塵纍四序諸比丘坐次其名曰大智舍利弗摩大訶目犍連采菽氏摩訶拘絺羅大膝富樓那彌多羅尼子滿慈子須菩提優婆尼沙陀等而為上首五序諸菩薩坐次復有無量辟支無學并一本作並其初心同來佛所屬諸比丘休夏自恣自夏至秋開律放遊三日十方菩薩咨問決斷心疑欽敬奉侍慈恩嚴威將求密義即時如來敷座宴安為諸會中宣示深奧法筵清衆得未曾有聞所未聞迦陵仙音遍十方界恆沙菩薩來聚道場文殊師利而為上首初集衆歎德疏言無漏者即總嘆衆德由盡漏故名阿羅漢佛地論云由勝教力彼聖道生名為佛子即住所得法任持無失名佛子住持諸有者即業惑果三有漏之法也能於下嘆敘別德清嚴可畏軌範行人名成就威儀稟佛遺言能建大義名妙堪遺囑乃至淨尸羅而作範示應身以度生此則智悲俱運積功長劫故能拔濟未來而超諸塵纍也辟支迦羅此云獨覺俱舍云盡智生時名為無學惟作利他事故中阿含謂自恣為從解脫即受夏解制恣任所如之意故阿難別請遠遊未還而十方菩薩已集道場也迦陵鳥即烏鳳之屬桂海虞衡志烏鳳如鳳鳴清越如笙簫妙合宮商能為百蟲之音故經中每比於佛音時波斯匿王為其父王諱忌日營齋請佛宮掖其處則內自迎其迎則親如來廣設其設則廣珍羞其羞別珍無上妙味其味則妙兼復親延其伴則同諸大菩薩城中復有長者齒德爵兼隆居士清淨自居同時飯僧佇佛來應佛敕文殊分領菩薩及阿羅漢應諸齋主唯有阿難先受別請遠遊未還不遑僧次既無上座及阿闍黎途中獨歸其日無供即時阿難執持應器鉢於所遊城次第循乞心中初求最後檀越施主以為齋主無問淨穢剎利尊姓貴而淨者及旃陀羅賤而穢者方行等慈不擇微賤發意圓成一切衆生無量功德阿難已知如來世尊訶斥責須菩提及大迦葉為阿羅漢心不均平欽仰如來開闡無遮度諸疑謗經彼城隉無水之地徐步郭門嚴整威儀肅恭齋法二誤墮所由疏仁王經波斯匿名月光德行十地諱日者曲禮云卒哭而諱謂諸矦既葬七月有祭于庭廟謂之卒哭乃命於宮中捨故而諱新無敢稱名故匿王以其日設齋恭延聖衆所以資先王之靈也宮掖者按唐志及宋元宮殿録掖皆為掖垣掖門而非內庭蓋云宮城也溫陵上座阿闍黎律制僧遠出侶須三人一上座一軌範所以嚴行止防誤失也又法華云入里乞食將一比丘亦防戒之意最後檀越謂未飯僧者平等之慈於己等心而化令彼等心而施所以圓成衆生無量功德若登伽者即穢而賤而阿難既無揀擇故誤墮之阿難下敘平等之意須菩提捨貧從富大迦葉捨富從貧一謂貧者植因一謂富者易施故如來訶之欲令心無遮限以息不均之疑謗疏齋法者分衛經云一切賢聖欲濟貧苦故入聚落當乞食時乃至入無城想見無人想故阿難嚴整威儀肅恭此法爾時阿難因乞食次經歷淫室娼家遭大幻術外道妖術摩登伽女以娑毗迦羅先梵天呪攝入淫席淫躬撫摩將毀戒體如來知彼淫術所加齋畢旋歸王及大臣長者居士俱來隨佛願聞法要于時將毀未毀之時世尊頂放百寶無畏群邪並伏光明光中出生千葉寶蓮有佛化身結跏趺坐疊足而坐宣説神呪敕文殊師利將呪往護惡呪銷滅如從夢醒提獎阿難及摩登伽歸來淫心頓歇佛所三説呪往救為度親因明經勝義故以摩登而為發起按摩登女經言誤墮之事佛在王舍城阿難行乞有女子汲水母名摩登阿難從女乞水女便隨阿難視阿難所止處歸告其母啼泣委臥欲嫁阿難其母不得已乃以蠱道縛阿難入室阿難不肯就臥處母持阿難將入火中佛知此已即遣神脫阿難乃其事也又首楞嚴三昧經亦有魔界密迹將顯摩登宿因非此經莫能救度故以之為緣浚發大教謂彼經中當説法時魔王將行惱亂有菩薩名魔界行不汙入於魔宮時魔諸女於菩薩各起欲心菩薩知其夙緣可度化作天身與其從事因而得度阿難見佛頂禮以頭至地悲泣恨無始受生之初來一向多聞未全道力見非故起淫愛但是力不勝邪殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便於時復有恆沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨佛告阿難汝我同共本氣情均天倫兄弟當初發心於我法中見何勝相頓捨世間深重恩愛阿難白佛我見如來三十二相勝妙殊絶形體映徹猶如琉璃常自思惟此相非是欲愛所生何以故欲氣粗濁腥臊交遘膿血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落佛言善哉阿難汝等當知一切衆生從無始來生死相續皆由不知常住無出無入真心性淨明體用諸妄想此想不真故有輪轉汝今欲研細究無上菩提真發明性應當直心酬一本作酬我所問十方如來同一道故出離生死不墮輪轉皆以直心心言直故如是乃至終始地位中間永無諸委曲相皆以直心證入阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂阿難白佛言世尊如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死四發起經宗阿難下敘多聞無功所以發進修之旨奢摩他等三觀乃此經修行之法蓋十方如來因修此法得成菩提而初心入之必有方便言最初者即未獲正觀所有初心也吳興曰阿難既厭多聞而欣妙定如來欲談實相先詰妄緣故問發心見相之由為止散入寂之本疏佛言下示迷真之由由迷真淨故有妄輪此指阿難見相發心乃生死攀緣之性也體性堅凝不涉塵妄名常住真心妙圓離垢無諸昏昧名性淨明體此經中所談之妙性故佛於此紉玄立極而印定經宗也然華嚴淨印言發心者亦由見佛相好而楞嚴三昧亦以愛樂為緣應知此經將顯真心實際對簡扳緣之體非不以見相之故而發起菩提也故淨印經云見相發心有其四種一者初發心菩薩見相莊嚴而得清淨二者修行位菩薩觀佛功德心得清淨三者不退轉位菩薩觀佛法身而得清淨四者補處位菩薩無法可觀亦非無觀離於二邊而發心故應當直心酬我所問者淨印經云發心者無有諂誑其心正直此所謂出離生死皆以真心也如是乃至終始地位者言皆以是心而證入也二方便分大科六初徵心文七佛告阿難如汝所説真所愛樂因於心目若不識知心目所在則不能得降伏塵勞染污擾亂譬如國王為賊所侵發兵討除是兵要當知賊所在使汝流轉心目為咎吾今問汝唯心與目今何所在阿難白佛言世尊一切世間十種異生同將識心居在身內縱觀如來青蓮華眼亦在佛面我今觀此浮根四塵秪在我面如是識心實居身內佛告阿難汝今現坐如來講堂觀祇陀林今何所在阿難言世尊此大重閣清淨講堂在給孤施園建舍檀越之名園今祇陀林實在堂外阿難汝今堂中先何所見阿難言世尊我在堂中先見如來次觀大衆如是外望方矚林園佛告阿難汝矚林園因何有見阿難言世尊此大講堂戶牖開豁故我在堂得遠瞻見爾時世尊在大衆中舒金色臂摩阿難頂告示阿難及諸大衆有三摩提正定名大佛頂首楞嚴無上一切究竟堅固心王具足萬行各門修證十方如來一門千經共由超出妙莊嚴路汝今諦聽阿難頂禮伏受慈旨佛告阿難如汝所言身在講堂戶牖開豁遠矚園林亦有衆生在此堂中不見如來見堂外者阿難答言世尊在堂不見如來能見林泉無有是處佛告阿難汝亦如是汝之心靈一切明顯了若汝現前所明了心實在身內爾時先合了知內身頗有衆生先見身中後觀物外縱不能見心肝脾胃爪生髮長筋轉脈搖誠合明了如何不知必不內知云何知外是故應知汝言覺了能知之心住在身內無有是處一推在內前已開宗次當顯義將夷道梗為沮心怨故推七處攀緣以為入觀方便佛告下問心眼所在者推妄情也浮根四塵即眼之體心在身中眼見在外依世間所見以為答意汝今下佛因阿難言心在內在內之心必應見內故問堂中先何所見有三摩地名大佛頂首楞嚴王者此標三昧名也溫陵首楞嚴三昧千聖共遊故曰一門妙莊嚴海由此而至故謂之路疏按首楞嚴三昧經唯住十地菩薩得此三昧此三昧者不以一事一緣一義可知譬如大海悉受諸流故云首楞嚴王具足萬行又金剛三昧本性清淨經云法雲地菩薩住首楞嚴三昧其心淡泊安住不動猶十五日月圓滿可觀明相具足則知此經所談皆此三昧之法也又云住是三昧已修百三昧然後乃入金剛三昧如牟尼珠光光相照入首楞嚴三昧海所有智慧如空中日諸煩惱海如微煙瘴疏如汝下謂心若在內合見身中可有衆生先見身中後觀外物耶阿難稽首而白佛言我聞如來如是法音悟知我心實居身外所以者何譬如燈光然於室中是燈必能先照室內從其室門後及庭際室外一切衆生不見身中獨見身外亦如燈光居在室外不能照室是義必明將無所惑同佛了義得無妄自信耶佛告阿難是諸比丘適來從我室羅筏城循乞摶食歸祇陀林我已宿預齋汝觀比丘一人食時諸人飽不阿難答言不也世尊何以故是諸比丘雖阿羅漢軀命不同云何一人能令衆飽佛告阿難若汝覺了知見之心實在身外身心相外自不相干則心所知身不能覺覺在身際心不能知我今示汝兜羅綿手汝眼見時心分別不阿難答言如是世尊佛告阿難若相知者云何在外是故應知汝言覺了能知之心住在身外無有是處二推在外彼食不能飽此外心不能知身固知此心不在身外我已宿齋者謂佛已受食汝觀比丘下謂一人受食不能飽餘人以喻外心不能知身故復舉手為證兜羅綿者格古論云出西番等處從樹所生然眼見手而心分別則心非在外矣眼屬於身故云覺在身際阿難白佛言世尊如佛所言不見內故不居身內身心相知不相離故不在身外我今思惟知疑信相參在一處佛言處今何在阿難言此了知心既不知內而能見外如我思忖潛伏根裏猶如有人取琉璃碗喻眼合其兩眼喻心雖有物合而不留礙彼根隨見隨即分別然故我覺了能知之心不見內者心在眼故不見身內為在根故分明矚外無障礙者心在眼故能見身外潛根內故佛告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼當見山河見琉璃不如是世尊是人當以琉璃籠眼實見琉璃佛告阿難汝心若同琉璃合者當見山河何不見眼若見眼者眼即同境不得成隨若不能見云何説言此了知心潛在根內如琉璃合是故應知汝言覺了能知之心潛伏根裏如琉璃合無有是處三推潛根長水琉璃喻根眼喻於心眼根色淨不礙於心同琉璃碗不礙於色隨照一鏡心則隨知疏其如眼見琉璃心不見眼縱能見眼眼即成境眼既成境豈能隨即分別耶而琉璃者質礙之物故以之籠眼外見山河亦見琉璃阿難白佛言世尊我今又作如是思惟是衆生身腑藏在中竅穴居外有藏則暗有竅則明今我對佛開眼見明名為見外閉眼見暗名為見內是義云何佛告阿難汝當閉眼見暗之時此暗境界為與眼對為不對眼若與眼對暗在眼前云何成內若成內者居暗室中無日月燈此室暗中皆汝焦腑若不對者云何成見若離外見內對所成合眼見暗名為身中開眼見明何不見面若不見面內對不成見面若成此了知心及與眼根乃在虗空何成在內若在虗空自非汝體即應如來今見汝面亦是汝身汝眼已知身合非覺必汝執言身眼兩覺應有二知即汝一身應成兩佛是故應知汝言見暗名見內者無有是處四推兩在吳興一身之中有藏則暗故見暗即名見內何必須見內身之物耶有竅則明故見明即是見外豈應更責不相干耶疏其如開眼不能見明閉眼不見身中故不免其後問汝當下辨內見也謂黯與眼對則暗在眼前不與眼對即不名有見皆不可也若離下謂眼但外見無容內對故云縱離外見內對所成以見暗名身中則開眼時何不見汝之面乎溫陵展轉辨明無反觀理也汝眼已知身合非覺者既眼在虗空自非汝體矣疏焦府者素問五藏別論以能藏精氣而不泄者曰藏其傳化物而不藏曰府三焦者所以消化五穀分潤理有上下清濁之殊故曰三焦阿難言我常聞佛開示四衆由心生故種種法生由法生故種種心生我今思惟即思惟體實我心性隨所合處心則隨一本作即有亦非內外中間指根裏三處佛告阿難汝今説言由法生故種種心生隨所合處心隨有者是心無體則無所合若無有體而能合者則十九界因七塵合是義不然若有體者如汝以手自挃觸其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面阿難言見是其眼惟眼能見心知非眼心但能知非眼比也為見非義不可言見佛言以下用喻以顯能見惟心若眼能見汝在室中門能見不門即室之眼亦能見否則諸已死尚有眼存應皆見物喻徒眼不能見物若見物者云何名死阿難又汝覺了能知之心若必有體為復一體為有多體今在汝身為復遍體為不遍體若一體者則汝以手挃一支時四支應覺若咸覺者挃應無在一本作所若挃有所則汝一體自不能成若多體者則成多人何體為汝若遍體者同前所挃若不遍者當汝觸頭亦觸其足頭有所覺足應無知今汝不然是故應知隨所合處心則隨有無有是處五推隨合溫陵以心法相生則隨境思惟即是心體心法合處即為心在疏思惟之心其體浮而不實故難其體之有無也若無有體則不能合如七塵九界本非有體豈能合耶九界者涅槃云魔作佛像語首羅長者言我先所説四諦法者是説不真今當為汝更説五諦六蘊十三入十九界阿難聞已尋思法相都無此理溫陵阿難下解上難也謂心但能知不可言見曾不悟能見在心徒眼不見也佛言下舉門喻能見在心舉死喻徒眼不見疏俱舍説世間正見唯意識相應故論云以眼為門惟為見色又汝下復推別義遍體與一體同不遍與多體同故云若遍體者同前所觸今四義無成則不可謂隨所合處心隨有故阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相不作妄執時世尊亦言心不在內亦不在外如我思惟內無所見外不作又相知內無知故在內不成身心相知在外非義今相知故復內無見當在中間佛言汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身若在身者在邊非中在中同內若在處者為有所表為無所表無表同無表則無定何以故如人以表表為中時東看則西南觀成北表體既混心應雜亂阿難言我所説中非此二種如世尊言眼色為緣生於眼識眼有分別色塵無知識生其中則為心在佛言汝心若在根塵之中此之心體為復兼二根塵為不兼二根塵若兼二者雙兼眼色物體雜亂物非體知成敵兩立有知無知相為敵對云何為中兼二不成非知不知即無心尚無有體性中何為相是故應知當在中間無有是處六推在中溫陵為復下辨定中位身耶根處即境若在身者下身有中邊二義在邊則不得為中在中則同前在內應見內矣若在處者下亦辨中位無定表者標物顯處之謂混亂則無所取中疏若兼二者下破兼二不得為中物指塵體指根塵非同根有知故雜亂成敵此兼二不得為中也兼二不成下破不兼二亦不得為中也不兼根則非知不兼塵則非不知二義既非中無可定故維摩經云心不在內亦不在外不在中間如其心然罪垢亦然阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在一切無著名之為心則我無著名為心不佛告阿難汝言覺知分別心性俱無在者世間虗空水陸飛行諸所物象名為一切汝不著者為在為無無則同於龜毛龜無毛兔角兔無角云何不著有不著者不可名無無相則無非無則相相有則在云何無著是故應知一切無著名覺知心無有是處七推無著已知此心元非內外中間故言一切無著雖云無著而猶存境相故有不著之難水陸空行約外境詰不著也此中詰意有三一物在無在二相有相無三有無著所著是境能著是心即心境二門已上七處略推遍計且窮其妄未顯即真至下標陳二本始以真妄對辨顯常住文七疏言顯常住者前已略釋七徵文竟此下經意多離境顯性義當奢摩他觀由離根塵等法與空相應故顯不搖等性與常相應故辨析真妄簡緣塵故蓋以初觀真理未能涉動故須澄襟海定保固靈根使心源允宴覺識沈波寂六動而不搖冥一如以息慮故金剛三昧經云軟心衆生其心多喘故令存三守一入如真際是以經中先陳二本為此門決擇之由即斯意也爾時阿難在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟蒙佛慈愛雖今出家猶恃憍憐所以多聞未得無漏不能折伏娑毗羅呪為彼所轉溺於淫舍當由不知真際所詣惟願世尊大慈哀愍開示我等奢摩它路令諸闡提隳彌戾車作是語已五體首與四肢投地及諸大衆傾渴翹佇欽聞示誨爾時世尊從其面門眼耳鼻舌放種種光其光晃耀如百千日普佛世界六種動踊震起吼攀震動如是十方微塵國土一時開現佛之威神令諸世界合成一界其世界中所有一切諸大菩薩皆住本國合掌承聽佛告阿難一切衆生從無始來種種顛倒業種自然如惡叉聚諸修行人不能得成無上菩提乃至別成聲聞口耳之學緣覺偶觸之知及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煮沙欲成嘉饌妙喻縱經塵劫終不能得云何二種阿難一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提不染煩惱涅槃不涉生死元清淨不染不涉體則汝今者識精元明能生諸緣緣所遣者由諸衆生遺此本明雖終日行而不自覺枉不應入而入曰枉入諸趣初標真妄二本爾時下阿難敘昔所迷求詣真際先問奢摩他路者所以入實際之門也雜集論云無倒所緣説名實際故涅槃經奢摩他有五義一名能滅能滅煩惱故二名能調能調諸根故三名寂靜令三業寂靜故四名遠離遠離五欲故五名能清能清貪等三濁故爾時世尊下放光顯説此經放光凡有四處將宣微密法門而現微妙之瑞按光義有三勝思惟經論云説法光明依三種差別一因二名三成辦一因者謂佛所放光顯説因故法華優婆提舍云現見異相不可思議名為説因如即照明諸佛世界種種事等二名者謂光有名字如華嚴法華所放光明名大人相等三成辦者謂光所作業如第四經諸佛放光來祇陀林灌如來頂成辨所説等言六種者優婆提舍云前所放光顯示外境諸事今明內證甚深故六種震動然光中所現欲示本覺菩提覺心顯發故微塵國一時開現顯本涅槃心元無差別故十方界合成一界顯元清淨體不妄隨緣故菩薩衆皆住本國了茲光瑞則説因顯矣溫陵衆生業果成聚行人不知二本錯亂修習故須決擇不染煩惱名菩提不涉生死名涅槃不染不涉故號元清淨體識精陀羅識性也元明本覺妙明也根身器界一切緣法依此而生而人者認緣失真故名緣所遺者疏識精元明湛不搖性其體即是菩提涅槃由不雜塵妄曰精未嘗昏昧曰明而行人遺此本明所修皆妄故須決擇也阿難汝今欲知奢摩他路願出生死今復問汝即時如來舉金色臂屈五輪指語阿難言汝今見不阿難言見佛言汝何所見阿難言我見如來舉臂屈指為光明拳耀我心目佛言汝將誰見阿難言我與大衆同將眼見佛告阿難汝今答我如來屈指為光明拳耀汝心目汝目可見以何為心當我拳曜阿難言如來見今徵心所在而我以心推窮尋逐即能推者我將為心佛言咄阿難此非汝心直喝破阿難矍然避座合掌起立白佛此非我心當名何等佛告阿難此是前塵虗妄相想惑汝真性由汝無始至于今生認賊應前為子失汝元常故受輪轉阿難白佛言世尊我佛寵弟心愛佛故欣慕三十二相令我出家我心何獨供養如來乃至遍歷恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心縱令謗法永退善根亦因此心若此發明不是心者我乃無心同諸土木離此覺知更無所有云何如來説此非心我實驚怖兼此大衆無不疑惑惟垂大悲開示未悟爾時世尊開示阿難及諸大衆欲令心入無生法忍於師子座摩阿難頂而告之言如來常説諸法所生唯心所現一切因果世界微塵因心成體阿難若諸世界一切所有其中乃至草葉縷結絲麻之類詰追問其根元咸有體性縱令虗空亦有名貌何況清淨妙淨明心性一切心而自無體若汝執吝分別覺觀所了知性必為心者此心即應離諸一切色香味觸諸塵事業別有全性如汝今者承聽我法此則因聲而有分別縱滅一切見聞覺知內守幽間猶為法塵分別影事我非敕汝執為非心轉語警切但汝於心微細揣摩若離前塵有分別性即真汝心若分別性離塵無體斯則前塵分別影事塵非常住若變滅時此心則同龜毛兔角則汝法身同於斷滅其誰修證無生法忍即應前時阿難與諸大衆默然自失佛告阿難世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤應前為真實是故汝今雖得多聞不成聖果一離塵常性阿難下顯離塵常性塵謂隨緣分別之見常者本然自性之體真心絶妄故説離塵如來舉臂正顯本明而阿難認緣失真乃以妄心推窮尋逐才生一念轉人前塵失其元常所謂緣所遺者此也若此發明下吳興阿難以對境覺知異乎木石封為我心此正當人執之相忽聞呵斥故以無情為難不知真我無我靈知無知妙淨明心何所不在疏諸法所生惟心所現者以明竪拳之理皆推心義一切因果即依報正報也性一切心者即草木等皆此心為性也若汝下牒能推心此心下示離塵義謂分別覺觀所了知性是離塵無體之心不應取著故復示云如汝今者承聽我法乃緣塵分別之性也縱滅下甄明影事謂汝縱滅見聞覺知以外離緣塵分別而內守幽間此幽間心猶是法塵影事直須內外圓寂影象俱無方是真心之體也故佛答阿難我非敕汝執為非心但欲汝識其真也云何為真謂若離前塵有分別全性即真心耳如前塵自暗見覺不昏音響雙銷聞性不滅豈非離塵有全性分別耶所以不用緣塵分別為心者塵非常住隨即變滅以此為因安取常果緣塵之心有如是咎是故學人雖成九定不得漏盡皆由執此妄想為真實也故成實論説乃至有頂猶有退墮皆由不知煩惱過故又成實云若人得九次第定不能入諸禪名慧解脫釋曰按二定聖者凡夫皆能修之而經言不得漏盡者蓋指有學凡夫緣塵未斷者説阿難聞已重復悲淚五體投地長跪合掌而白佛言自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代如來身心不能代己修失我本心雖身出家心不入道譬如窮子捨父逃逝今日乃知雖有多聞若不修行與不聞等如人説食終不能飽世尊我等今者二障所纏良由不知寂常心性惟願如來哀愍窮露發妙明心開我道眼即時如來從胸卍字涌出寶光其光晃昱有百千色十方微塵普佛世界一時周遍遍灌十方所有寶剎諸如來頂旋至阿難及諸大衆告阿難言吾今為汝建大法幢亦令十方一切衆生獲妙微密不可測知性淨垢不染明暗不昏心得清淨眼見離眚病阿難汝先答我見光明拳此拳光明因何所有云何成拳汝將誰見阿難言由佛全體閻浮檀金赩赤焰如寶山清淨所生故有光明我實眼觀五輪指端屈握示人故有拳相佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟阿難譬如我拳若無我手不成我拳若無汝眼不成汝見以汝眼根例我拳理其義均不阿難言唯然世尊既無我眼不成我見以我眼根例如來拳事義相類佛告阿難汝言相類是義不然何以故如無手人拳畢竟滅彼無眼者非見全無所以者何汝試於途詢問盲人汝何所見彼諸盲人必來答汝我今眼前唯見黑暗更無他矚以是義觀前塵自暗見何虧損阿難言諸盲眼前唯覩黑暗云何成見佛告阿難諸盲無眼唯觀黑暗與有眼人處於暗室二黑有別為無有別越翻越透如是世尊此暗中人與彼羣盲二黑校量曾無有異阿難若無眼人全見前黑忽得眼光還於前塵見種種色名眼見者彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見若燈見者燈能有見自不名燈又則燈觀何關汝事是故當知燈能顯色如是見者是眼非燈眼能顯色如是見性鎔作一片是心非眼二離根之見寂常心性本來常住之性也此性本吾所有乃反求之於外既非他修我得豈當恃佛威神今日乃知若不修行與不聞同是以責躬請教希明道眼二障者圓覺云一者是障續諸生死二者理障礙正知見又云永斷貪欲先除事障未斷理障釋曰俱舍以貪等為事見諦為理則阿難誤墮淫舍即事障未斷也緣塵分別理障未斷也阿難下躡前拳理以為難意問相類者以明不類所以不類者無手則無拳無眼則有見是故不類也拳有生滅見非有無故雖羣盲亦能覩暗此則常性之實也又經論皆云眼非見色故破色心論云以彼夢中於無色處則見有色於有色處不見色故釋曰無色處者夢中境也有色處者寤時境也夢中之色非眼處之境故云眼非見色然世間以眼為見無眼時則不能見眼非常性義在離根阿難雖復得聞是言與諸大衆口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大衆我初成道於鹿園中為阿若多五比丘等及汝四衆言一切衆生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟今成聖果時憍陳那亦云憍陳如起立白佛我今長老於大衆中獨得解名因悟客塵二字成果世尊譬如行客投寄旅亭或宿或食宿食事畢俶整裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義又如新霽青日暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義佛言如是三離客塵之性陳如得解因悟客塵此從本立稱也吳興客塵喻見思生滅主空喻真諦寂然客義粗喻迷事之惑塵義細喻迷理之惑疏按俱舍論説見惑煩惱迷諦理起易斷不退此客義也修惑煩惱依粗事生難斷易退此塵義也佛性論云客塵煩惱有九一貪二瞋三癡四上心惑五無明六見所斷七修所斷八不淨地惑九淨地惑此二惑在第七地至究竟位中釋曰從貪等至淨地惑者總釋一切凡聖客塵義也又若經論所説客塵之義約有四種一約所顯成實云經言客塵者以顯心性是常二約所修圓覺云修奢摩他者覺識煩動靜慧發生客塵永滅三約所證佛地論云為斷客塵證淨法界四約所離佛地論云圓鏡智者正淨無垢離客塵故而其體即分別為性故勝鬘云如虗空淨心常明無轉變為虗妄分別客塵煩惱染然經以不住名客住名主人以澄霽為空動搖名塵又云若實主人自無攸往以明分別若除常心自住則知此中即以緣塵分別之心為客塵之義即時如來於大衆中屈五輪指屈已復開開已又屈作開合相謂阿難言汝今何見阿難言我見如來百寶輪掌衆中開合佛告一本作言阿難汝見我手衆中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手衆中開合我見如來手自開合非我見性有開有合佛言誰動誰靜阿難言佛手不住佛手是動而我見性尚無有靜見性無動誰為無住佛言如是如來於是從輪掌中飛一寶光在阿難右即時阿難回首右盻又放一光在阿難左阿難又則回首左盻佛告阿難汝頭今日因何搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動阿難汝盻佛光左右動頭為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動佛言如是於是如來普告大衆若復衆生以搖動者名之為塵以不住者名之為客汝觀阿難頭自動搖見無所動又汝觀我手自開合見無舒卷云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事性心失真認物為己輪回是中自取流轉四不搖之性長水手有開合見無動靜對外境辨也次於內身自分動靜動中有不動也疏佛徵見性以顯超情而言無搖動者以明妙見性靜離妄故無盡意經云奢摩他者寂近寂密不動不搖及知止足則真空觀之體也又佛地論云圓鏡智者依緣法界窮生死際相續不斷名無動搖則根本智之用也釋曰奢摩他者以靜為體以止為相而阿難答佛言見性尚無有靜者以明妙性超情即靜離靜也又佛問誰動誰靜而答云見性尚無有止者以明妙性無著即止離止也故金剛三昧經云當止是生止已無止亦不住於無止亦不住於無住又云知心無心無心可止現識不生無生可止何以故止無止故若復下指法責勸以動為身即左右顧盻者是以動為境即手有開合者是既迷不搖常住之真精反取動搖生滅之身境豈非遺失真性顛倒行事哉故知身為勞慮妄動虗假是以內蠲我想外抵人相斷搖俗之妄棲法界之真此如來所以開奢摩他也鎮澄讚曰阿難示墮調御垂憐七重徵詰破攀緣心目耀金拳真妄同源決意在當權傳如截流曰大佛頂者即釋迦大覺神變相也以象示意聖教咸然茲阿難溺于淫舍大衆願聞法要世尊具大威力而手不之援具大樂説而言未之啓乃從肉髻中湧百寶光有佛化身宣説神呪者意表顯密之俱勝彰形聲之兼妙蕩見聞之幻翳而一經之大旨無餘蘊矣顯密俱勝者經為顯呪為密呪心藏心無二無別頂為無上之相經為了義之談以密該顯全彰頂中故曰俱勝形聲兼妙者頂光化佛是形外之形化佛呪語是聲外之聲惟形與聲逈超思議之表故曰兼妙見聞幻翳者浮塵幻化虗妄稱相一切不了妄生取著障清淨之慧眼通之本根故當機云我見如來三十二相勝妙殊絶是以渴仰從佛剃落又云而我悟佛現説法音現以緣心允所瞻仰此非逐色聲之求善提者耶一著色聲本明斯昧若登伽者烏得不乘其間哉何以故佛身女身均相也佛見女見均情也阿難獨恨淫躬撫摩為魔障未達勝相愛樂為厲階誠為賊媒在室瞢然不覺而且恃其多聞之慧先梵呪語之所能攝者蓋有自矣今示佛頂化佛則知三十二相形非形化佛説呪則知四無礙辨聲非聲從是而悟陰入處界七大之法無非如來藏中循業發現循業即性故非有即性循業故非空離即離非是即非即真妄兩融戲論併絶道場修證無復祕要見是為見見聞是為聞聞當下海印發光萬象畢照全題云是經名大佛頂悉怛多般怛囉十方如來清淨海眼者以此或作文言紛紜釋者恐非至聖垂象密被利機之意矣如華嚴種種光相表諸地法門聊例一經諸可意得文殊將呪往護惡呪消滅阿難登伽歸來佛所者正智行而魔事息也序分竟經文自下直至第四卷中剋依性體以融萬法明如來密因如華嚴所謂先悟毗盧法界也自四卷至盡經全性修證明諸菩薩萬行首楞嚴所謂後修普賢行門也首楞嚴此云究竟堅固斯經教理行果無不究竟是曰了義題有五種後當具釋阿難見佛頂禮悲泣者省戒體幾毀於登伽多聞莫益乎道力人或處此怡然則楞嚴妙典無所發起生死欲流無所遏截大權示迹豈無為哉十方如來得成菩提妙奢摩他三摩禪那者妙即密也奢摩他等因也結題反約但標密因請法須詳別開三種奢摩他者凝然湛寂三摩者廓然圓照禪那者寂照不二從用有三其體恆一三一圓融故稱曰妙是諸佛之種智當人之靈知一經之宗體也宗為能顯斯曰密因體為所顯斯曰藏性宗體元無異途果因豈非一致故後文或舉一攝三或舉宗含體譯師之所不翻者神而明之存乎其人耳最初方便者入三摩提之門也門有泛明的指之別四卷阿難既悟藏心之後請云我今猶如旅泊之人忽蒙天王賜與華屋要因門入世尊示以發覺初心二決定義雖示六根優劣令一門深入然未的指何門為要故又別請圓通本根佛令諸聖各陳所證則又泛明陰入處界以及七大皆為入道之門惟文殊奉敕於諸聖之後的指觀音所證其偈云此方真教體清淨在音聞欲超三摩提實以聞中入願加被未來於此門無惑堪以教阿難及末劫沉淪經以耳根圓通為最初方便無疑也堪以教阿難者蓋阿難以蓄聞成過觀音以薰聞成德所謂功之與釁只在循聲入流之間而已今示大士本妙之圓根為多聞創修之祕要是令不失故步大用現前如從地倒還從地起舍此將何聆密因舍此憑何談萬行故阿難以多聞未全道力自咎更陳發心見相之由世尊就其所迷而示之曰一切衆生皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉性淨明體即佛所表絶諸分別者用諸妄想即因相愛樂者欲治此想更無別法故曰有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路阿難前請具列三名但舉三摩提者以舉一攝三宗體咸在也三摩提名大佛頂者斯以詞係象攝密歸顯也首楞嚴王者彰所詮究竟堅固之體一切無上也離體無用故曰具足萬行十方如來一門超出妙莊嚴路者從三摩提顯常住心圓滿菩提歸無所得佛佛然也夫心所以為常住者常住則無所不住無所不住則不可以言住然阿難計內計外至計無著寧有是處乎試觀如來放面門之光動普佛之界異境一合遙住同聞則七處妄局直下廓然無始涅槃元清淨體備在我而不在佛矣阿難尚以能推之心為心非認賊為子失其所謂寂常心性者耶由是再從卍字湧出寶光至微塵如來阿難大衆無不遍及者知妄塵莫隔乎智光則妙心豈殊乎道眼至托盲人以辨燈見心眼之一體照然令陳那而敘客塵寂常之妙性顯矣阿難悟手有開合猶客也見無舒卷猶主也頭有搖動猶塵也見無所動猶空也然如來先寄陳如以悟阿難因阿難而責在會故曰若復言以搖動者名之為塵不住者名之為客者責衆不悟動中之有不動故云汝觀阿難頭自搖動見無所動手有開合見無舒卷云何汝今迷其寂常之主空而以動為身以動為境非心性失真乎逐其擾動之客塵而從始洎終念念生滅非認物為己乎寂常之性本來在我而迷之背之故曰輪回是中自取流轉音釋般剌音鉢臘萇音長絺音癡屬音燭掖音亦佇直呂切臊蘇曹切遘音搆矚音燭摶音團秪音支竅啓呌切挃音質隳喧規切翹祈堯切矍居縛切吝良刃切揣初委切昱音育赩喜力切握於角切縷力主切椒昌六切隙乞逆切盻匹莧切
