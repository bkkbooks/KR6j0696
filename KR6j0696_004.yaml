body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第四審除細惑文八爾時富樓那彌多羅尼子在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為衆生敷演如來第一義諦世尊常推説法人中我為第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋本所不見何況得聞佛雖宣明令我除惑今猶未詳斯義究竟無疑惑地世尊如阿難輩雖則開悟習漏未除我等會中登無漏者雖盡諸漏已斷煩惱障今聞如來所説法音尚紆疑悔未斷所知障世尊一疑循發之義若復世間一切根塵陰處界等皆如來藏清淨本然緊問云何忽生山河大地諸有為相次第遷流終而復始二疑遍融之義又如來説地水火風本性圓融周遍法界湛然常住世尊若地性遍云何容水水性周遍火則不生復云何明水火二性俱遍虗空不相陵滅世尊地性障礙空性虗通云何二俱周遍法界而我不知是義攸往惟願如來宣流大慈開我迷雲翳障及諸大衆作是語已五體投地欽渴如來無上慈誨爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢如來今日普為此會宣勝妙義中真勝義性令汝會中定性聲聞及諸一切未得二空回向上乘阿羅漢等皆獲一乘大白牛車寂滅場地真阿練若無雜喧正修行處汝今諦聽當為汝説富樓那等欽佛法音默然承聽佛言富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣説性覺妙明本覺明妙富樓那言唯然世尊我常聞佛宣説斯義佛言汝稱覺明雙舉為復性明稱名為覺為覺不明稱為明覺富樓那言若此不明名為覺者則無所明疏經初二問一云何忽生問三相續因以斷輪回二地性周遍問不相容以窮幻相溫陵清淨則疑無諸相本然則疑無遷流又地水火風衆相相違不合相容是常情所疑故此置問疏勝義陳翻真諦中邊論云此有三義一義勝義謂真如智境二得勝義謂涅槃果三正行勝義謂諸聖道釋曰經言真勝義性即義勝義也此義以覺真如智境為性故覺明立所是迷此性也言性覺者以體本自然曰性從體所出曰本起信云覺義者謂心體離念本覺者謂平等法界孤山本亦性也以本元自性既能所雙絶寂照互融即寂而照曰妙明即照而寂曰明妙疏佛詰覺明之義答忽生之由謂汝稱覺明為復性本自明稱為明覺為覺性不明稱名為覺哉而富樓那欲立所明乃情存取捨故謂覺性不明必有所明方稱明覺而不知真覺無所有所非真故山河大地無狀忽生皆由此矣佛言若無所明則無明覺有所非覺無所非明妄明無明即妄明又非覺湛明性性覺必明妄為明覺佛言下牒詰富那之意無所明則無覺然真覺非所有所者即是無明故曰無明又非覺湛明性蓋富那不知性覺必明而妄立明覺也此中諸句總顯四義一有所非覺者顯不覺義謂立所之覺雖云有覺即是不覺以未能離念故起信云所言覺者謂心體離念一切衆生不名為覺以從本以來未能離念故説無始無明二無所非明者顯簡情義謂本覺之體亦非無所明故經云覺所覺眚覺非眚中本覺明心覺緣非眚若本覺非所明者則根本智應無所緣緣義則亦非無所明矣三無明又非覺湛明性者顯起惑義謂因明立所起惑相續皆由此體故起信云以依阿黎耶識説有無明不覺而起能見能現能取境界起念相續又三無性論云阿黎耶識為諸惑本有漏即是無明有取即是貪愛是也四顯中道者寶積經論云明與無明無異無別為橫執義邊顯於中道以一相中有覺不覺皆是對治義故又起信云依於本覺而起始覺以始覺者即同本覺故則始本不二中道顯矣覺非所明因明立所所既妄立生汝妄能無同異中熾然成異異彼所異因異立同同異發明因此復立無同無異如是擾亂相待生勞勞久發塵自相渾濁由是引起塵勞煩惱起為世界靜成虗空虗空為同世界為異彼無同異真有為法釋因甚深而明起惑因明立所即背覺之始也生汝妄能則相續之由也謂妙覺體中本無同異由覺明立所遂起妄情故於無同異之真空起熾然之虗妄既有能所立之分別復立無同異之是非相因擾亂對待不休於是乎有煩惱塵勞之生而相續乎世界輪回之域皆覺明之咎也吳興彼指上之辭上云無同無異名濫于理今指其體實有為耳疏按緣生經無明有十殊勝全涉此文今復略引者經云一無明所緣殊勝謂緣染淨因果即經因明性故二行相殊勝謂顯現虗妄即經妄能性故三因緣殊勝謂煩惱惑耶經擾亂性故四引起殊勝謂能引所引即經引起性故五轉異殊勝謂相應等隨眠即熾然性故六邪行殊勝謂增益諦理等即立所性故七相狀殊勝謂微細不共等法即非所明性故八作業殊勝謂流轉等即有為性故九障礙殊勝即諸法體故十隨縛殊勝即世界相續性故又起信論依無明不覺亦有九相謂一者業相即因明性二能見相即妄能性三境界相即熾然性四分別相即所異性五相續相即生勞性六執取相即煩惱性七計名字相即發明性八作業相即有為性九業果相即世界性故總釋覺明立所都有十相一背真二涉妄三涉緣四轉變五能所六分別七同異八作業九差別十流轉及邊邪斷常等諸見貪瞋等之煩惱皆由此生起覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺寶成搖明風出風金相摩故有火光為變化性寶明生潤火光上蒸故有水輪含十方界火騰水降交發立堅濕為巨海乾為洲灘以是義故彼大海中火光常起彼州灘中江河常注水勢劣火結為高山是故山石擊則成焰融則成水土勢劣水抽為草木是故林藪遇燒成土因絞成水交妄發生遞相為種以是因緣世界相續一世界相續夫世界生起皆因覺明立所而感故有五行之異自風金以下略無覺明但相躡為次故覺明空昧為風輪種因空立礙為金輪種風金相摩為火大種金火又為水大種火大又為海洲種水土復為草木種然實風金水火皆遞互相生無定前後經以覺明為因故略分次第又其始則以制伏為生起如因空生搖故立礙生金以制風因金有礙故立化生火以制堅即火尅金也次以水而尅火復以土而制水洲灘土也自此以下又以相生為次蓋五行順逆之勢也水勢劣火者牒前水制火也結為高山者即火生土也土勢劣水抽為草木即水生木也生尅備則五行具然經言四大而不言木此經則言之世言五行而不言風八卦則言之各從其略也又緣生經無明有五甚深亦涉此文謂一因二相三生起四差別五流轉即覺明為因執持等為相立礙等為生起風金等為差別相續等為流轉復次富樓那明妄非他覺明為咎所妄既立明理不踰以是因緣聽不出聲見不超色色香味觸六妄成就由是分開見覺聞知同業相纏合離成化見明色發明見想成異見成憎同想成為流愛為種納想為胎交遘發生吸引同業故有因緣生羯羅藍遏蒲曇等胎卵濕化隨其所應卵唯想生胎因情有溼以合感化以離應情想合離更相變易所有受業逐其飛沈以是因緣衆生相續二衆生相續吳興明妄即妄明也非局而局故明理不踰聽不出聲示不踰之理溫陵同業相纏合離成化此六道四生之始也父母己三者業同故相纏有生若但由己業不因父母或合濕而成形或離異而託化孤山以妄心見妄境名見明色發即中陰身見父母也依妄境起妄惑為明見想成即異見憎父同見愛母也疏圓覺云由於欲境起諸違順境背愛心而生憎疾造種種業此衆生相續之由也故成實云以愛淫欲故卵生胎生貪香味故故受濕生隨其所欲故受化生此四生六趣之由也然衆生之類唯中有位不名為生顯宗論云依所至位建立生名中陰身體雖起沒而未至彼故不名緣生但名緣起又中有之説諸論各有差別今復略引者總有七論一分別論師説三界受生皆無中有二應理論師説欲色界生定有中有三毗婆沙師為破彼執説一切有中有四施設論説中有者五趣攝五法蘊論説別有中有眼六品類足論亦如是説七尊者達羅達多説有中有趣毗婆沙師釋云施設論説是頌文者謬法蘊論説別有中有眼以彼類微細是故別説由此評曰中有非趣擾亂性故趣者安住之義也富樓那想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本貪愛同滋貪不能止則諸世間卵化溼胎隨力強弱遞相吞食是等則以殺貪為本以人食羊羊死為人人死為羊如是乃至十生之類死死生生互來相噉惡業俱生窮未來際是等則以盜貪為本汝負我命我還汝債以是因緣經百千劫常在生死汝愛我心我憐汝色以是因緣經百千劫常在纏縛唯殺盜淫三為根本以是因緣業果相續富樓那如是三種顛倒相續皆是覺明明了知性因了發相從妄見生應前云何忽生山河大地諸有為相次第遷流因此虗妄終而復始三業果相續吳興欲貪通乎四生今多就人倫辨之從易見也殺貪者以強淩弱不滋口體則屬瞋恚盜貪由過去世於身命財非理而取故致生生互來相噉疏飲食相噉即任持緣起因貪負命即非愛非憎分別欲存諸境愛屬乎心經云由有諸欲助發愛性是故能令生死相續溫陵汝負下上明業報之本此明相續之由負債殺盜由也愛憐貪欲由也又緣生經無明有八緣起亦涉此文一受用世俗緣起謂眼色生識即見明色發等二任持緣起謂四種食即食羊等三食因緣起即殺貪等四生身相續緣起即想愛同結等五依持緣起即諸世界六差別緣起即卵胎溼化七清淨緣起謂依教思修八自在緣起謂諸靜慮此二緣在下經又有八種分別亦涉此文出三無性論富樓那言若此妙覺本妙覺明與如來心不增不減無狀端忽生山河大地諸有為相如來今得妙空明覺山河大地有為習漏何當時復生佛告富樓那譬如迷人於一聚落惑南為北此迷為復因迷而有因悟而出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊富樓那十方如來亦復如是此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧富樓那言空元無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡云何更名如是狂人為愚為慧佛言如汝所解云何問言諸佛如來妙覺明空何當更出山河大地又如金礦雜於精金其金一純更不成雜如木成灰不重為木諸佛如來菩提涅槃亦復如是四究竟正覺疏衆生如來之迷悟習漏前後之有無世界始終之生滅清淨忽生之相反良由邪疑為絆謬起惑因故邊邪斷常之見皆突然而興此覺體中細惑那可不問故難意謂本覺之體生佛理同而佛己既證妙空明覺則山河等相何因復生佛引迷人既悟悟不生迷以喻如來究竟證覺無妄山河也故圓覺云既已成金不重為礦如來圓覺亦復如是昔本無迷指木覺也覺迷迷滅即始覺故溫陵亦如下翳喻妄見華喻山河空華滅地喻妙空明覺又如下以金喻菩提果覺無變灰喻涅槃果德無生經舉四喻使知迷悟雖妄不廢修證也疏此文辨惑約性修二門不可偏廢故兩義兼舉故文殊説般若云佛言汝入不思議三昧耶答我即不思議云何言入此云本具無勞修證也又云我初發心欲入是三昧如人學射久習自中此言性雖本具不無修證也又云如試金礦要以椎煅如是不退智相要行境界不忘不著具足不動然後方明得不退智故圓覺金剛章亦有銷金等喻以明證智無退轉相則阿難誤墮之事皆所以自試而然也富樓那又汝問言地水火風本性圓融周遍法界疑水火性不相陵滅又徵虗空及諸大地俱遍法界不合相容富樓那譬如虗空體非羣相而不拒彼諸相發揮所以者何富樓那彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映於意云何如是殊方諸有為相為因彼生為復空有若彼所生富樓那且日照時既是日明十方世界同為日色云何空中更見圓日若是空明空應自照云何中宵雲霧之時不生光耀當知是明非日非空不異空日觀相元妄無可指陳猶邀空華結為空果云何詰其相陵滅義觀性元真唯妙覺明妙覺明心先非水火云何復問不相容者真妙覺明亦復如是汝以空明則有空現地水火風各各發明則各各現若俱發明則有俱現云何俱現富樓那如一水中現於日影兩人同觀水中之日東西各行則各有日隨二人去一東一西先無準的不應難言此日是一云何各行各日既雙云何現一宛轉虗妄無可窮詰五諸相圓融富那下答第二問虗空無相不拒發揮喻妙覺明心先非水火故佛地論云譬如依空有大地光明水火日月而虗空界非彼諸相又圓覺云一切衆生種種幻化皆生如來圓覺妙心是則體性雖空而無妨幻相也為因下辨妄無實謂明若生日則與日同色不應於空更見圓日明若生空則中宵無日其空應明觀相元妄答不相陵滅觀性元真答不相容者舉兩人觀日以明諸相虗妄不容窮詰也富樓那汝以色空相傾相奪於如來藏而如來藏隨循此妄見為色空周遍法界是故於中風動空澄日明雲暗衆生迷悶背覺合塵故發塵勞有世間相我以妙明不滅不生合如來藏而如來藏唯妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場遍十方界身含十方無盡虗空於一毛端現寶王剎小中現大坐微塵裏轉大法輪大中現小易知故略而不言滅塵合覺故發真如妙覺明性而如來藏本妙圓心非心非空非地非水非風非火非眼非耳鼻舌身意非色非身香味觸法非眼識界如是乃至非意識界非明無明明無明盡只是無無明之意多二明字勿泥如是乃至非老非死非老死盡非苦非集非滅非道非智非得非檀那布施非尸羅持戒非毗黎耶忍辱非羼提精進非禪那禪定非般剌若智慧非波羅蜜多此總上六度如是乃至非怛闥阿竭如來非阿羅訶應供三耶三菩正遍知非大涅槃非常非樂非我非淨以是俱非結上起下世出世故即如來藏元明心妙即心即空即地即水即風即火即眼即耳鼻舌身意即色即聲香味觸法即眼識界如是乃至即意識界即明無明明無明盡如是乃至即老即死即老死盡即苦即集即滅即道即智即得即檀那即尸羅即毗黎耶即羼提即禪那即般剌若即波羅蜜多如是乃至即怛闥阿竭即阿羅訶三耶三菩即大涅槃即常即樂即我即淨以是俱即又結上起下世出世故即如來藏妙明心元離即離非是即非即如何世間三有衆生及出世間聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見譬如琴瑟箜篌琵琶雖有妙音喻藏性若無妙指喻實智終不能發喻起用汝與衆生亦復如是寶覺真心合前妙音各各圓滿如我按指海印發光汝暫舉心合前無妙指塵勞先起由不勤求無上覺道愛念小乘得少為足六三諦妙心長水本妙圓心非心非空等約非相以明真諦元明心妙即心即空等約即相以明俗諦妙明心元離即離非等約遮照以明中諦疏海印者大集云閻浮所有色像大海皆現印文謂影現難思感發自在故曰海印富樓那言我與如來寶覺圓明真妙淨心無二圓滿而我昔遭無始妄想久在輪回今得聖乘猶未究竟世尊諸妄一切圓滅獨妙真常敢問如來一切衆生何因有妄自蔽妙明受此淪溺佛告富樓那汝雖除疑餘惑未盡吾以世間現前諸事今復問汝汝豈不聞室羅城中演若達多忽於晨朝以鏡照面愛鏡中頭眉目可見瞋責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故佛言妙覺明圓本圓明妙既稱為妄云何有因若有所因云何名妄自諸妄想展轉相因從迷積迷以歷塵劫雖佛發明猶不能返如是迷因因迷自有識迷無因妄無所依尚無有生欲何為滅得菩提者如寤時人説夢中事心縱精明欲何因緣取夢中物況復無因本無所有如彼城中演若達多云祠授豈有因緣自怖頭走忽然狂歇頭非外得縱未歇狂亦何遺失富樓那妄性體如是因何為在汝但不隨分別世間業果衆生三種相續三緣斷故三因不生則汝心中演若達多狂性自歇歇即菩提勝淨明心本周法界不從人得何藉劬勤勞肯綮修證譬如有人於自衣中繫如意珠不自覺知窮露他方乞食馳走雖實貧窮萬妄交馳珠不曾失一真宛在忽有智者指示其珠所願從心致大富饒方悟神珠非從外得七推窮妄本溫陵既悟無二益顯妄倫故請窮其因識迷下富那自謂昔遭妄想而稱世尊諸妄圓滅似謂迷有所因妄有可滅故告以此如彼下牒喻重顯令了妄無因無可滅者補注不隨因緣者指上三種相續中因緣也疏圓覺云始知衆生本來成佛所謂狂心若歇歇即菩提也又云生死涅槃猶如昨夢所謂如寤時人説夢中事也蓋迷頭認影皆由狂性因緣若影滅情亡則本性菩提非從外得故曰何藉劬勞肯綮修證即時阿難在大衆中頂禮佛足起立白佛世尊現説殺盜淫業文雖止此意談世界衆生三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得斯則因緣皎然明白云何如來頓棄因緣我從因緣心得開悟世尊此義何獨我等年少有學聲聞今此會中大目犍連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏今説菩提不從因緣則王舍城拘舍梨外道等所説自然成第一義惟垂大悲開發迷悶佛告阿難即如城中演若達多狂性因緣若得滅除則不狂性自然而出因緣自然理窮於是阿難以下以因緣破自然演若達多頭本自然本自其然無然非自何因緣故怖頭狂走以下以自然破因緣若自然頭因緣故狂何不自然因緣故失本頭不失狂怖妄出曾無變易何藉因緣本狂自然本有狂怖未狂之際狂何所潛不狂自然頭本無妄何為狂走若悟本頭識知狂走因緣自然俱為戲論八因緣自然溫陵演若下以因緣破自然自然者本自天然不假因緣也若本自天然即無往而非自然何假照鏡因緣怖頭狂走則自然之計墮矣又若由因緣故狂則何不自然而以因緣故失本狂下若謂狂怖亦是自然狂怖者則未狂之際狂何所潛亦非自然之狂怖矣是故我言三緣斷故即菩提心菩提心生生滅心滅此但生滅滅生俱盡無功用道若有自然如是則明自然心生生滅心滅此亦生滅無生滅者名為自然猶如世間諸相雜和成一體者名和合性非和合者稱本然性本然自然非然和合因緣非合合然俱離離合俱非此句方名無戲論法乃真無功用道菩提涅槃尚在遙遠非汝歷劫辛勤修證雖復憶持十方如來十二部經清淨妙理如恆河沙秪益戲論汝雖談説因緣自然決定明了人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難何須待我佛頂神呪摩登伽心淫火頓歇得阿那含於我法中成精進林進速證多愛河乾枯令汝解脫是故阿難汝雖歷劫憶持如來祕密妙嚴不如一日正應歷劫修無漏業遠離世間憎愛二苦如摩登伽宿為淫女由神呪力銷其愛欲法中今名性比丘尼與羅睺母耶輸陀羅亦女身同悟宿因知歷世因貪愛為苦一念熏修無漏善故或得出纏或蒙授記如何自欺知此不為尚留觀聽著耽戲論疏示還滅以遣情顯性夫諸法性空非生之所生生非滅之能滅滅由修斷義邊妄功用中有諸差別初以智遣情還沈識海次以滅滅滅復滯功能乃至遣無可遣道合無功則體證理窮還源之至故佛性論有次第離於六種二邊顯於中道皆由破執也何者為六一者謂諸法畢竟可滅及執畢竟滅盡又執實有能執所執乃至第六執不生同生及可能滅滅皆成一邊故大品云法及非法俱無自性由覺此理故名菩提若然者則所謂生滅智情者皆為戲論而已三發心分文二阿難及諸大衆聞佛示誨疑惑消除心悟實相身意輕安得未曾有重復悲淚悟徹悲深頂禮佛足長跪合掌而白佛言無上大悲清淨寶王善開我心能以如是種種因緣方便提獎引諸沈冥出於苦海世尊我今雖承如是法音知如來藏妙覺明心遍十方界含育如來十方國土清淨寶嚴妙覺王剎如來復責多聞無功不逮修習我今猶如旅泊之人忽蒙天王周稱天子曰天王賜與華屋見性雖獲大宅要自門入惟願如來不捨大悲示我在會諸蒙暗者捐捨小乘畢竟獲如來無餘涅槃本發心路令有學者從何攝伏疇昔攀緣得陀羅尼慧性入佛知見作是語已五體投地在會一心佇佛慈旨疏此由前經種種開示信解具足應須發行希尅聖果故次發心也其文分二第一發心以破陰顯理取觀真空證涅槃德即奢摩他行第二發心以備顯六根功德從選根入要空假雙流而進中道故第三觀無發心之文有修行之義初中三爾時世尊哀愍會中緣覺聲聞於菩提心未自在者及為當來佛滅度後末法衆生兼小乘發菩提心開無上乘妙修行路宣示阿難及諸大衆汝等決定發菩提心於佛如來妙三摩提定性不生疲倦應當先明發覺初心二決定義云何初心二義決定阿難第一義者汝等若欲捐捨聲聞修菩薩乘一乘頓圓入佛知見應當審觀因地發心與果地覺為同為異阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處以是義故汝當照明諸器世間可作之法皆從變滅阿難汝觀世間可作之法誰為不壞然終不聞爛壞虗空何以故空非可作由是始終無壞滅故則汝身中堅相為地潤溼為水暖觸為火動搖為風由此四纏分汝湛圓妙覺明心為視為聽為覺為察從始色入終識五疊渾濁云何為濁阿難譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾理應如是性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔容貌汩然名之為濁汝濁五重亦復如是一示果德疏先示涅槃不生滅地以為初心發覺之本則汝身中者指有為性也清水譬圓湛妙心塵土灰沙喻五陰生法能令眼視耳聽分別湛源五疊亂真故以五陰為濁阿難汝見虗空遍十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁汝身現摶四大為體見聞覺知此六受根壅令留礙水火風土此六塵境旋令覺知相織妄成是第二重名為見濁又汝心中憶過去識見在誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁又汝朝夕生滅不停知見每欲留於世間業運每常遷於國土亦世間相織妄成是第四重名衆生濁汝等見聞元無異性衆塵隔越無狀端異生性中相知性元無異用中相背衆塵隔越異生同性異用失準相織妄成是第五重名為命濁二明五濁孤山五濁依於五陰根塵皆色而以眼根見空説者渾濁義顯也成住壞空皆名為劫故以見空為劫濁空無好醜可覺特由見空交織濁亂性真名劫濁故疏見濁為受陰見聞覺知名六受根水火風土六塵境也因根有相故令留礙由塵發知故旋令覺煩惱濁為想陰憶識誦習皆想為體憶想過去識別現在誦習未來貪瞋煩惱由想而生想念力故發知見性六塵容貌現於想中故想為煩惱濁衆生濁為行陰生滅不停為行行相遷流故曰業運妄想知見即行陰體諸行無常故國土每遷命濁為識陰性中相知斯無異姓由塵隔越而相背也同謂識體異即根塵即彼此失準名相織故經云涅槃者名無織織者兩物相涉經緯造作之義而涅槃之體自性清淨不涉衆緣故佛性論云涅槃者無所趣故離編織故阿難汝今欲令見聞覺知遠契如來常樂我淨應當先擇死生根本依不生滅圓湛性成以湛旋其虗妄滅生伏還元覺得元明覺無生滅性為因地心然後圓成果地修證如澄濁水貯於靜器靜深不動沙土自沈清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明明相精純一切變現不為煩惱皆合涅槃清淨妙德三明伏斷生死根本五濁業用也圓湛之性本智真體也初伏客塵謂先除正使永斷根本即更侵習氣寶性論云貪等客煩惱猶如濁水塵無分別智上果法如池水示現佛法身一切諸功德又伏斷客塵有二種入一者理入二者行入理入者金剛三昧經云深信衆生不異真性不一不共但以客塵所障當凝住覺見諦觀佛性寂靜無為無有分別是為理入然客塵之體即奢摩他所治之惑以喻況法則水喻自性本淨塵喻虗妄分別而諸論等取契經義立心性本淨諸師各有立破今復略引者如分別論師引經云衆生之心本來清淨明徹潔白但為客塵煩惱所覆見不清淨煩惱斷除即得解脫毗婆沙師破云若心性本淨為煩惱所汙見不清淨者何不煩惱本性染汙為本染汙心而見清淨釋曰心性義本出華嚴淨師等經而陳那引之耳婆沙欲以義準破之故云何不也雜集論安慧釋云所謂客塵者由未永拔所取能敢種子故令依他性心二行相轉非法性心以諸法性自性清淨故釋曰安慧欲以簡別義救故云非法性心又成實論經部師破云經説心性本淨者以顯心體是常説客塵言釋曰經部欲以違宗破他故以顯常矯之又若辨中邊論則以雙破二邊之情雙立二邊之義令染淨情亡是非泯絶則心性顯矣故論云此若無雜染一切應自脫此若無清淨功用應無果非染非不染非淨非不淨心性本淨故客塵煩惱染第二發心文四第二義者汝等必欲發菩提心於菩薩乘生大勇猛決定棄捐諸有為相應當審詳煩惱根六根本此無始來發業潤生誰作誰受阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處結處尚不知云何降伏取如來位阿難汝觀世間解結之人不見所結云何知解不聞虗空被汝隳裂何以故空無形相無結解故則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始衆生世界是正報生纏縛故於器世間是依報不能超越一審明因地言因地者謂同前發心觀圓湛性合涅槃空則以無生滅性為本修因即乘此因圓滿果地功德故指虗空壞烈為喻此審因也由三觀修心皆因空起行深涉遠理定該前故修假者必因於空修中者必緣空假欲知觀義請觀圓覺最初三章吳興發業潤生指煩惱誰作誰受此推本也阿難云何名為衆生世界世為遷流界為方位汝今當知東西南北東南西南東北西北上下為界過去未來現在為世方位有十流數有三一切衆生織妄相成身中貿遷世界相涉而此界性設雖十方定位可明世間秪目東西南北上下無位中無定方四數東西南北必明與世過現來相涉三四以三世涉四方四三以四方涉三世宛轉十二流變三疊一十百千總括始終六根之中各各功德有千二百阿難汝復於中克定優劣如眼觀見後暗前明前方全明後方全暗左右旁觀三分之二統論所作功德不全三分言功一分無德當知眼唯八百功德如耳周聽十方無遺動若邇遙相似非實靜無邊際當知耳根圓滿一千二百功德如鼻嗅聞通出入息有出有入而闕中交驗於鼻根三分闕一當知鼻唯八百功德如舌宣揚盡知世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分闕一當知身唯八百功德如意默容十方三世一切世間出世間法唯聖與凡無不包容盡其涯際當知意根圓滿一千二百功德二顯本功德溫陵世者三世遷流界者各從定位界位有十世數有三一身所具理自互涉故曰身中貿遷疏方位有十故十倍為數流數有三故三變而止此所以垂變化之故具功德之門皆因數起故所顯之補注言千二百功德者四方各二百四隅各一百也鼻通出入入則聞香出則不聞出入之中其境不交故三分闕一是則六根俱以能了別處為功德也又如身有離合則以離境不知為闕一分意根了境通於三世具現比二量又以憶識誦習中慣力強故能默容十方三世等也阿難汝今欲逆挽生死欲流反窮流根至不生滅當驗此等六受用根誰合誰離誰深誰淺誰為圓通用具誰不圓滿用缺若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓根日劫相倍我今備顯六湛圓明本所功德數量如是隨汝詳擇其可入者吾當發明令汝增進十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨疏阿難下流根即妙湛不動者也眼耳以離中取境鼻等以合中知法離則境遠為深合則境近為淺顯宗論云五根初二用遠境不合故俱舍云眼用遠速遠見山河不聞聲故如先見擊鼓後方聞聲鼻舌無遠事是也阿難白佛言世尊云何逆流深入一門能令六根一時清淨佛告阿難汝今已得須陀洹果不入六塵已滅三界衆生世間見所斷惑即八十一使然猶未知根中積生無始虗習彼習要因修所斷得即八十一思何況此中生住異滅分劑頭數今汝且觀現前六根為一為六阿難若言一者耳何不見目何不聞頭奚不履足奚無語若此六根決定成六如我今會與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛言汝耳自聞何關身口口來問義身起欽承是故應知非一終六非六終一終不汝根元一元六阿難當知是根非一非六由無始來顛倒淪替即惑業故於圓湛一六義生汝須陀洹雖得六銷猶未亡一如太虗空參合羣器由器形異名之異空除器觀空説空為一彼太虗空云何為汝成同不同何況更名是一非一則汝了知六受用根亦復如是疏見所斷惑即八十一使根中虗習即生住異滅也分劑頭數者如凡夫覺滅相二乘覺異相法身位菩薩覺住相滿足位菩薩覺生相即斷惑分劑所有頭數也圓覺云修禪那者心中了知生住異滅分劑頭數然此中之説與彼有異者此文之義欲斷彼生彼經之談欲知彼數觀體異故孤山須陀洹不入色聲香味觸法故得六銷猶未忘一者滯有涅槃也溫陵虗空本非同異喻圓湛本非一六合器除器喻一六義生由明暗等二種相形互顯於妙圓中黏湛發見見精映色結色成根根元目為清淨四大因名眼體如蒲萄朵浮根四塵流逸奔色由動靜等二種相擊於妙圓中黏湛發聽聽精映聲卷聲成根根元目為清淨四大因名耳體如新卷葉浮根四塵流逸奔聲由通塞等二種相發於妙圓中黏湛發嗅嗅精映香納香成根根元目為清淨四大因名鼻體如雙埀爪浮根四塵流逸奔香由恬變等二種相參雜和於妙圓中黏湛發嘗嘗精映味絞味成根根元目為清淨四大因名舌體如初偃月浮根四塵流逸奔味由離合等二種相摩於妙圓中黏湛發覺覺精映觸搏觸成根根元目為清淨四大因名身體如腰鼓顙浮根四塵流逸奔觸由生滅等二種相續於妙圓中黏湛發知知精映法攬法成根根元目為清淨四大因名意思如幽室見浮根四塵流逸奔法三斥相冥真外拔六根內冥真性使聞見合而為一圓湛開而遍應則諸根互用而虗習全消矣故經云非汝六根互用合開則此妄想無時得滅則知拔根義在斷惑於妙圓中者示根結所起見由黏湛而發根因結色所生故眼之名體從茲而立則知見等六用為虗妄也俱舍云蒲萄眼體皆有極微極微名不可見色故見根之元是清淨四大而浮根四塵亦能奔色阿難如是六根由彼覺明有明明覺失彼精了粘妄發光是以汝今離暗離明無有見體離動離靜元無聽質無通無塞嗅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安寄汝但不循動靜合離恬變通塞生滅明暗如是十二諸有為相皆生滅法隨拔一根脫粘內伏伏歸元真發本明耀耀性發明諸餘五黏應拔圓脫不由前塵所起知見外不由塵明不循根內不循根寄根明發由是六根互相為用阿難汝豈不知今此會中阿那律陀無目而見跋難陀龍無耳而聽殑伽神女非鼻聞香驕梵鉢提異舌知味舌常如牛哨舜若多神無身覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯銷氷應念化成無上知覺阿難如彼世人聚見於眼若令急合暗相現前六根黯然頭足相類無辨彼人以手循體外繞彼雖不見頭足一辨知覺是同緣見因明暗成無見不明自發則諸暗相永不能昏根塵既銷云何覺明不成圓妙阿難下示流逸之妄循塵喪真故失彼精了粘湛發光即有明明覺也根以循塵而知故離塵無覺隨拔一根即一門深入也發本明耀即不由前塵能了別也寄根於心則不循塵於外既依本明開發故得六根互相為用阿那律下引證拔根之用而兼舉六人者以明六妄皆能圓拔則精真可純而獨照所謂一耳目之所知而心未嘗死者是則視聽不用耳目而不異耳目之用無足異矣無眼失明也非鼻不以嗅聞也舜若多即虗空神意根執受為體滅定能治受想故無意根生肖論云龍虧聰故字書以龍耳為聾今言無耳蓋異諸龍矣宋人李覯執孔孟之教常為排佛一日讀般若心經至無眼耳鼻舌身意豁然有省乃以書寄門人曰古之儒者用於世必有以教導之民之耳自鼻口心知百體皆有所主彼浮屠何暇及哉後之儒者用於世則無以教導之民之耳目鼻口心知百體皆無所主捨浮屠何適哉此亦不循塵之一事也吳興真智如湯妄念如氷故應念化成無上知見前明真智不由於根故舉那律等無目能見今示真見不假於緣故指世人暗中有見彼人謂合眼之人循體謂他人之體知見是同言暗中之境與明無殊也凡夫尚不假明緣而能有見況聖人真覺何藉緣發乎疏世人聚見於眼者謂唯以眼為見也阿難白佛言世尊如佛説言因地覺心欲求常住要與果位名目相應世尊如果位中菩提正覺性涅槃真如佛性菴摩羅識空如來藏大圓鏡智是七種名稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞若此見聽離於明暗動靜通塞畢竟無體猶如念心離於前塵本無所有云何將此畢竟斷滅以為修因欲獲如來七常住果世尊若離明暗單舉眼根例該餘五見畢竟空如無前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺如來先説湛精圓常違越誠言終成戲論云何如來真實語者唯垂大慈開我蒙吝佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因真倒現前實未能識恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑即時如來敕羅睺羅擊鐘一聲問阿難言汝今聞不阿難大衆俱言我聞鐘歇無聲佛又問言汝今聞不阿難大衆俱言不聞時羅睺羅又擊一聲佛又問言汝今聞不阿難大衆又言俱聞佛問阿難汝云何聞云何不聞阿難大衆俱白佛言鐘聲若擊則我得聞擊久聲銷音響雙絶則名無聞如來又敕羅睺擊鐘問阿難言爾今聲不阿難大衆俱言有聲少選聲銷佛又問言爾今聲不阿難大衆答言無聲有頃羅睺更來撞鐘佛又問言爾今聲不阿難大衆俱言有聲佛問阿難汝云何聲云何無聲阿難大衆俱白佛言鐘聲若擊則名有聲擊久聲銷音響雙絶則名無聲四別名常性阿難下舉果辨因決進修之疑也夫欲審因修先明果證如人學射以的為期故此中七法義各二種謂一果二常菩提正覺性也涅槃斷德體也由無變異説名真如為覺本體説名佛性體本清淨名菴摩羅煩惱不居名空如來藏清淨顯照名大圓鏡皆果上妙德也又菩提常覺涅槃常樂真如常然佛性常知菴羅常淨空藏常虗鏡智常明皆法上真體也又菩提心論以補處菩提為果攝故寶積經論以親緣果體名涅槃故雜集論以無變異名真如故寶性論以六十種德為佛性故無性論以無變異真如名菴羅識故勝鬘以離一切煩惱名空藏故佛地論以具十種功德為鏡智故此經論釋義也溫陵離幻復真常住不壞名常住果而見聽六用離塵無體焉取常住佛語阿難及諸大衆汝今云何自語矯亂大衆阿難俱時問佛我今云何名為矯亂佛言我問汝聞汝則言聞又問汝聲汝則言聲唯聞與聲報答無定如是云何不名矯亂阿難聲銷無響汝説無聞若實無聞聞性已滅同於枯木鐘聲更擊汝云何知知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者是故阿難聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無汝尚顛倒惑聲為聞何怪昏迷以常為斷終不應言離諸動靜閉塞開通説聞無性如重睡人眠熟床枕其家有人於彼睡時搗練舂米其人夢中聞舂搗聲別作他物或為擊鼓或為撞鐘即於夢時自怪其鐘為木石響於時忽寤遄知杵音自告家人我正夢時惑此舂音將為鼓響阿難是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏縱汝形銷命光遷謝此性云何為汝銷滅以諸衆生從無始來循諸色聲逐念流轉曾不開悟性淨妙常不循所常逐諸生滅由是生生雜染流轉若棄生滅守於真常常光現前根塵識心應時銷落想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺疏欲表圓根正修方便故扣鐘驗聞以顯耳根常住為一門深入之本聞無生滅境有生滅故聲聞各問今審辨也吳興佛語下舉所昧事驗妄識至昏而聞性不寐復恐謂昧雖不昧死則銷滅故重示云縱汝形銷性非遷改鎮澄讚曰深窮萬法同異俱生廣陳相續本無明妙體覺圓澄因業推懲法眼應時清傳如截流曰以上文會相歸性明清淨本然之藏體恆如即性成相言循業發現之心境常遍滿慈領是而且疑曰如世尊言果清淨也則山河大地諸有為相云何忽生果本然也又何次第遷流終而復始且土之剋水地性遍則水無所容火遇水亡則水性周而焉能有火加以地性障礙空性虗通又曷可以並驅有是諸疑欽渴慈誨世尊於是不直答其所問反詰其常所聞者蓋欲就其欵而導其迷也言妙明則不可不明言明妙又不可謂所明故曰本覺妙明性覺明妙滿慈曰唯然已聞者如阿難妄意同佛了義之謂也佛乃迎其所解兩徵之曰汝稱覺明為復性明稱名為覺為覺不明稱為明覺斯問也正謂平剖玉環施異餌任渠左右上吾竿而滿慈果曰若此不明名為覺者則無所明意謂不明者不得謂之本覺妙明也世尊述其辭而進之曰汝意謂若無所明則無明覺殊不知清淨本然之中云何更容他物故告之以有所非覺無所非明意滿慈疑何謂無所非明佛隨釋云無明又非覺湛明性是故無所不得謂之本覺妙明也何謂有所非覺文似隔句釋云性覺必明妄為明覺是故有所不得謂之性覺明妙也文以隔句釋者以滿慈所計在明但以無明又非覺湛明性一句杜其轉計隨執其所明之欵廣其説焉必者定計之辭定計覺際有明便非清淨本體故曰妄為明覺此妄識初萌即起信所稱業相是也覺非所明因明立所所既妄立生汝妄能無同異中熾然成異者無同異指上清淨本然之體一有所明而能斯隨之法爾而然也始則清淨本然今則能所雜沓故曰熾然成異此起信所稱轉相是也以能所熾然之異為異復立無能無所之同以異之故曰異彼所異因異立同也斯異之未遣而同斯立矣故同之與異相待宛然故曰同異發明由是更立無同以異乎同無異以異乎異故曰因此復立無同無異妙淨體中本無諸相今則能所迭生情塵日起故曰如是擾亂相待成搖勞久發塵自相混濁此起信所稱現相是也由是引起塵勞煩惱者由三細而致六粗也以能所為異為起是世界之因以無能所為同為靜是虗空之因故曰起為世界靜成虗空虗空為同世界為異也言彼無同異而曰真有為法者以相待妄立名濫本然故特示之此合同異而為有情業果之因結云如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始覺明即本覺妙明也明了知性即必明而妄為同異諸相者了屬妄心見屬妄眼但舉心眼而六亂妄想備焉故曰因了發相從妄見生諸有為相本此而已是故但令妄想頓息則山河大地無復發生達藏性本圓則地水火風又何窒礙色空傾奪良由背覺合塵依正互融妙在滅塵合覺前言諸佛習漏永息如木成灰不重為木如空華滅不復見華蓋得諸此惟此體也理由本具故若世出世而一切俱非事非緣生故是正是依而一切俱即惟其即非而離是則無即不非惟其即是而離非則無非不即互即也則均是互非也則雙離天台的約法華實相結示妙觀毫不異此如云空則一念寂然假則三千備矣而此體性非空非假即空即假是為不思議境是為無作行門又言介爾有心三千具足一念迷則二死相續一念悟則三德圓彰攝無量法門罄無不盡叔世才聞教觀絶如厲己而懷顰蹙者謂徹楞嚴可乎此下舉照鏡之喻蓋明妄本無因但能頓歇分別之識情無事劬勞肯綮而修證肯綮猶言斤骨麗其辭耳言三緣者即世界衆生業果之上攀緣之心是也三因者因此世界衆生業果引起分別緣影反緣三種相續為因也如達多因鏡中之頭以致狂走緣心若息鏡頭本空故曰三緣斷故即菩提心言菩提心生生滅心滅此但生滅至離合俱非此句方名無戲論法者展轉遣情也蓋緣心如波覺性似水但了波息而水湛毋計彼滅而此生一墮生滅秪益戲論故經要自一心廣及萬法遣至無遣無遣亦遣凡諸情計片雪紅爐然後躬行踐解始契首楞三昧也以上通明如來密因見道分竟今文又躡前密因以起萬行所謂全性起修始為究竟堅固必須起行者若秪談名理不䇿修證縱得妙悟但成狂慧故指菩提涅槃之尚遠責多聞薰習之無功阿難領藏心全體喻之如屋求所入之門世尊指常心圓根名決定二義為創修之要然二義泛明全體謂之慧覺圓通諸門獨選耳根始是最初方便至示攝心軌則安立道場通為修道分今第一義門令審因地不生滅心而示之以可作之法皆從變滅見聞覺知五疊渾濁者蓋不知其滅無以復常不知其濁無以旋湛故令先擇生死根本依不生滅圓湛性成以湛旋其虗妄滅生復還元覺得圓明覺無生滅性為因地心然後圓成果地修證言不生滅心者即初卷所謂常住真心性淨明體也此之心體既以喻之屋矣而復答其所請之門者蓋此一念發覺之心諸惑由是而伏斷果位由是而超入故得為門耳今第二義門令擇不生滅根先審煩惱根本者猶不知其結欲解弗能也識能致塵重喻賊媒降伏即前發兵討除之意斥六為賊媒無始纏縛隨舉世為遷流界為方位者將明流變三疊顯凡夫現量功德密啓即結是解庶可進修也言上下無位中無定方者此拂六存四以明流變三疊成千二百之數也如器內有的方之體始有四角之隅中無定方則四隅無寄矣流變三疊一十百千者初以三世四方宛轉相涉數成十二自十變百百變千本乎十二故成千二百也蓋衆生不離世界故佛權依世數用顯六根功德之量耳汝復于中克定優劣至汝今欲逆生死欲流當念此等六受用根誰合誰離等者此顯六根優劣令擇圓根為發行之由也性循生死決之而出曰欲流性合涅槃旋元自歸曰法流聖凡雖異流體不別故得于凡夫之根通稱六湛圓明阿難言云何深入一門能令六根一時清淨問含二疑蓋既稱六湛圓明不可謂逆流深入然後稱淨其疑一也若必欲逆流而後稱淨則此六根織妄相背又不可謂一入六淨其疑二也言汝今已滅三界衆生世間見所斷惑然猶未知根中積生無始虗習何況此中生住異滅分齊頭數者此釋初疑由其有如是濁惑務須逆流深入然後為淨也言今汝且觀現前六根為一為六至辨非一非六者此釋次疑由其一六俱非故得一入六淨也更觀太虗元非同異則妙心豈定一多由粘湛以奔逸是為濁流不循塵而伏歸遂發明耀故有證性不因六根可喻合眼猶能一辨達聲銷而聞恆在形𥧌而性不昏如是則斷滅之慮灑然七常住果復何疑附秋溟居士殷白野牛首山夜坐閲楞嚴至此詩云一軸楞嚴閲未終四山風靜暮林空忽逢華屋身能入自得神珠道不窮樹影欲迷雲度處經聲遙聽月明中共傳鹿鳥春深後猶向煙蘿禮法融又書于座右云坐如是山中觀如是世界對如是經文必其人如氷庶情與境合不負此緣不然如玉壺中糞團耳音釋蚋如稅切灘音但藪音叟絞古巧切曷烏葛切礦古猛切霾音埋羼初限也怛當割切綮棄挺切汩音骨貿音茂劑才詣切萄音桃恬徒亷切摶音團殑其正切黯烏懺切矯居小切遄市緣切顙蘇朗切
