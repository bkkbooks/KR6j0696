body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第六耳根圓通文六爾時觀世音菩薩即從座起頂禮佛足而白佛言世尊憶念我昔無數恒河沙劫於時有佛出現於世名觀世音我於彼佛發菩提心初敘古因修疏爾時下釋菩薩名者若約觀世言音圓悟圓應則觀是自智音是他機若約妙音觀音梵音海潮則觀是隨德之名音是應名之德即自行化他之二用又若聽根說法則觀音者是鑑機之妙智非耳目聞見之境也溫陵所師之佛亦名觀音者因果相符古今一道也疏按觀音授記經言菩薩於過去金光師子遊戲如來所發菩提心皆示迹不同也今釋此心有無量義大乘集菩薩學論云菩提心者謂勸發大悲歡喜愛敬義故又觀音經云發正覺心者善利一切眾生故觀音不空祕密王經云菩提者即是正慧薩埵者即是方便又寶積經論云菩提是智性餘波羅密依彼智生此四菩提即悲智為體又法界無差別論云菩提心者是不思議果因如白月初分故又云菩提心於不淨位中名眾生心於淨染位中名菩薩於清淨位中名如來又發菩提心論云菩提有四種發心謂信解行證此諸菩提約因果解行說故叉法界論云菩提心於一切眾生身中有十種差別所謂無作以無為故無初以無起故無盡以無滅故無染著以自性清淨故無形相以無根故聖所行是諸佛境界故此菩提者是約理說又金剛三業大教王經五方如來於菩提心各有所說謂阿閦如來以諸法無生無我等說寶生如來以諸法無性離相等說彌陀如來以非性非無性等說不空如來以無得無證等說毗盧如來以離蘊處界無取捨平等性所說此諸菩提皆約般若相說故又寶積經論云有四法忘失菩提心謂欺誑阿闍黎等故經云發菩提者其心正直無有諂誑欲修耳根圓通者先須發此大道心也彼佛教我從聞思修入三摩地初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅生滅既滅寂滅現前忽然超越世出世間十方圓明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力二者下合十方一切六道眾生與諸眾生同一悲仰世尊由我供養觀音如來蒙彼如來授我如幻聞薰聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土彼佛下敘修證法門謂聞等三慧義順耳根所以此經為正修行從初於聞中至了然不生聞慧也次如是漸增至聞所聞盡思慧也覺所覺空至寂滅現前者即修慧也瑜伽以三賢為聞所成地以加行為思所成地十地為修所成地吳興於此節文為四並約耳門修證言之亦不相違也言入流者流謂法性所謂音塵塵動性靜今初入流則知法性本寂音塵亦亡故動靜不生如是下以智遣情至無所遣亡情絕解則寂滅現前矣忽然超越者次言同體之功故與生佛合其悲仰聞熏聞修金剛三昧者謂始從熏習訖乎修證皆以決定智斷究竟堅固而為正受世尊若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為說法令其解脫若諸有學寂靜妙明勝妙現圓我於彼前現獨覺身而為說法令其解脫若諸有學斷十二緣緣斷勝性勝妙現圓我於彼前現緣覺身而為說法令其解脫若諸有學得四諦空修道入滅勝性現圓我於彼前現聲聞身而為說法令其解脫若諸眾生欲心明悟不犯欲塵欲身清淨我於彼前現梵王身而為說法令其解脫若諸眾生欲為天主統領諸天我於彼前現帝釋身而為說法令其成就若諸眾生欲身自在遊行十方我於彼前現自在天身而為說法令其成就若諸眾生欲身自在飛行虗空我於彼前現大自在天身而為說法令其成就若諸眾生愛統鬼神救護國土我於彼前現天大將軍身而為說法令其成就若諸眾生愛統世界保護眾生我於彼前現四天王身而為說法令其成就若諸眾生愛生天宮驅使鬼神我於彼前現四天王國太子身而為說法令其成就三十二應以普門身隨宜說法初無定形名三十二應一四聖者初菩薩以勝解力入徧知海但未現證故為現佛身令彼成就勝妙即寂靜之心緣斷即還滅之性言勝性者各據所獲勝妙言之次六凡者梵王自在欲色二界之王欲界第六名自在天居色頂者名大自在天將軍為帝釋上將四天王臣于帝釋太子即那吒之類能驅鬼神此皆臣輔屬也若諸眾生樂為人王我於彼前現人王身而為說法令其成就若諸眾生愛生族姓世間推讓我於彼前現長者身而為說法令其成就若諸眾生愛談名言清淨自居我於彼前現居士身而為說法令其成就若諸眾生愛治國土剖斷邑我於彼前現宰官身而為說法令其成就若諸眾生愛諸數術攝衛自居我於彼前現婆羅門身而為說法令其成就若有男子好學出家持諸戒律我於彼前現比丘身而為說法令其成就若有女人好學出家持諸禁戒我於彼前現比丘尼身而為說法令其成就若有男子樂持五戒我於彼前現優婆塞身而為說法令其成就若有女子五戒自居我於彼前現優婆夷身而為說法令其成就若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為說法令其成就若有眾生不壞男根我於彼前現童男身而為說法令其成就若有處女愛樂處身不求侵暴我於彼前現童女身而為說法令其成就若有諸天樂出天倫我現天身而為說法令其成就若有諸龍樂出龍倫我現龍身而為說法令其成就若有藥叉樂度本倫我於彼前現藥叉身而為說法令其成就若乾闥婆樂脫其倫我於彼前現乾闥婆身而為說法令其成就若阿修羅樂脫其倫我於彼前現阿修羅身而為說法令其成就若緊那羅樂脫其倫我於彼前現緊那羅身而為說法令其成就若摩呼羅伽樂脫其倫我於彼前現摩呼羅伽身而為說法令其成就若諸眾生樂人修人我現人身而為說法令其成就若諸非人有形無形有想無想樂度其倫我於彼前皆現其身而為說法令其成就是名妙淨三十二應入國土身皆以三昧聞熏聞修無作妙力自在成就人王以位統民長者以德命族居士隱身放言宰官以政蒞國婆羅門術數治生皆世間屬也比丘四眾乞法守戒近事三寶天子之后曰女主君之妻曰君夫人妻因夫榮曰命婦輔治內宮曰大家皆國屬也藥叉名輕捷能飛行也乾闥婆名香陰帝釋樂臣也阿修羅名無端正女美男醜也緊那羅名疑神人形頭角也摩呼羅名腹行此云蟒也非人等者該其餘應如六字章句經或現作餓鬼手出香色乳乃至作淫女為度貪眾生世尊我復以此聞熏聞修金剛三昧無作妙力與諸十方三世六道一切眾生同悲仰故令諸眾生於我身心獲十四種無畏功德一者由我不自觀音以觀觀者令彼十方苦惱眾生觀持念其音聲即得解脫二者知見旋復令諸眾生設入大火火不能燒三者觀聽旋復令諸眾生大水所漂水不能溺四者斷滅妄想心無殺害令諸眾生入諸鬼國鬼不能害五者熏聞成聞六根銷復同於聲聽能令眾生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無搖動六者聞熏精明明徧法界則諸幽暗性不能全能令眾生藥叉解同前羅剎連疫鬼鳩槃茶鬼厭魅鬼及毗舍遮噉精氣鬼富單那熱病鬼等雖近其傍目不能視七者音性圓銷觀聽返入內無所係離諸塵妄外無所累能令眾生禁繫枷鎻所不能著八者滅音圓聞內外無待徧生慈力能令眾生徑過險路逆境賊煩惱不能劫十四無畏以能脫苦總稱無畏不隨前塵所起知見名不自觀故令有苦眾生蒙我真觀皆得解脫此是總德其下皆以不循塵為觀故通云旋復知見屬火觀聽屬水二者旋復則不能燒溺鬼性殺害從妄想生斷滅妄想則鬼不能害熏聞成性六根俱復則聲聽同體根塵無間故刀段段壞割水吹光言無分隔也聞熏精明者熏聞久精明則發明暗之體性不兩全故鬼不能視音性圓消則體性無局故禁繫枷鎻所不能著滅音圓聞則物我不敵故賊不能劫又音聞圓徧則慈力亦徧慈無敵故無能為賊者九者熏聞離塵色所不劫能令一切多婬眾生遠離貪欲十者純音無塵根境圓融無對所對能令一切忿恨眾生離諸瞋恚十一者銷塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦永離癡暗十二者融形復聞不動道場涉入世間不壞世界能徧十方供養微塵諸佛如來各各佛邊為法王子能令法界無子眾生欲求男者誕生福德智慧之男十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來祕密法門受領無失能令法界無子眾生欲求女者誕生端正福德柔順眾人愛敬有相之女十四者此三千大千世界百億日月現住世間諸法王子有六十二億恒河沙數修法垂範教化眾生隨順眾生方便智慧各各不同由我所得圓通本根發妙耳門然後身心微妙含容周徧法界能令眾生持我名號與彼共持六十二億恒河沙諸法王子二人福德正等無異世尊我一名號與彼眾多名號無異由我修習得真圓通是名十四施無畏力福備眾生九者下欲由習境而生今離塵遠色則根境不偶故令多淫眾生遠離貪欲溫陵曰瞋由違情所起對境而發音性純淨無復所妄故圓融無違無能所對則不瞋矣痴以習暗成性為根本無明性障今以銷鎔塵妄旋復真明身心垢淨故性障永離阿顛迦此云無善心亦性障也疏十二下融形則體無質礙故涉界不壞復聞則性無邇遙故不動而徧供佛則福足為法王子則紹繼之道故能應其求溫陵圓故無二通故含界明照則大圓鏡之質含界則空如來藏之體故能承順法門受領無失承順即坤儀柔德受領即閨門能事有女之道故能應其求也疏十四下較量福勝耳根為順聞思名正修行故稱名福勝又入大乘論說福勝者是稱觀音法身法身是常以應化身者是無常故已上功德有復有銷有徧有圓有融有通漸次深入世尊我又獲是圓通修證無上道故又能善獲四不思議無作妙德一者由我初獲妙妙聞心心精遺聞見聞覺知不能分隔成一圓融清淨寶覺故我能現眾多妙容能說無邊祕密神呪其中或現一首三首五首七首十首十一首如是乃至一百八首千首萬首八萬四千礫迦羅首二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目或慈或威或定或慧救護眾生得大自在二者由我聞思脫出六塵如聲度垣不能為礙故我妙能現一一形誦一一呪其形其呪能以無畏施諸眾生是故十方微塵國土皆名我為施無畏者三者由我修習本妙圓通清淨本根所遊世界皆令眾生捨身珍寶求我哀愍四者我得佛心證於究竟能以珍寶種種供養十方如來傍及法界六道眾生求妻得妻求子得子求三昧得三昧求長壽得長壽如是乃至求大涅槃得大涅槃佛問圓通我從耳門圓照三昧緣心自在因入流相得三摩地成就菩提斯為第一世尊彼佛如來歎我善得圓通法門於大會中授記我為觀世音號由我觀聽十方圓明故觀音名徧十方界四不思議一能現多名不思議妙妙聞心即中中流入之心溫陵言初獲者指本因也首為六用之總臂表提接之悲目為照了之智各依本數充之以至八萬四千表依根本智用泛應塵勞也一體之中萬法咸備而繼二十四聖示現者明彼分具圓會於此也爍迦羅云金剛堅固母陀羅云印手慈以攝化威以折伏定以復湛慧以開覺通指眾多妙容也疏密部神呪多觀音所說能安樂眾生名施無畏捨身珍寶者普門品云仁者愍吾等故受此瓔珞即求哀之事爾時世尊於師子座從其五體同放寶光遠灌十方微塵如來及法王子諸菩薩頂彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢林木池沼皆演法音交光相羅如寶絲網是諸大眾得未曾有一切普獲金剛三昧即時天雨百寶蓮華青黃赤白間錯粉糅十方虗空成七寶色此娑婆界大地山河俱時不現唯見十方微塵國土合成一界梵唄詠歌自然敷奏爾時下至梵唄詠歌自然敷奏總顯圓通之瑞於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢各說最初成道方便皆言修習真實圓通彼等修行實無優劣前後差別我今欲令阿難開悟二十五行誰當其根兼我滅後此界眾生入菩薩乘求無上道何方便門得易成就文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神說偈對佛覺海性澄圓圓澄覺元妙元明照生所所立照性亡迷妄有虗空依空立世界想澄成國土知覺乃眾生空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有歸元性無二方便有多門聖性無不通順逆皆方便初心入三昧遲速不同倫六選擇圓通偈中初二句頌本覺之體次二句明迷妄之端迷生世界妄有眾生所謂當知虗空生汝心內是也是則歸源之性理無有二而修證之道則有多門雖聖性即逆順皆可在初心則有遲速所以諸聖圓通不無簡擇色想結成塵精了不能徹如何不明徹於是獲圓通音聲雜語言但依名句味一非含一切云何獲圓通香以合中知離則元無有不恒其所覺云何獲圓通味性非本然要以味時有其覺不恒一云何獲圓通觸以所觸明無所不明觸合離性非定云何獲圓通法稱為內塵憑塵必有所能所非徧涉云何獲圓通見性雖洞然明前不明後四維虧一半云何獲圓通鼻息出入通現前無交氣支離匪涉入云何獲圓通舌非入無端因味生覺了味亡了無有云何獲圓通身與所觸同各非圓覺觀涯量不冥會云何獲圓通知根雜亂思湛了終無見想念不可脫云何獲圓通色想下初簡六塵伊惟也舌入非無端乃亦因味身有中邊二義故為涯量不冥會者因觸知身也亂思動相故非湛了識見雜三和詰本稱非相自體先無定云何獲圓通心聞洞十方生于大因力初心不能入云何獲圓通鼻想本權機祗令攝心住住成心所住云何獲圓通說法弄音文開悟先成者名句非無漏云何獲圓通持犯但束身非身無所束元非徧一切云何獲圓通神通本宿因何關法分別念緣非離物不離物則有所著云何獲圓通若以地性觀堅礙非通達有為非聖性云何獲圓通若以水性觀想念非真實如如非覺觀云何獲圓通若以火性觀厭有非真離非初心方便云何獲圓通若以風性觀動寂非無對對非無上覺云阿獲圓通若以空性觀昏鈍先非覺無覺異菩提云何獲圓通若以識性觀觀識非常住存心乃虗妄云何獲圓通諸行是無常念性元性滅因果今殊感云何獲圓通識見下次簡六識識雜根塵詰之無本大因力者謂法界行所生故不宜初心權機謂止孫陀之散亂故權為觀白音文為開先已成就之者故與之說法又持地平填功涉有為月光水觀想非真實烏芻火觀是厭欲非真琉璃光風觀而性有動靜空性晦昧則昏鈍無覺識性分別則性非常住勢至都攝六根故諸行無常果則斷滅我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入離苦得解脫良哉觀世音歎觀世言音脫苦與樂也於恒沙劫中入微塵佛國得大自在力歎三十二應無畏施眾生歎四不思議十四無畏妙音觀世音歎隨德之名梵音海潮音歎隨名之實救世悉安寧歎眾德出世獲常住能救世間苦能與出世樂我今啟如來如觀音所說譬如人靜居十方俱擊鼓十處一時聞此則圓真實目非觀障外口鼻亦復然身以合方知心念紛無緒隔垣聽音響遐邇俱可聞五根所不齊是則通真實音聲性動靜聞中為有無無聲號無聞非實聞無性聲無既無滅聲有亦非生生滅二圓離是則常真實縱令在夢想不為不思無覺觀出思惟身心不能及溫陵聖人設教隨方不同此方教體必籍音聞亦隨機之宜也離苦者嘆十四無畏入微塵國嘆三十二應得大自在嘆四不思議餘皆隨德之名說法無滯名妙音尋聲救苦為觀音音性無著為梵音應不失時為潮音音性動靜皆屬聲塵耳根圓離不隨生滅是則常性之真也無聲號無聞指阿難聞鐘之事今此娑婆國聲論得宣明眾生迷本聞循聲故流轉阿難縱強記不免落邪思豈非隨所淪旋流復無妄阿難汝諦聽我承佛威力宣說金剛王如幻不思議佛母真三昧汝聞微塵佛一切祕密門欲漏不先除畜聞成過誤將聞持佛佛何不自聞聞聞非自然生因聲有名字返聞與聲脫能脫欲誰名一根既返源六根成解脫見聞如幻翳通指妄根三界若空華通指妄境聞復翳根除塵銷覺圓淨淨極光通達寂照含虗空根解脫却來觀世間猶如夢中事境解脫摩登伽在夢誰能留汝形如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性六根亦如是元依一精明分成六和合一處成休復六用皆不成塵垢應念銷成圓明淨妙餘塵尚諸學明極即如來大眾及阿難旋汝倒聞機反聞聞自性性成無上道圓通實如是此是微塵佛一路涅槃門過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法我亦從中證非唯觀世音誠信允之辭如佛世尊詢我諸方便以救諸末劫求出世間人成就涅槃心觀世音為最自餘諸方便皆是佛威神即就事捨脫塵勞非是長修學淺深同說法頂禮如來藏無漏不思議願加彼未來於此門無惑方便易成就堪以教阿難及末劫沉淪但以此根修圓通超餘者二十四聖真實心如是疏聲論者依聲所論義理發明即名句文身三為教體眾生下言循聲之咎聞非有名對聲塵故有若能反聞自性外脫根塵則復以誰名為聞哉見聞為根三界為塵聞復則根翳自除塵消則覺心本淨反觀世間猶如夢事然則摩登伽女正在夢中誰能留汝形骸使不解脫哉諸根喻有為生滅一機謂妄心造作溫陵成就涅槃妙心不生滅性唯耳根為然餘則佛之威神加被今即己事而捨塵勞非始終長修淺深同說之法也五修證分文三一四重伏斷於是阿難及諸大眾身心了然得大開示觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路普會大眾天龍八部有學三乘及諸一切新發心菩薩其數凡有十恒河沙皆得本心遠塵離垢獲法眼淨性比丘尼聞說偈已成阿羅漢無量眾生皆發無等等阿耨多羅三藐三菩提心阿難整衣服於大眾中合掌頂禮心迹圓明悲欣交集欲益未來諸眾生故稽首白佛大悲世尊我今已悟成佛法門是中修行得無疑惑常聞如來說如是言自未應度先度人者菩薩發心自覺己圓能覺他者如來應世我雖未度願度末劫一切眾生世尊此諸眾生去佛漸遠邪師說法如恒河沙欲攝其心入三摩地云何令其安立道場遠諸魔事於菩提心得無退屈爾時世尊於大眾中稱讚阿難善哉善哉如汝所問安立道場救護眾生末劫沈溺汝今諦聽當為汝說阿難大眾唯然奉教佛告阿難汝常聞我毗奈耶中宣說修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學疏初明伏斷者夫欲儲淨法先滌身器將越愛流前鳩行楫故嚴宣四重品戒為入修方便葢木叉義遠草系情殷是以切身口而流訓因動靜以研幾阿難下說四波羅夷及安立道場所以明第一發心之修證乃至不起於座獲須陀洹示得果之相也夫阿難雖未得度而悲及後來乃菩薩發心然起行之初慮妨邪誤故問諸方便遠於魔事也戒定慧學大小均修故于此中初明三學以為決定進修之旨也阿難云何攝心我名為戒若諸世界六道眾生其心不婬則不隨其生死相續汝修三昧本出塵勞婬心不除塵不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女彼等諸魔亦有徒眾各各自謂成無上道我滅度後末法之中多此魔民熾盛世間廣行貪淫為善知識令諸眾生落愛見坑失菩提路汝教世人修三摩地先斷心淫是名如來先佛世尊第一決定清淨明誨是故阿難若不斷淫修禪定者如蒸砂石欲其成飯經百千劫秪名熱砂何以故此非飯本砂石成故汝以淫身求佛妙果縱得妙悟皆是淫根根本成婬輪轉三途必不能出如來涅槃何路修證必使淫機身心俱斷斷性亦無於佛菩提斯可希冀如我此說名為佛說不如此說即波旬說眾生纏綿生死皆因淫欲故首此為戒阿難又諸世界六道眾生其心不殺則不隨其生死相續汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎彼諸鬼神亦有徒眾各各自謂成無上道我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路阿難我令比丘食五淨肉此肉皆我神力化生無本命根汝婆羅門地多蒸溼加以砂石草菜不生我以大悲神力所加因大慈悲假名為肉汝得其味奈何如來滅度之後食眾生肉名為釋子汝等當知是食肉人縱得心開似三摩地皆大羅剎報終必沈生死苦海非佛弟子如是之人相殺相吞相食未已云何是人得出三界汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大叫求人不聞此等名為欲隱彌露清淨比丘及諸菩薩於岐路行不蹋生草況以手拔云何大悲取諸眾生血肉充食若諸比丘不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酧還宿債不遊三界何以故服其身分皆為彼緣如人食其地中百穀足不離地必使身心於諸眾生若身身分身心二塗不服不食我說是人真解脫者如我此說名為佛說不如此說即波旬說孤山律明三淨謂不見不聞疑為我殺今言五者及自死鳥殘也溫陵修禪行殺是欲隱彌露不故蹋不故拔仁慈以至猶及草木況食眾生肉耶身謂血肉等身分謂酪等身服心貪是為二途阿難又復世界六道眾生其心不偷則不隨其生死相續汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魅所著彼等羣邪亦有徒眾各各自謂成無上道我滅度後末法之中多此妖邪熾盛世間潛匿姦欺稱善知識各自謂己得上人法詃惑無識恐令失心所過之處其家耗散我教比丘循方乞食令其捨貪成菩提道諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返云何賊人假我衣服裨販如來造種種業皆言佛法却非出家具戒比丘為小乘道由是疑誤無量眾生墮無間獄若我滅後其有比丘發心決定修三摩提能於如來形像之前身然一燈燒一指節及於身上爇一香炷我說是人無始宿債一時酬畢長揖世間永脫諸漏雖未即明無上覺路是人於法已決定心若不為此捨身微因縱成無為必還生人酬其宿債如我馬麥正等無異汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復若諸比丘衣鉢之餘分寸不畜乞食餘分施餓眾生於大集會合掌禮眾有人捶詈同於稱讚必使身心二俱捐捨身肉骨血與眾生共不將如來不了義說迴為己解以誤初學佛印是人得真三昧如我所說名為佛說不如此說名波旬說比丘行乞本為除貪故不自熟食旅泊者以去為事也溫陵一切難捨無過己身難捨尚捨況餘貪愛其或身雖行捨心尚貪求則徒增黑業無益於道亦於佛法非決定心孤山盜者取他依報資乎己身今損正報以供賢聖故無始宿債一時酬畢阿難如是世界六道眾生雖則身心無殺盜淫三行已圓若大妄語即三摩地不得清淨成愛見魔失如來種所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養是一顛迦銷滅佛種如人以刀斷多羅木佛記是人永殞善根無復知見沈三苦海不成三昧我滅度後勅諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉或作沙門白衣居士人王宰官童男童女如是乃至婬女寡婦姦偷屠販與其同事稱讚佛乘令其身心入三摩地終不自言我真菩薩真阿羅漢洩佛密因輕言未學唯除命終陰有遺付云何是人惑亂眾生成大妄語汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨是故阿難若不斷其大妄語者如刻人糞為旃檀形欲求香氣無有是處我教比丘直心道場於四威儀一切行中尚有虗假云何自稱得上人法譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招紆曲求佛菩提如噬臍人欲誰成就若諸比丘心如直絃一切真實入三摩地永無魔事我印是人成就菩薩無上知覺如我所說名為佛說不如此說名波旬說溫陵四果十地未得謂得故大妄語貪人供養求己尊勝名愛見魔貝多羅木斷則不生大妄語人善根永絕疏已上四重名根本煩惱九品所斷各有淺深如三結斷名須陀洹薄貪瞋痴名為三果故身肉骨血與眾生共此斷身見也示一往還去已無反此斷戒取也是人於法能決定心此斷疑也楞伽云須陀洹身見者謂緣起妄想身相妄想身見斷貪則不生云何不取戒謂善見受生處苦相故云何疑相斷謂不於餘處大師見為淨不淨故知四重皆地上伏斷鎮澄讚曰觀音玅觀獨拔圓根一根既返六歸元請佛涅槃門定慧重開永劫度沉淪傳如截流曰觀音將陳所證追敘於無量恒沙劫前之事者密顯性本圓通且真常也有佛出世名觀世音者所師為圓通之師師資名同古今一道也觀即如幻金剛觀察世音謂十界音聲惟音可觀廼謂圓通從聞思修入三摩地者稟師之教諦審損益故得證入也當機固稱多聞曾未及此特以是啟之初於聞中入流亡所者凡夫耳根發識為聞聞識奔境為流今觀音觀聽反入故曰入流能滅音圓聞故曰亡所上所指聲塵下所指入流以流內伏外塵自銷故曰所入既寂動靜二相了然不生如是漸增聞所聞盡者以獲玅玅聞心心精遺聞故得曰盡即前云此根初解先得人空也覺有盡聞之盡是亦不盡故曰盡聞不住覺所覺空即空性圓明成法解脫也空覺極圓空所空滅者即空覺之空亦空所謂俱空不生也生滅者外塵內根及以識心諸有惑業皆名生滅之法今悉空空故曰既滅以既滅則不復更滅故曰寂滅彌滅彌顯是曰現前彌超彌同故上合十方諸佛本玅覺心與佛如來同一慈力以三十二應入諸國土下合十方一切六道眾生與諸眾生同一悲仰施十四無畏福備眾生及現眾多玅容能說無邊神呪斯皆亡所遺聞朗徹廓照所致結云佛問圓通我從圓照三昧緣心自在因入流相得三摩地成就菩提斯為第一或疑三十二應菩薩却現佛身十四無畏沉迷即離苦惱身心含廣莫之法界作用現眾多之手眼皆為表法曾無實證噫斯非自生障礙蔑彼圓通者耶當知觀音為正法明如來何獨泥對揚之跡眾生能感應道交奚難離幻妄之苦俛仰再撫于四海且為緣慮之知身心互徧於十方始是遺聞之玅魚之成龍頭角遂異人之登聖手眼固神毋自望洋拘墟請事入流亡所仍藉大悲光耀一示本來面目始信聖言聖證未之或欺也然諸聖既陳圓通而釋尊五體放光遠灌微塵如來微塵如來亦于五體同放寶光來灌佛頂者葢表淨極光通極果所同也彼界此土菩薩羅漢光亦灌頂者表因果互融所陳所證一一無上也林木池沼皆演法音寶光相羅如寶絲網者信山河大地無非如來藏無非玅莊嚴也斯為希有之瑞故令一切普獲金剛三昧金剛喻斷惑之速獲即初住真因之位也以踐正位故天亦以諸瑞應之真因智中十界圓彰則成百界故天雨百寶蓮華青黃赤白間雜粉糅者住行向地或超或次遞遞涉入也十方虗空成七寶色者從寂滅體中克七常住果也入圓通常門習漏永除依正不隔是故娑婆山河俱時不現微塵國土合成一界也梵唄歌咏自然敷奏者表證入之人無作法音皆如是也圓通法門止此於是佛告文殊師利汝今觀此諸大菩薩及阿羅漢各說最初成道方便彼等修行實無優劣前後差別者聖性無不通也以無不通故感諸瑞如此我今欲令阿難開悟二十五行誰當其根兼我滅度此界眾生入菩薩乘何方便門得易成就文殊奉勅唯擇耳根者所謂偏為當機也偈稱覺海性澄圓圓澄覺元玅者即前所云本覺玅明性覺明玅是也將擇圓通之根先標圓通之體著一海字便見入流之意下云旋流獲無妄葢本於此元明照生所者元明本玅覺明也從元明而妄發所照故曰所立所照既立真性遂晦故曰照性亡照性者起照之真性也迷妄有虗空因空立世界者即晦昧為空空晦暗中結暗為色也想澄成國土知覺廼眾生者即色雜妄想想相為身也葢一因所妄依正斯分則澄玅之體莫得而圓莫得而通即一迷為身決定惑為色身之內也空生大覺中如海一漚發漚滅空本無況復諸三有者此明覺體本周一不循塵圓通之體本無涯量故淨極光通達寂照含虗空行人得此諸境咸玅故却來觀世間猶如夢中事將聞持佛佛何不自聞聞者佛佛者諸佛所談覺性也此之覺體即吾真聞不能聞聞何知佛佛故策云大眾及阿難旋汝倒聞機反聞聞自性阿難大眾聞是開示觀佛菩提及大涅槃如遠遊人未得歸還明了其家所歸道路者前云慧覺圓通及辯圓通本根但明起行之由故曰知路而已若欲還家必須俶裝故請攝心軌則安立道場至示五十五位真菩提路正明萬行修證也戒定慧三通稱無漏者葢眾生覺海本自圓澄以粘湛發識流逸奔境名漏今依清淨律儀制止身心內瑩發光三摩正定圓通玅慧皆具于此佛以婬殺盜妄一一宣其重過劇稱決定明誨復言不如此說即波旬說者葢此戒相本是易知易解之法為難受難持之行輪迴苦本安樂玅常莫不由斯觀佛諄諄切切寧弗媿死死音釋驅丘于切毳音翠靴許瓜切耗音好詃古犬切裨音卑揖伊入切巵音支捶之累切詈力智切泄思列切誅音朱噬音逝絃音言
