body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第三如來藏之二疏此從六入至十八界總有三科夫三科之門攝盡萬法故一切經無不說此俱舍云入亦名根根依增上立名入以來門為義又法界無差別論云不空如來藏有過恒沙佛法是故經標陰入處界所以即相而談性言妙真如者所以即性而融相也勝鬘云依如來藏有生死依如來藏有涅槃此則歸根指體所以示迷悟之源也復次阿難云何六入本如來藏妙真如性阿難即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相因於明暗二種妄塵發見居中吸此塵象明暗名為見性此見離彼明暗二塵畢竟無體如是阿難當知是見非明暗來非於根出不於空生何以故若從明來暗即隨滅應非見暗若從暗來明即隨滅應無見明若從根目生必無明暗如是見精本無自性若於空出前矚塵象歸當見根又空自觀何關汝入是故當知眼入虗妄本非因緣非自然性疏即彼目睛者指前勞目之事以菩提性中本無眼等塵勞名相故以瞪勞為喻溫陵由塵發見因根吸塵故名眼入然有三科即彼目睛下依真起妄因於明暗下辨妄無實是故當知下明妄即真阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲兼耳與勞同是菩提瞪發勞相因於動靜二種妄塵發聞居中吸此塵象動靜名聽聞性此聞離彼動靜二塵畢竟無體如是阿難當知是聞非動靜來非於根出不於空生何以故若從靜來動即隨滅應非聞動若從動來靜即隨滅應無覺靜若從根耳生必無動靜如是聞體本無自性若於空出有聞成性即非虗空又空自聞何關汝入是故當知耳入虗妄本非因緣非自然性疏耳聞動靜猶目見明暗也言非動靜來者破計情也故超日明經云色受想行識眼耳鼻身心及地水火風空皆無所從來無所至去緣合則有緣離則滅如幻如化故下經云當處發生隨處滅盡即斯旨也阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣兼鼻與勞同是菩提瞪發勞相因於通塞二種妄塵發聞居中吸此塵象通塞名齅聞性此聞離彼通塞二塵畢竟無體闕文當知是聞非通塞來非於根出不於空生何以故若從通來塞則聞滅云何知塞如因塞有通則無聞云何發明香臭等觸若從根生必無通塞如是聞機本無自性若從空出是聞自當迴齅汝鼻空自有聞何關汝入是故當知鼻入虗妄本非因緣非自然性疏畜縮氣也冷因畜有不畜本無然鼻聞通塞亦猶耳聞動靜也而覺知以塵為相故離彼無有則非唯緣彼而生而亦即彼為體也故知明暗動靜乃至離合生滅之塵與今見聞覺知之性混而為一本如來藏中妙真如性矣阿難譬如有人以舌䑛吻熟䑛令勞其人若病則有苦味無病之人微有甜觸由甜與苦顯明此舌根不動之時淡性常在兼舌與勞同是菩提瞪發勞相因甜苦淡二種妄塵發知居中吸此塵象甜苦甛名知味性此知味性離彼甜苦及淡二塵畢竟無體如是阿難當知如是嘗苦淡知非甜苦來非因淡有又非根出不於空生何以故若甜苦來淡則知滅云何知淡若從淡出甜即知亡復云何知甜苦二相若從舌生必無甜淡及與苦塵斯知味甜苦淡根本無自性若於空出虗空自味非汝口知又空自知何關汝入是故當知舌入虗妄本非因緣非自然性疏䑛以舌取味也熟䑛令勞甚言取著之狀阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷若熱功勝冷者成熱如是以此合覺之觸顯於離知涉勢若成因於勞觸皆因觸致兼身與勞同是菩提瞪發勞相因於離合二種妄塵發覺居中吸此塵象離合名知覺性此知覺體離彼離合違順二塵畢竟無體如是阿難當知是覺非離合來非違順有不於根出又非空生何以故若合時來離當已滅云何覺離違順二相亦復如是若從根身出必無離合違順四相則汝身知元無自性必於空出空自知覺何關汝入是故當知身入虗妄本非因緣非自然性疏身入之覺由觸所顯葢以離觸之時覺知此身無合之覺是以合覺顯於離知也阿難譬如有人勞倦則眠睡熟便寤覽塵斯憶失憶為忘是其顛倒生住異滅吸習中歸不相踰越稱意知根兼意與勞同是菩提瞪發勞相因於生滅二種妄塵集知居中吸撮內塵生滅見聞逆流流不及地名覺知性此覺知性離彼寤寐生滅二塵畢竟無體如是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生何以故若從寤來寐即隨滅將何為知寤必生時有滅即同無令誰受滅若從滅有生即滅無誰知生者若從根意出寤寐二相隨身開合離斯二體此覺知者同於空華畢竟無性若從空生自是空知何關汝入是故當知意入虗妄本非因緣非自然性疏意以生滅為性而其體不出憶忘眠寤之境由四相妄遷名曰顛倒吸撮內塵即見聞逆流也塵流逆內無間即滅即不相違越名不及地此言意根之處葢如斯而已故曰畢竟無體則虗妄可知矣按婆沙云歸趨是意業謂五根各別所行意則總領受彼所行及彼境界能歸趣彼作諸事業故名意根資中莊周云其寤也形開其寐也魂交寤寐二相自是形之開合而覺知之性離斯二者故如空華復次阿難云何十二處本如來藏妙真如性阿難汝且觀此祇陀樹林及諸泉池於意云何此等為是色生眼見眼生色相阿難若復眼根生色相者見空非色色性應銷銷則顯發一切都無色相既無誰明顯空質空亦如是若復色塵生眼見者觀空非色見即銷亡亡則都無誰明空色是故當知見與色空俱無處所即色與見二處虗妄本非因緣非自然性疏顯宗論云處謂生門心心所法於中生長故名為處是能生長彼作用義故然前談六入則以塵對辨今十二處則以根對揚由根塵同源法不孤立也汝且下以能生破所生謂若眼生色相則眼為能生色為所生然見空之時既無所生之色則色性應銷色銷則誰明空質乎謂無色則不能顯空也若復下謂若色生眼見則色為能生眼為所生然觀空之時既無所生之眼則見性應銷見銷則以誰明空色乎此明眼色二處俱無生也阿難汝更聽此祇陀園中食辦擊鼓眾集撞鐘鐘鼓音聲前後相續於意云何此等為是聲來耳邊耳往聲處阿難若復此聲來於耳邊如我乞食室羅筏城在祇陀林則無有我此聲必來阿難耳處目連迦葉應不俱聞何況其中一千二百五十沙門一聞鐘聲同來食處若復汝耳往彼聲邊如我歸住祇陀林中在室羅城則無有我汝聞鼓聲其耳已往擊鼓之處鐘聲齊出應不俱聞何況其中象馬牛羊種種音響若無來往亦復無聞是故當知聽與音聲俱無處所即聽與聲二處虗妄本非因緣非自然性溫陵我入城祇林無我喻聲來耳則餘處無聲然千眾皆聞則聲非來耳疏聲非來耳以明聲處無生也無聞者聞無聞性也聞尚無聞安有往來之事阿難汝又齅此鑪中旃檀此香若復然於一銖室羅筏城四十里內同時聞氣於意云何此香為復生旃檀木生於汝鼻為生於空阿難若復此香生於汝鼻稱既云鼻所生當從鼻出鼻非旃檀云何鼻中有旃檀氣稱既云汝聞香當於鼻入鼻中出香說聞非義若生於空空性常恒不變香應常在何藉鑪中爇此枯木旃檀若生於木則此香木質因爇成煙若鼻得聞合蒙煙氣其煙騰空未及遙遠四十里內云何已聞是故當知香鼻與聞俱無處所即齅與香二處虗妄本非因緣非自然性溫陵鼻非旃檀非鼻生也藉爇而有非空生也香質是木煙非其木離木離煙而能遠聞豈鼻生哉疏鼻根聞香但由境有勝劣故使聞有遠近苟香有百里之氣即百里能聞此則根無優劣境有遠近明矣阿難汝常二時眾中持鉢其間或遇酥酪醍醐名為上味於意云何此味為復生於空中生於舌中為生食中阿難若復此味生於汝舌在汝口中秪有一舌其舌爾時已成酥味遇黑石蜜應不推移若不變移不名知味若變移者舌非多體云何多味一舌之知若生於食食非有識云何自知又食自知即同他食何預於汝名味之知若生於空汝噉虗空當作何味必其虗空若作鹹味既鹹汝舌亦鹹汝面則此界人同於海魚既常受鹹了不知淡若不識淡亦不覺鹹必無所知云何名味是故當知味舌與嘗俱無處所即嘗與味二俱虗妄本非因緣非自然性溫陵舌無定味又非多體則味不生舌矣石蜜沙糖也此若生食食不自知因舌知味非生食矣阿難汝常晨朝以手摩頭於意云何此摩所知誰為能觸能為在手為復在頭若在於手頭則無知云何成觸若在於頭手則無用云何名觸若各各有則汝阿難應有二身若頭與手一觸所生則手與頭當為一體若一體者觸則無成若二體者觸誰為在在能非所在所非能不應虗空與汝成觸是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性疏觸因境有然以手觸頭則能所皆身無定趣矣謂觸有能所方名為觸今頭足一體豈名為觸耶阿難汝常意中所緣善惡無記三性生成法則此法為復即心所生為當離心別有方所阿難若即心者法則非塵非心所緣云何成處若離於心別有方所則法自性為知非知知則名心異汝非塵同他心量即汝即心云何汝心更二於汝若非知者此塵既非色聲香味離合冷暖及虗空相當於何在今於色空都無表示不應人間更有空外心非所緣處從誰立是故當知法則與心俱無處所則意與法二俱虗妄本非因緣非自然性溫陵法若即心則不屬塵既非所緣何成意處若離於心則法塵因意知顯故問為知非知疏法若非知則非色聲若是色聲自應可知今既無知豈應藏於色空之外既心無所緣處從何立釋曰此十二處者是心體根本而諸根緣此以生故外論謂之勃路挐勃路挐者是根本義故及作用義故又毗婆沙云若欲觀察諸法性相當依如是十二處教便生十二處影像明鏡故經謂之如來藏性復次阿難云何十八界本如來藏妙真如性阿難如汝所明眼色為緣生於眼識此識為復因眼所生以眼為界因色所生以色為界阿難若因眼生既無色空無可分別縱有汝識欲將何用汝見又非青黃赤白無所表示從何立界若因色生空無色時汝識應滅云何識知是虗空性若色變時汝亦識其色相遷變汝識不遷界從何立從變則變界相自無不變則恒既從色生應不識知虗空所在若兼二種眼色共生合則中離離則兩合體性雜亂云何成界是故當知眼色為緣生眼識界三處都無則眼與色及色界三本非因緣非自然性疏毗婆沙云以四事故立十八界一由自性故建立色界乃至法界二由作用故建立眼識界乃至意識界三由能作故建立眼界乃至意界四由差別故建立十八界顯宗論云界者因義種族義謂由一身或一相續中有十八類諸種族故名十八界由根等展轉相望種族不同故名為界釋曰按雜集論十八界總有五義謂一切種子義因義持自相義持因果性義持一切法差別義故知種族者即種子義也以有十八種子差別名十八界溫陵若識因眼生則無塵可知故見非青等若識因色生則當隨色滅即應不識空又色有遷變識應知變識若知變則色滅識存無與為界又若汝識亦變變則無體界相自無若不隨變則識應常一當不識空理又不然非色生矣若謂眼色共生則此識性應與根塵兩合合則其識中離亦不成界矣阿難又汝所明耳聲為緣生於耳識此識為復因耳所生以耳為界因聲所生以聲為界阿難若因耳生動靜二相既不現前根不成知必無所知知尚無成識何形貌若取耳聞無動靜故聞無所成云何耳形雜色觸塵名為識界則耳識界復從誰立若生於聲識因聲有則不關聞無聞則亡聲相所在識從聲生許聲因聞而有聲相聞應聞識不聞非界聞則同聲識已被聞誰知聞識若無知者終如草木不應聲聞雜成中界界無中位則內外相復從何成是故當知耳聲為緣生耳識界三處都無則耳與聲及聲界三本非因緣非自然性疏若識因耳生則無動靜可識既無所識界義不成若取耳根聞無動靜不藉聲塵者則耳根所依是形色觸法故耳識依聲不雜觸塵也此識不生根明矣又若識生於聲則不關聞不關聞即無聲相則無所識知縱謂識從聲有然許因聞有聲識若聲生聲應有識則聞聲時即是聞識不聞又非界聞則此識即同於聲理無是矣長水曰既能了之識作所聞之聲則誰為能知知此聞識也阿難又汝所明鼻香為緣生於鼻識此識為復因鼻所生以鼻為界因香所生以香為界阿難若因鼻生則汝心中以何為鼻為取肉形雙爪之相為取齅知動搖之性若取肉形肉質乃身身知即觸名身非鼻名觸即塵鼻尚無名云何立界若取齅知又汝心中以何為知以肉為知則肉之知元觸非鼻以空為知空則自知肉應非覺如是則應虗空是汝汝身非知今日阿難應無所在以香為知知自屬香何預於汝若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及旃檀木二物不來汝自齅鼻為香為臭臭則非香香應非臭若香臭二俱能聞者則汝一人應有兩鼻對我問道有二阿難誰為汝體若鼻是一香臭無二臭既為香香復成臭二性不有界從誰立若因香生識因香有如眼有見不能觀眼因香有故應不知香知即非生不知非識香非知有香界不成識不知香因界則非從香建立既無中間不成內外彼諸聞性畢竟虗妄是故當知鼻香為緣生鼻識界三處都無則鼻與香及香界三本非因緣非自然性根有二相肉形雙爪浮塵根也覺知動搖勝義根也若肉形下破浮塵根溫陵名身則非鼻名觸則身根之塵故鼻尚無名也若取嗅知下破勝義根肉質之知屬身故元觸非鼻虗空之知屬境故肉應非覺疏若香臭氣下若從鼻生則香臭二種不生伊蘭及栴檀樹故曰二物不來汝自嗅鼻為香為臭伊蘭臭樹也臭則非香下以根從境破謂境既有二根應成兩故先定云臭則非香香則非臭意在俱聞墮兩鼻之失若鼻是一下以境從根破謂根既是一境應非二故臭亦非香復成臭也溫陵眼識因眼而有既不能見眼鼻識因香而有應不知香若曰能知即非香生若曰不知即不名識皆不可也香非知有者謂香不因根即不成香界識不知香即不成識界中間識也內外根境也阿難又汝所明舌味為緣生於舌識此識為復因舌所生以舌為界因味所生以味為界阿難若因舌生則諸世間甘蔗烏梅黃連石鹽細辛薑桂都無有味汝自嘗舌為甜為苦若舌性苦誰來嘗舌舌不自嘗孰為知覺舌性非苦味自不生云何立界若因味生識自為味同於舌根應不自嘗云何識知是味非味又一切味非一物生味既多生識應多體識體若一體必味生鹹淡甘辛和合俱生諸變異相同為一味應無分別分別既無別不名識云何復名舌味識界不應虗空生汝心識舌味和合即於是中元無自性云何界生是故當知舌味為緣生舌識界三處都無則舌與味及舌界三本非因緣非自然性溫陵味因舌嘗若舌本苦則無能嘗者孰為識體若舌本淡既不因境味無所生食自為味謂食即味也同於舌根舌不自嘗也阿難又汝所明身觸為緣生於身識此識為復因身所生以身為界因觸所生以觸為界阿難若因身生必無合離二覺觀緣身何所識若因觸生必無汝身誰有非身知合離者阿難物不觸知身知有觸知身即觸知觸即身即觸非身即身非觸身觸二相元無處所合身即為身自體性離身即是虗空等相內外不成中云何立中不復立內外性空則汝識生從誰立界是故當知身觸為緣生身識界三處都無則身與觸及身界三本非因緣非自然性溫陵覺觀即身識而以離合二境為緣若無緣則無識是則因境非因身也疏瑜伽云為身所證說名為觸觸因感物而生物無情不能知觸則知觸者身也今以手觸頭則身即觸觸即身身觸互奪元無處所又合身則無處位故即為身體離身則無觸因故即同虗空釋曰俱舍說五識有覺觀而唯識破之觀今經之義則唯識之破非也阿難又汝所明意法為緣生於意識此識為復因意所生以意為界因法所生以法為界阿難若因意生於汝意中必有所思發明汝意若無前法意無所生離緣無形識將何用又汝識心與諸思量兼了別性為同為異同意即意云何所生異意不同應無所識若無所識云何意生若有所識云何識意唯同與異二性無成界云何立若因法生世間諸法不離五塵汝觀色法及諸聲法香法味法及與觸法相狀分明以對五根非意所攝汝識決定依於法生今汝諦觀法法何狀若離色空動靜通塞合離生滅越此諸相終無所得生則色空諸法等生滅則色空諸法等滅所因既無因生有識作何形相相狀不有界云何生是故當知意法為緣生意識界三處都無則意與法及意界三本非因緣非自然性疏所思即法塵也若無前法意無所生是則因境非因根也又汝下識心即意識思量即所思了別即意根經以根塵識兼舉也經問識與根塵為同為異故疊破云同意即意云何說是意所生耶異意則應無法塵故無所識云何識意者謂塵由意生今識既異意而復有所識則識塵時即同識意然識無識意之理也若因下破從法生擕李曰生滅即法塵也然生滅但是五塵通相離五無體故云生則諸法生也疏顯宗論云由六識身無間滅已皆名為意此於意識作所依根意識既唯依過去故云生則諸法生滅則諸法滅也所因即法塵所因之法自無因之生識復作何狀釋曰已上略釋心意識竟今更總釋者復有多義毗婆沙云過去名意現在名識未來名心又界中施設心處中施設意蘊中施設識又心是種族義意是生門義識是積聚義又遠行是心業前行是意業續生是識業又彩畫是心業歸趣是意業分別是識業此心意識又有二種分別脇尊者說云滋長是有漏心分割是無漏心思量是有漏意思惟是無漏意分別是有漏識解了是無漏識如是等廣如論說如來藏之三七大七大者俱舍云地水火風於諸世間能作大事故名為大蓋真空性火以妙萬物而為言隨處發生顯徧周而為性良以空不空如來藏中有過恒沙德用故理事交徹所以融乎真俗體用相即所以俱乎空假此如來藏性為圓明攝德之門性海全收而萬法交歸矣故經云清淨本然周徧法界則真空理體也又云應所知量隨業發現則俗諦中相用也又云性色真空性空真色則交徹融涉所以圓明法界也夫聖性非遠體之即神是故析塵鑽火拂鏡披衣乃至鑿井指眾繁興交作皆明即事而真之理也阿難白佛言世尊如來常說和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯我今不知斯義所屬惟垂哀愍開示眾生中道了義無戲論法爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提故我今時為汝開示第一義諦如何復將世間戲論妄想因緣而自纏繞汝雖多聞如說藥人真藥現前不能分別如來說為真可憐愍汝今諦聽我當為汝分別開示亦令當來修大乘者通達實相阿難默然承佛聖旨阿難如汝所言四大和合發明世間種種變化阿難若彼大性體非和合則不能與諸大雜和猶如虗空不和諸色若和合者同於變化始終相成生滅相續生死死生生生死死如旋火輪未有休息阿難例文如水成冰冰還成水孤山阿難執昔所談疑今第一義諦將恐眾生聞昔和合則滯於有聞今排擯則溺於空不達中道動成戲論故請開示吳興若彼大性下意謂四大之性不和四大之相斯則性居相外此約真如隨緣不同頑空之性也若和合下既破非和恐計和合故復破之此約真如不變不同變化等相也疏按超日月三昧經云天人菩薩聲聞緣覺斯之所行有合有散不得成於無上正道皆由不知道本於是廣談色心二法乃至如來法身方得無合無散甚與今經互相發明今復略引者經云謂地水火風有色無見未有三界是四色者而常自然無有作者自然動起唯道能名釋曰謂四大動起皆道體而然也經又曰乃至補處能名斯道無象之象亦曰心色阿惟越致見心色阿惟顏見四色心如來見四色心之本也釋曰色心之本唯如來始見經又曰於三界而不然者是為心色名曰心本釋曰謂不如三界見於三界之色者則為心色是為心本經又曰故曰非不然於菩薩法故曰為然釋曰菩薩有度生之情故起四大之色經又曰無心色志三界自然自然如空乃名曰道釋曰如聲聞滅色可謂有志於心菩薩不滯空可謂有心於色皆合散之道也經又曰於是諸佛無合無散所以者何假使合者則人本也假使散者則生死也釋曰即所謂若和合者同於變化乃至生生死死如旋火輪也經又曰見生死苦泥洹之樂則名聲聞處在中間無益一切名曰緣覺無合無散名曰法身法身無形普入一切亦無所入無所不入釋曰下經阿難領解不立僧祇獲法身者領解此義也故密藏經云如來法身住一切眾生身中光影外現猶如淨縷褁牟尼珠無所障礙即無合無散之身也又經阿難二字當在氷還成水之下汝觀地性之上蓋文倒耳汝觀地性麤為大地細為微塵至鄰虗塵析彼極微色邊際相七分所成更析鄰虗即實空性阿難若此鄰虗析成虗空當知虗空出生色相汝今問言由和合故出生世間諸變化相汝且觀此一鄰虗塵用幾虗空和合而有不應鄰虗合成鄰虗又鄰虗塵析入空者用幾色相合成虗空若色合時合色非空若空合時合空非色色猶可析空云何合汝元不知如來藏中性色真空性空真色清淨本然周徧法界隨眾生心應所知量循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義疏言微塵者十地論云唯不動地菩薩得自在行觀地水火風諸微塵性皆如實知然今云析色者皆為破計汝觀下以色空義破和合計由性色即是真空故合無所合性空而是真色故非合而合性即空也空即性也真色亦然由色空之體皆即真性故相融而無礙又經明析色者由諸瑜伽師依聖教量以假想力析色為空遂為虗空由析而有因而計彼世界亦由合而成故金剛般若云若世界實有者即是一合相孤山曰既能析色為空亦可合空為色若空不可合色從何生然而不知皆即妄心分別故密嚴云地等和合微塵之聚若離於心即無所得阿難火性無我寄於諸緣汝觀城中未食之家欲炊爨時手執陽燧日前求火阿難名和合者如我與汝一千二百五十比丘今為一眾眾雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優樓頻螺迦葉波種乃至阿難瞿曇種姓阿難若此火性因和合有彼手執鏡於日求火此火為從鏡中而出為從艾出為於日來阿難若日來者自能燒汝手中之艾來處林木皆應受焚若鏡中出自能於鏡出然於艾鏡何不鎔紆屈汝手執尚無熱相云何融泮若生於艾何藉日鏡光明相接然後火生汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相遠非和非合不應火光無從自有汝猶不知如來藏中性火真空性空真火清淨本然周徧法界隨眾生心應所知量阿難當知世人一處執鏡一處火生徧法界執滿世間起起徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義疏按俱舍釋地水火風有三種義論云地水火風體寬廣故一切餘色所依止故又云能持自相及所造色故名為界又云以能增廣一切有色物生及於世間能作大事然由體大故能周徧法界然由用周故能循業發現此性火真空之義也溫陵火無自體寓物成形故曰無我眾名和合詰之各有根本非和合也疏陽燧取火珠也以銅為者則其形如鏡淮南云物類相動本標相應陽燧見日則然而為火方諸見月則津而為水言日鏡相遠者顯非和之性無從自有者破自然之情佛地論云如鏡中火無別自體隨眾生心亦非和合阿難水性不定流息無恒如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻藥是諸師等於白月晝手執方諸承月中水此水為復從珠中出空中自有為從月來阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降若從珠出則此珠中常應流水何待中宵承白月晝若從空生空性無邊水當無際從人洎天皆同滔溺云何復有水陸空行汝更諦觀月從天陟珠因手持承珠水盤本人敷設水從何方流注於此月珠相遠非和非合不應水精無從自有汝尚不知如來藏中性水真空性空真水清淨本然周徧法界隨眾生心應所知量一處執珠一處水出徧法界執滿法界生生滿世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義溫陵求則流否則息所謂流息無恒也太陰精即月中水方諸取水珠也疏方諸陰物月者羣陰之宗其氣類相感故水之從出若月上潮生亦其類也然川澤陂池流用不息而獨言方諸者取業用言之也阿難風性無體動靜不常汝常整衣入於大眾僧伽梨角動及旁人則有微風拂彼人面此風為復出袈裟角發於虗空生彼人面阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體我今說法會中垂衣汝看我衣風何所在不應衣中有藏風地若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出若風自生被拂之面從彼面生當應拂汝自汝整衣云何倒拂汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自誰方鼓動來此風空性隔非和非合不應風性無從自有汝宛不知如來藏中性風真空性空真風清淨本然周徧法界隨眾生心應所知量阿難如汝一人微動服衣有微風出徧法界拂滿國土生周徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義溫陵拂衣則動垂衣則靜故動靜不常疏被拂之面謂他人也風性動空性靜故不相參雜阿難空性無形因色顯發如室羅城去河遙處諸剎利種及婆羅門毗舍首陀兼頗羅墮旃陀羅等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少此空為當因土所出因鑿所有無因自生阿難若復此空無因自生未鑿土前何不無礙唯見大地逈無通達若因土出則土出時應見空入若土先出無空入者云何虗空因土而出若因出入則應空土元無異因無異則同則土出時空何不出若因鑿出則鑿出空應非出土不應鑿出鑿自出土云何見空汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出鑿空虗實不相為用非和非合不應虗空無從自出若此虗空性圓周徧本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入汝全不知如來藏中性覺真空性空真覺清淨本然周徧法界隨眾生心應所知量阿難如一井空空生一井十方虗空亦復如是圓滿十方寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義疏空因鑿土而出所謂因色顯發也未鑿土前地無通達則空非無因也若因鑿土而出則空居土外故土出時應見空入此則辨明空不因土也又若無異因則空土同體若同體者則土出時何不見空同土而出又非同體矣又鑿體堅實空體虗通故不相為用非和合矣釋曰按六大經說地水火風空識而不言見大故彼經名六大又彼以六大合內外而說則知此經之義是談外以該內也阿難見覺無知因色空有如汝今者在祇陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分析此見為復與明暗相并太虗空為同一體為非一體或同非同或異非異阿難此見若復與明與暗及與虗空元一體者則明與暗二體相亡暗時無明明時無暗若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗若明暗殊見無生滅一云何成若此見精與暗與明非一體者汝離明暗及與虗空分析見元作何形相離明離暗及離虗空是見元同龜毛兔角明暗虗空三事俱異從何立見明暗相背云何或同離三元無云何或異分空分見本無邊畔云何非同見暗見明性非遷改云何非異汝更細審微細審詳審諦審觀明從太陽暗隨黑月通屬虗空壅歸大地如是見精因何所出見覺空頑非和非合不應見精無從自出若見聞知性圓周徧本不動搖當知無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅阿難汝性沈淪不悟汝之見聞覺知本如來藏汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異汝曾不知如來藏中性見覺明覺精明見清淨本然周徧法界隨眾生心應所知量如一見根見周法界聽齅嘗觸覺觸覺知妙德瑩然徧周法界圓滿十虗寧有方所循業發現世間無知惑為因緣及自性性皆是識心分別計度但有言說都無實義疏文中六問顯六種義所以破諸見計情也謂一非一同非同異非異為六第一以常易義破一見謂見性常住境性代易云何為一也第二以相因義破非一見謂根境相因而有離明暗空則無見相云何非一也第三以差別義破同見謂明暗有差別見性無差別云何或同也第四以相由義破異見謂根塵相由而有離三元無二何為異也第五以邊際義破非同見謂分空分見本無邊際云何非同也第六以常變義破非異見謂見無遷改境有變更云何非異也阿難識性無源因於六種根塵妄出汝今徧觀此會聖眾用目循歷其目周視但如鏡中無別分析汝識於中次第標指此是文殊此富樓那此目犍連此須菩提此舍利弗此識了知為生於見為生於相為生虗空為無所因突然而出阿難若汝識性生於見中如無明暗及與色空四種必無元無汝見見性尚無從何發識若汝識性生於相中不從見生既不見明亦不見暗明暗不矚即無色空彼相尚無識從何發若生於空非相非見非見無辨自不能知明暗色空非相滅緣見聞覺知無處安立處此二非空則同無有非同物縱發汝識欲何分別若無所因突然而出何不日中別識明月汝更細詳微細詳審見託汝睛相推前境可狀成有不相成無如是識緣因何所出識動見澄非和非合聞聽覺知亦復如是不應識緣無從自出若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅阿難汝心麤浮不悟見聞發明了知本如來藏汝應觀此六處識心為同為異為空為有為非同異為非空有汝元不知如來藏中性識明知覺明真識妙覺湛然徧周法界含吐十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義真際根但照境故如鏡中識具了別故能標指疏覺明者即本覺明心也前約真性離妄故云覺明為咎此以真妄融即故云覺明真識孤山若生空下謂空無相見不能發識也溫陵非是見則無所辨非是相則無所緣又若處此二非之間識體若有非同物象識體若空則同龜毛既無自體安能有用若無所因者如日中無月則無見月之識又非無因也又識有分別名動見無分別名澄見與識隔聞知亦然非和合矣爾時阿難及諸大眾蒙佛如來微妙開示身心蕩然得無罣礙是諸大眾各各自知心徧十方見十方空如觀手中所持葉物一切世間諸所有物皆即菩提妙明元心心精徧圓含褁十方反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從了然自知獲本妙心常住不滅禮佛合掌得未曾有於如來前說偈讚佛溫陵初自決擇心見終至陰入七大多方發明使悟器界萬法當體全真本如來藏妙真如性是謂微密開示也妙湛總持不動尊首楞嚴王世希有銷我億劫顛倒想不歷僧祇獲法身願今得果成寶王還度如是恒沙眾將此深心奉塵剎是則名為報佛恩伏請世尊為證明五濁惡世誓先入如一眾生未成佛終不於此取泥洹大雄大力大慈悲希更審除微細惑令我早登無上覺於十方界坐道場舜若多性可銷亡爍迦羅心無動轉疏以明領解獲益故說偈讚佛初中頌意略顯三德妙湛頌清淨本然周徧法界總持頌圓滿十方寧有方所不動頌當業發生隨處滅盡言法身者總領根身等法身也法身之義略有十種一藏識法身如楞伽以根身器略為藏識境界法身故二在纏法身如究竟一乘寶性論云法身遍無差皆實有佛性是故說眾生皆有如來藏三本智法身即上論云依自身根本智故知眾生有清淨法身四在纏離染法身如法界無差別論云眾生界淨應知即是法身五功德法身謂戒定慧等五分法身六無為法身如佛性論云初無為相者顯如來法身七言說法身如寶性論云說法習氣為如來法身八具相法身即上論云如虗空無相而現色等相法身亦如是具足六根相又法華云微妙淨法身具相三十二九應物法身如金光明云佛真法身猶若虗空應物現形如水中月十難思法身如密藏經云如來法身住一切眾生身中光影外現猶如淨縷裹牟尼珠無所障蔽此法身者為難思故願今下頌有四心謂度盡恒沙是大悲心以奉塵剎是報恩心惡世先入是忍苦心不取泥洹是無盡心鎮澄讚曰三科七大藏性攸居總緣塵業事紛輿全體即真如理事雙袪信步駕長車傳如截流曰所稱六入者根為吸塵名入從所得名亦能入塵破屬識故今文雖則根塵對辯而正破在根十二處者根塵互依通名曰處文雖根塵互破正破在塵十八界者根塵識三種族區別故名曰界文雖根塵識三相對推破而正破在識連前色陰名為四科總由見相發心一句生來如般若經中色心開合之義大意無非破妄顯真會相歸性疊拂因緣自然諸計明玅奢摩他微密觀照耳自阿難示和合疑以究七大禪那玅旨乃畢于是疑意含二一迷所開權教發明世間之粗相異乎今日所談之真空故云如來常說和合因緣一切世間種種變化皆由四大和合發明云何如來因緣自然二俱排擯次謂真諦縱離乎諸相而圓理豈容乎偏遣葢偏遣偏立總非究竟故曰唯垂哀愍開示眾生中道了義無戲論法佛約非和不和二節破之者此也言雖多聞如說藥人真藥現前不能分別者上聞陰入處界本如來藏是即了義之法迷此別請故喻云實相即七大清淨之相言若彼大性體非和合則不能與諸相雜和猶如虗空不和諸色者此破非和合葢大性即相一切圓融不同空色之成敵故不可計非和合也言若和合同于變化至如旋火輪無有休息者此破和合葢大相即性凝然常寂焉同火輪之旋轉故不可計為和合也上約二義難破今將詳示故復召告特啟氷水之喻結上以起下焉結上者如水成氷喻性即相也如氷成水喻相即性也觀冰水原非二體而氷水宛然則和合非和之疑真可謂之氷釋矣起下者循業發現猶水之成氷清淨本然猶冰之成水阿難但舉四大今自地大至識有七者明如來藏性攝法無遺也若論無始生起則因識有見因見有空因空而世界始立今將反末以歸本自局而之徧故先陳地火水風有障有為之色法對無邊無動之虗空逐一以性印之通稱曰性復示之曰若此虗空性圓周徧本無動搖當知現前地火水風均名五大性真圓融皆如來藏本無生滅此止色空對辯意在因空之徧以顯前四皆徧皆常也上明依徧未明正徧故繼無情色空之外境隨舉見聞覺知之內根亦以性印之而示之曰若見聞覺知性圓周徧本不動搖當知無邊不動虗空并其動搖地火水風均名六大云云上融色以歸空復融色空以歸見通為根境合辯又攝根塵以歸識心因識之徧以顯根根塵塵無非法界互攝互徧也然有識有知固雖是妄以藏性印之更無別法故曰性識明知覺明真識以例色是性色空是性空七大互顯莫不爾爾能以此性印諸萬法全性泯色曰性色真空是為奢摩他全色泯空曰性空真色是為三摩空色互融清淨常徧是為禪那如是玅色玅心俱非擬議所及故重重結曰但有言說都無實義阿難所請玅奢摩他三摩禪那其義已竟下唯領悟讚謝發願耳然上明七大萬法一一周徧據今領悟且明心徧未涉色徧者以在見道位中務明本智故也敘云是諸天眾各各自知心徧十方至心精徧圓含褁十方此領心徧也見十方空如觀手中所持葉物反觀父母所生之身至如湛巨海流一浮漚起滅無從此未涉色徧也法華約六根互用即於父母所生常身如淨琉璃十界影現比於此者則知今言獲本玅心本覺常住即觀行位中之獲耳舊謂經文尚屬見道及云且敘解悟者卓哉見乎偈云玅湛等者由悟三種微密觀照乃即以佛法而讚佛法也前未蒙開示但云我見如來三十二相葢有見則濁有數則限有相則生滅具焉今聞藏體清淨無復滯見故曰玅湛此讚如來般若之德而身屬報功由奢摩也聞藏體圓照無復自限故曰總持此讚如來解脫之德而身屬應功由三摩聞藏體性相一如無復生滅故曰不動此讚如來法身之德而身萬法功由禪那如來以德為身如證而說即人即法俱無有上故曰妙湛總持不動尊首楞嚴王世希有也顛倒想即前所計因緣和合種種攀緣為自性者此之妄想本於無始斷由聞法故曰銷我億劫此想既銷正體隨悟故曰不歷僧祇獲法身希更審除微細惑者如未知華屋之門及根中積生無始虗習無明分齊頭數皆是也或謂阿難讚佛既悟三身而未涉色徧是義不爾觀法華謂隨順此經非己智分不其然乎更觀六卷阿難聞觀音圓通之後尚云觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路以此未屬證悟復何所疑音釋吸迄及切齅許救切䑛神爾切吻武粉切銖音殊藉慈救切擯音鬂爨音竄燧音遂紆憶俱切泮音判陟竹力切窪音洼爍式灼切
