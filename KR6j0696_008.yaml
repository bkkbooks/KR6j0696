body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第八三種漸次阿難如是衆生一一類中亦各各具十二顛倒猶如揑目亂華發生顛倒妙圓真淨明心具足如斯虗妄亂想一本亂想下有阿難二字汝今修證佛三摩提於是本因元所亂想立三漸次方得除滅如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露云何名為三種漸次一者修習除其助因二者真修刳其正性三者增進違其現業云何助因阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛説一切衆生皆依食住阿難一切衆生食甘無毒曰甘故生食毒故死是諸衆生求三摩提當斷世間五種辛菜蔥蒜薤興渠也是五種辛熟食發淫生啖增恚如是世界食辛之人縱能宣説十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次舐其脣吻常與鬼住福德日銷長無利益是食辛人修三摩地菩薩天仙十方善神不來守護大力魔王得其方便現作佛身來為説法非毀禁戒讚淫怒癡命終自為魔王眷屬受魔福盡墮無間獄阿難修菩提者永斷五辛是則名為第一增進修行漸次疏欲趣極證理難頓升故立三種漸次以為入位方便蓋前談類生已知業惑顛倒之相故立三種漸次以伏除之所謂淫殺之惑此第一漸次以本根全在故但除助因助因者謂五種辛菜熟食發淫生啖增恚欲薄貪瞋先伏除之又瑜伽以於食知量觀察食因及食過患者謂於所緣境中未能永伏能所取相為欲除遣斷滅故於根律儀中防護觀察於所行境中不取其相釋曰按密嚴謂阿賴耶識有能所取二種相故如蛇二頭所樂同往而辨中邊論以六塵為所取種子六根為能取種子六識為彼取種子則知瑜伽防護諸根即是制伏藏識中種子性也以根塵者即藏識親相分故種子者屬相分故為八識親緣故云何正性阿難如是衆生入三摩地要先嚴持清淨戒律永斷淫心不餐酒肉以火淨食無啖生氣阿難是修行人若不斷淫及與殺生出三界者無有是處當觀淫欲猶如毒蛇如見怨賊先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起禁戒成就則於世間永無相生相殺之業偷劫不行無相負纍亦於世間不還宿債是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險是則名為第二增進修行漸次疏清淨戒律即四棄等由淫等四惑初漸次中已伏不起此則永斷是故説名刳其正性淫殺為罪根本猶於緣中生犯故皆戒斷無啖生氣防殺之至悲之類也續生相酬皆由淫殺盜妄此既清淨則父母肉身不須天眼此斷惑之力也三種漸次以戒為體戒屬奢摩他觀寶積經論云以戒故於奢摩他分同戒是三昧因故以多聞故於毗婆舍那分同能領得無漏智故是也云何現業阿難如是清淨持禁戒人心無貪淫於外六塵不多流逸因不流逸旋元自歸塵既不緣根無所偶反流全一六用不行十方國土皎然清淨譬如琉璃內懸明月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中是人即獲無生法忍從是漸修隨所發行安立聖位是則名為第三增進修行漸次第三漸次承前伏斷之功現流永息旋元自歸故得世界清淨皎如琉璃則真空之體顯矣圓覺云清淨奢摩他如鏡現諸像是故一切如來密圓淨妙皆現其中言獲無生法忍者即仁王法忍位也寶積經論云對治諸果説名無生故下言殘質不復續生者即此忍之力也釋曰按俱舍説忍是智之等流故此言獲法忍次即明乾慧則知無生法忍者即乾慧地無間道也又雜集論云緣無生故名無生智緣智故名智智即依士釋也然智雖現證而所能斷惑是忍功能故一切位皆先忍後智阿難是善男子欲愛乾枯根境不偶現前殘質不復續生執心虗明純是智慧慧性明圓鎣與瑩同十方界乾有其慧名乾慧地由三漸次欲愛乾枯而欲為續生之本此既永斷故不續生由根塵不偶則執心虗明故純是智慧矣熒界則智圓欲乾則慧生依慧任持故名曰地如來法界悲智雙流此唯有慧故未與接也釋曰按仁王經於法忍位修長養已次起乾慧與此文同而華嚴十地論於第七地方入法流與此文異者由教觀不同也以單觀真理名曰乾慧止觀雙運名入法流故此經於初信位入流華嚴於七地入流者豈非教觀不同耶故十地論云第七地菩薩於一念中奢摩他毗婆那二行雙修入法流水即此義故欲習初乾未與如來法流水接即以此心中中流入圓妙開敷從真妙圓重發真妙妙信常住一切妄想滅盡無餘中道純真名信心住真信明了一切圓通陰處界三不能為礙如是乃至過去未來無數劫中捨身受身一切習氣皆現在前是善男子皆能憶念得無遺忘名念心住妙圓純真真精發化無始習氣通一精明唯以精明進趣真淨名精進心心精現前純以智慧名慧心住執持智明周遍寂湛妙寂常凝名定心住定光發明明性深入唯進無退名不退心心進安然保持不失十方如來氣分交按名護法心覺明保持能以妙力回佛慈光向佛安住猶如雙鏡光明相對其中妙影重重相入名回向心心光密回獲佛常凝無上妙淨安住無為得無遺失名戒心住住戒自在能遊十方所去隨願名願心住一信心住以初入流並觀真俗名之曰中妙圓開敷初入流也重發真妙深入流也二妙重敷為中中謂前枯欲愛但有其慧今入法流回智入悲則菩提生長故曰妙圓開敷圓覺云如幻三摩提如苗漸增長是也此圓妙心入流即住名妙信常住由此菩薩已枯欲流獲乾慧性其心易住故二念心住能憶習氣名為念心陰處界三即世間生處習氣也三精進心前雖憶念習氣未融此既精明故得發化四慧心住溫陵妄習既盡心精現前進趣云為純智無習名慧心住疏五定心住有慧無定則至德不凝故次以定凝慧周遍寂湛圓定相也六不退心定久生光湛極而動故能進也七護法心久進涉動失於安然故保持無失以護法故八回向心既與如來氣分交接故能回佛慈光向於己身亦能回己身心向佛安住己身佛身彼此回向故如雙鏡九戒心住既能回佛慈光故得護佛常凝凝者妙淨無為體也安住無違名曰戒心十願心住住戒自在則戒不能拘故能遊十方所去無礙阿難是善男子以真方便發此十心心精發輝十用涉入圓成一心名發心住心中發明如淨琉璃內現精金以前妙心履以成地名治地住心地涉知俱得明了遊履十方得無留礙名修行住行與佛同受佛氣分如中陰身自求父母陰信冥通入如來種名生貴住既遊道胎親奉覺胤如胎已成人相不缺名方便具足住容貌如佛心相亦同名正心住身心合成日益增長名不退住十身靈相一時具足名童真住形成出胎親為佛子名法王子住表以成人如國大王以諸國事分委太子彼剎利王世子長成陳列灌頂名灌頂住一發心住即前十種妙心於此圓成為一而得安住名發心住二治地住以前妙心之理履而成地安住其中名治地住履即治義地即妙心內現真金言明露可見三修行住以心住境名履以成地以境住心名心地涉知心境無奪故得明了能遊十方名為修行四生貴住溫陵妙心密契則妙理冥感將生佛家為法王子名生貴住陰喻冥感之理五方便具足住孤山此在因中其自行利他人相同佛不缺故倣佛道胎名方便具足住六正心住疏容貌既同心亦相應故名正心七不退住內外合同且能增長名不退住八童真住溫陵具體而微故以童稱九法王子住疏自發心至生貴名入聖胎自具足至童真名長養聖胎至此長養功終出胎為法王子十灌頂住表有成聖之功故以灌頂喻之阿難是善男子成佛子已具足無量如來妙德十方隨順名歡喜行善能利益一切衆生名饒益行自覺覺他得無違拒名無瞋恨行種類出生窮未來際三世平等十方通達名無盡行一切合同種種法門得無差誤名離癡亂行則於同中顯現羣異一一異相各各見同名善現行如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙名無著行種種現前咸是第一波羅蜜多名尊重行如是圓融能成十方諸佛軌則名善法行一一皆是清淨無漏一真無為性本然故名真實行行者住之增進以十度為體初歡喜行即檀度十方隨順約自行為歡喜故二饒益行即戒度戒無惱害能饒益故三無瞋恨行華嚴名無違逆由無違逆故無瞋恨四無盡行即精進華嚴名無屈撓無屈撓者精進義也凡聖種類出生無盡此義有二謂橫竪二體即三世平等十方無盡五離癡亂行即禪度禪能止散故離癡亂由無癡亂種種法門得無差誤六善現行即慧度理能顯事名同中現異事能顯理名異相現同由空慧成就故理事善現七無著行即方便方便以權為事塵中現界即權智所顯八尊重行即願度華嚴名難得行難得無尊重也九善法行即力度圓融軌則即善法故十真實行即智度無漏無為皆實智故阿難是善男子滿足神通成佛事已純潔精真遠諸留患當度衆生滅諸度相回無為心向涅槃路名救護一切衆生離衆生相回向壞其可壞遠離諸離名不壞回向本覺湛然覺齊佛覺名等一切佛回向精真發明地如佛地名至一切處回向世界如來互相涉入得無罣礙名無盡功德藏回向於同佛地地中各各生清淨因依因發揮取涅槃道名隨順平等善根回向真根既成十方衆生皆我本性性圓成就不失衆生名隨順等觀一切衆生回向即一切法離一切相唯即與離二無所著名真如相回向真得所如十方無礙名無縛解脫回向性德圓成法界量滅名法界無量回向溫陵曰前十住十行出俗心多大悲行劣故此以願濟悲處俗利生回真向俗回智向悲使真俗圓融悲智不二是名十回向亦名十願也疏由前妙行滿足神通純潔精真故神遠諸留礙故通蓋十住多是出俗自行為體十行多是入俗利他為用今中道觀中真俗相回理事相向故名回向第一以即相離相為回向義由即故當度衆生由離故滅除度相二不壞回向以涅槃生死為回向義可壞者生死之境諸離者涅槃之心由壞可壞故不住生死由離諸離故不住涅槃俱舍涅槃名離三等一切佛回向即本始二覺為回向義湛然本覺也齊佛覺者即等覺故四至一切處者真如隨遍為回向義真精即真如地即所遍佛地無所不遍故真如隨遍而至五無盡功德藏者約依正回向如來名正世界為依兩相涉入故得無礙六隨順平等善根約一多回向于同佛地一也各生淨因多也此二相涉故得平等又平等者清淨涅槃善根者諸生因七等觀一切衆生約自他回向依因發生故曰真根皆我本性回衆生為己也不失衆生泯己同他也八真如相回向真如隨緣故即一切法隨緣不變故離一切相此即性相為回向義九無縛脫回向以真如如所境境亦如如故十方無礙十方所也無礙如也真如故非縛有所故非脫此即能所縛脫為回向之義十法界無量回向性德圓成結通前義也法界量滅拂迹泯相以明解絶阿難是善男子盡是清淨四十一心次成四種妙圓加行即以佛覺用為己心此用佛智為因心若出未出猶如鑽火欲然其木名為暖地又以己心成佛所履此以因心同佛境若依非依如登高山身入虗空下有微礙名為頂地心佛二同善得中道如忍事人非懷非出名為忍地數量銷滅迷覺中道二無所目名世第一地將入見道故起加行唯識云初地見道地前加行是也釋加行者略有三義一體二性三差別唯識云加行以尋思為體印持為性依四尋思故為四加一暖法釋名有三一唯識云依明得定名之為暖初獲慧日前行相故此暖法者是約智説二俱舍云能燒惑薪名之為暖四聖道火前行相故此暖法者是約斷説三毗婆沙云智於境轉名之為暖此暖法者是合境智相應説故言以佛覺用為己心者由觀察義邊能所之心未能泯證故唯識云面前立少物非是住唯識由是帶相觀心有故得故頂位者唯識有二一約加行二約善根唯識云尋思之極發上上品善根名之為頂俱舍有二一約最勝二約有退俱舍云動善根中此法最勝或由此是進退兩際猶如山頂言以己心為佛所履者是觀心即境以能依從所依義故喻登高入空也忍法者俱舍有二義一忍理名忍二無退墮名忍俱舍云最極能忍四諦理故以無退墮故唯識有二義一印順為忍二定持為忍唯識云依印順定決定印持立為忍位然前以心境相傾各止一邊今心佛二同故獲中道雖功用現成猶有所得故非懷非出如忍事人尊者法救云世第一法以思為性諸心心所是思差別然經論釋世第一法略有六種謂一離二合三即四異五中六邊今應略識六種説世第一法者一俱舍云此法是有漏故名世間此法是最勝故名第一者是離有漏最勝為二名世第一故二經云數量銷滅迷覺中道二無所目名世第一地者是合迷覺二法名世第一故數量者迷與覺也由第一故不可名迷由世間故不可名覺故二非所名三唯識云異生法中此法最勝名世第一者是即異生中顯於最勝名世第一故四唯識云依無間定發如實智印二取空名世界一者是以智異忍名世第一故五尊者法救云世第一法處在聖者異生之間無所偏倚者是即凡聖二道顯中名世第一故六婆沙云世第一法表聖道之始異生之終者是即始終二邊名世第一故已上四加俱名善根經云若有成就暖等善根名相似聖者阿難是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地異性入同同性亦滅名離垢地淨極明生名發光地明極覺滿名𦦨慧地一切同異所不能至名難勝地無為真如性淨明露名現前地盡真如際名遠行地一真如心名不動地發真如用名善慧地阿難是諸菩薩從此已往修習畢功功德圓滿亦目此地名修習位慈陰妙雲覆涅槃海名法雲地疏十住毗婆沙云佛法無邊初地為本此中地者總有六名謂一地二歡喜三通達四見道五現觀六離生云何名地唯識云總攝功德為勝依持令得生長故名為地云何歡喜以入見道親證真如於多百門已得自在自知不久證大菩提生歡喜故云何通達唯識云由無分別智緣於真如此智生時名通達故云何見道唯識云初照真理故云何現觀唯識云從此已故名現觀故云何離生婆沙云見道起已摧煩惱勢力不復增長故二離垢地已離異生性障名異性入同同無同相名同相亦滅唯識以初地斷異生性障得與如來覺通故瑜伽以此地為增上戒學治微細犯戒垢故三發光地由前離垢此地明生故唯識以斷暗鈍障淨極明生成就勝定大法總持能發無邊妙慧光故瑜伽云增上定學故四焰慧地前地明生此地覺滿騰發慧焰故地論以此地住菩提分法慧焰增故五難勝地唯識以此地斷皆生死愚真俗兩智合令相應故及離同異真俗之法為難勝故六現前地同異既遠則妙真如性明露現前唯識以此住緣起智無分別智現在前故瑜伽上三地名增上慧學七遠行地妙真如性遠盡無際故地論以此地住無功用後邊過二乘道名遠故釋曰以前六地是三乘同證故也楞嚴華嚴皆同此説八不動地自歡喜至焰慧漸遠其垢自難勝至不動漸顯其如此地則純一真如名不動地真如之性本不動故地論以無分別智任運相續得不動故九善慧地依如起用發宣善慧故地論此地成就四無礙解善説法故亦目此地為畢功者法雲地上明行已足無功用故十法雲地唯識云蔭蔽一切充滿法身故然十地功德義類無邊今復顯示略有十種差別謂修十地為得十種身故對治十種障故證十種法界故獲十種真如故修諸法門故諸地差別義故諸相對治故諸地得名故證四果名號故通三乘修證名門故一得十種身者勝天王般若經云初地得平等身通達法性見平等故二地得清淨身清淨戒故三地得無盡身離瞋恚故四地得善修身常動進修佛法故五地得法身見諸諦理故六地得離覺觀身觀因緣理非覺觀所知故七地得不思議身具足方便故八地得寂靜身離一切戲論無煩惱故九地得等虗空身身相不可量遍一切處故十地得智身成就一切種智故二對治十障者十地論云對治十障故説十地一凡夫我相障二邪行障三聞思修法障四法慢障五我慢障六微煩惱習障七細相習障八無行有相障九不能善利益衆生障十於諸法中不得自在障三證十種法界者辨中邊論云初地證遍行法界得自他平等法性故二地證最勝法界能修同出離行故三地證勝流法界知所聞法是最勝等流為求此法入大火坑如三千界不以為難故四地證無攝法界乃至法愛亦皆轉變故五地證相續無差別法界得十意樂平等淨心故六地證無雜染無清淨法界知緣起法無染淨故七地證種種無差別法界知法無相不行契經等種種法相故八地證不增不減法界圓滿得無生法忍於染淨法中不見一法有增有減故由此説有四種自在一無分別自在二淨土自在三智自在四業自在八地唯能通達前二九地通智自在得無礙解故十地復能通達業自在所依義隨意化作利益事故四證十種真如者如唯識論所説故五修諸法門者十地經論云於二地觀煩惱三地修禪定觀無常四地修念處四神足五地修聖諦六地觀因緣七地止觀雙修八地止觀成就六諸地修證差別者佛地經論云初地得遍真法界遊大乘法二地修三聚戒三地得勝定發四無量平等利樂四地證菩提法離諸分別五地斷見惑不分別種種分別觀四聖諦皆平等性摧伏魔怨六地觀十二支緣起遠離聲聞獨覺繫念分別七地證無相理得廣大法味喜樂所持八地一切煩惱不復現行超五怖畏九地決定入趣名不退轉十地得大法身起大悲雲雨大法雨除衆生苦故七諸地諸相及所修對治者十住毗婆沙云初地得數百定見數百佛是其果相捨一切惡不行放逸是二地相二地修道品觀七正道故離邪行無殺盜淫妄十不善行又初地十無盡句即是發願離垢地中行頭陀行云云八諸地釋名者入大乘論云初地出過凡夫得不思議出世間道生歡喜故名歡喜地二地離破戒垢故名離垢地三地依十二門禪得明智慧故名明地四地得增上覺意分別道品燒煩惱薪故名焰地五地修習十智雖伏煩惱未能勝故名難勝地六地能逆順觀十二因緣得法現前故名現前地七地愛佛功德次第不聞餘心深入法相故名深遠地八地離色等相堅固難動名不動地九地入四辨才解一切音聲能問答故名善慧地十地能受一切佛法猶如大雲能注法雨名法雲地九證四果名字者莊嚴經論云菩薩有四果一者入初地時生如來家即須陀洹果二者於第八地中而得受記是斯陀含果三者於第十地中而得受職是阿那含果四者佛地是阿羅漢果十會三乘修證名門者菩薩瓔珞本業經云梵語鳩摩羅伽秦言逆流歡喜地須阿伽一波秦言逆流離垢地須那迦秦言逆流照明地須陀洹秦言觀明焰地斯陀含秦言度障難勝地阿那含秦言薄流現前地阿羅漢秦言過三有遠行地阿尼羅漢秦言變化生不動地阿羅訶秦言慧光妙善地阿訶羅弗秦言明行足法雲地摩訶一和沙秦言無相無垢地婆伽婆佛陀秦言妙覺者無上地佛子是故名門攝一切功德行佛及菩薩無不入此名門又勝天王般若云菩薩身與如來無差別但功德有滿未滿故垢障有餘無餘故譬如初月至十五月虧盈有異月體無差如是初地乃至十地所有功德亦復如是又十地經論云菩薩從六地來能入滅盡定而不證故五地雖有聞陀羅尼成就法師者非得義陀羅尼以平等清淨心甚難得故又樂出世間智現世間智最難故云云如來逆流如是菩薩順行而至覺際入交名為等覺阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地疏等覺者即法雲菩薩與逆流如來於此位中兩覺相際其體平等名曰等覺等義有三一等無間義以屬忍位故二正等義增一經有八等道故三遍義假名論等者遍滿義故瓔珞云等覺照寂妙覺寂照又云等覺者名漸漸覺若約攝事釋者復有八義一約人數瓔珞以等覺位唯一人故二約定仁王云灌頂菩薩四禪王始入金剛一切了即金剛定故三約地瓔珞以等覺為無垢地故四約斷仁王云等慧灌頂三品士除前餘習無明緣即斷無明習故五約諦仁王云無明餘習故煩惱二諦理窮一切盡即攝二諦故六約劫瓔珞云金剛慧幢菩薩住於頂定住壽百劫修千三昧故七約應即上菩薩現同古佛但有應名故八約心瓔珞云等覺名四十一地名入法界心入重玄門故仁王云三十生盡等大覺故如是重重單復十二方盡妙覺成無上道疏妙覺者即大覺位謂等覺菩薩以斷惑力離忍證智獲大法身名曰妙覺言盡妙覺者一盡者最極義法華云成最正覺故二盡者遍滿義覺者妙悟義華嚴云正遍知覺妙悟皆滿故依攝事釋復有七義一約斷瓔珞云妙覺位中所斷無明名不了一切法迷於法界而起三界業果故二約身金剛三昧經云等覺三地妙覺三身於九識中皈然明淨故三約地瓔珞云妙覺名一切智地非有非無一切相盡頓解大覺窮化體神故四約轉仁王云寂滅忍中下品觀一轉妙覺常湛然即轉忍成智故五約生仁王云圓智無相三界王三十生盡等大覺即生相全盡故六約諦仁王云第一義諦常安隱窮源盡性妙智存即證第一義諦故七約報仁王云三賢十聖住果報唯佛一人居淨土業果俱盡故言單復十二者單復指觀體十二指位數觀謂信前三種漸次是單修奢摩他入信已去齊修空假則名為復此同圓覺定輪單復之義釋曰今復略釋單復之義者更有一經一論今先釋觀體次釋單復謂奢摩他等以止觀為體故莊嚴經論云安心於正定此即名為止正住法分別是名為觀相此識體也又曰普欲諸功德是二悉應修一分非一分修有單雙故釋曰一分為單非一分為雙雙即復也此單復之義也又雜集論云有四種道謂已得奢摩他者則進修毗婆那已得毗婆那者則進修奢摩他釋曰此二法皆單修也又曰若二俱不得者則制伏沈掉雙修二道若已得二道者則合止觀平等雙轉釋曰此二法皆復修也此單復之義也言位數者經論判位不同唯瑜伽十二住與此文合彼以地前為勝解行住初地歡喜住二地增上戒住三地增上心住四地覺分相應住五地諸諦相應住六地緣起相應住七地無相有功用住八地無相無功用住九地無礙解住十地最上菩薩住後加如來為十二住菩薩善戒經亦同此説故妙覺者窮原盡性之地是謂單復十二方盡妙覺成無上道是種種地皆以金剛觀察如幻十種深喻疏皆以金剛觀察者釋成觀法謂諸地智斷皆有金剛喻定名金剛觀察俱舍云金剛喻定通依九地以説略如九品所斷則有八十一定此非最後金剛定也金剛三昧本性清淨經云菩薩摩訶薩住首楞嚴三昧已修百三昧然後入金剛三昧此百三昧從道種智十波羅密生住爾𦦨地不熏不修自然常得八萬四千諸三昧門於諸法中不見來去及住滅相其心寂然即得超入金剛三昧此金剛三昧不減結使結使自滅金剛三昧從毗婆舍那出入舍摩他中是金剛三昧不住不起不滅不壞不斷不異不脫不變入明慧性舉起甚深一合相智不見身心法然後成阿耨多羅三藐三菩提然金剛句義略有多種如淨印經中有十四句其間一句即金剛定所謂一切法佛法是金剛句於一切智隨入解故又云此金剛句能隨解了金剛喻定則知金剛定者在一切法所顯也所謂十四句者經云自身是金剛句自性無分別故無明是金剛句入諸明故五無間是金剛句無加行平等故瞋際是金剛句慈際平等故癡際是金剛句慧光平等故一切衆生一衆生是金剛句遍入衆生平等故一切衆生心一衆生心是金剛句入無心故一切佛一佛是金剛句遍入真如平等故一切剎土一剎土是金剛句遍入無盡剎土故一切法佛法是金剛句於一切處智隨入解故諸魔事業佛法事業是金剛句入諸魔業能警悟故一切語言如來語言是金剛句遍入一切音聲隨解了故一切法無生是金剛句以無滅故一切法無起是金剛句入無止息故釋曰此中句義謂一無分別此是總體二入諸明暗三無加行四瞋慈平等五愚慧平等六一多衆生平等七心無心平等八一多佛性平等九盡無盡平等十隨解一切平等十一邪正平等十二一切語平等十三生滅平等十四起息平等蓋金剛體性其義如是又按究竟一乘寶性論釋金剛句義總為七句論云言金剛者難可沮壞所證之義亦復如是又云能作根本故名為句言七句者謂佛法僧衆生菩提功德與業所謂心緣尚不能知何況名字章句於諸地中皆用此觀故云是種種地皆以金剛觀察言如幻十種深喻者為遮防修故以幻喻寶積經論若色等法實無者徒修諸行護此患故説畫師喻為防遮發行事故説幻師喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入阿難如是皆以三增進故善能成就五十五位真菩提路作是觀者名為正觀若他觀者名為邪觀疏結成觀體也謂三觀所修皆有次第故名漸次今復略釋三觀體者所言觀行其體是何謂奢摩他者以照了自性為體三摩波提以分別境界為緣圓覺云奢摩他寂靜三摩正憶持此即一體三名為正定觀察及總持也又名毗婆舍那者即觀察義也雜集論云奢摩他有九行謂令住故等住故安住故近住故調順故寂靜故最極寂靜故專注一趣故平等攝持故毗婆舍那者總有四句一揀擇諸法謂所有故二最極揀擇謂所有故三故遍尋思謂以分別作意俱行慧建立諸法相故四周審觀察謂委具推求故論復釋曰此中諸句或依淨行所緣境説或依善巧所緣境説或依淨行煩惱所緣境説言禪那者圓覺云禪那唯寂滅如彼器中鍠寂滅者息二邊分別也器中鍠者不即不離無所礙也此有二名一名憂畢叉涅槃云優畢叉為捨復有四名一名平等及不垢不淨等此三觀體相也又復經言是種種地及至漸次深入者結諸地觀法也謂從乾慧乃至妙覺皆因三觀而為漸次如諸論所説一者謂莊嚴論云止觀二法若在信地名依止修地上有四種修習謂初地為通修二地至六地為有相方便修七地為無相修後三地名無為修又如雜集釋暖位觀法者論云暖法者謂各別內證由淨定心依諦增上契經等法於意言問諸義顯現緣彼所生奢摩他毗婆那等為體相故又如釋見道位觀法云見道者謂世第一無間所得三摩地及彼相應等法由無分別奢摩他毗婆那等為體相故又如十地經論釋七地云第七地於一念中奢摩他毗婆那二行雙修又云八地智慧應知但是修奢摩他毗婆那道彼處成就故釋曰此諸地中用諸觀法之文也爾時文殊師利法王子在大衆中即從座起頂禮佛足而白佛言當何名是經我及衆生云何奉持佛告文殊師利是經名大佛頂悉怛多般怛羅無上寶印十方如來清淨海眼亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海亦名如來密因修證了義亦名大方廣妙蓮華王十方佛母陀羅尼呪亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持孤山曰此經發起為救阿難是故先開圓解次顯圓行行成入位極乎妙覺垂範來世有始有終於是文殊請問經名及奉持法也疏此經初以頂呪救阿難兼度摩登故名大佛頂亦云救親因次徵阿難發心而開佛知見故名清淨海眼言入遍知海者獲正覺智也名大方廣者顯三大體也大方即體相廣是其用處染而淨名妙蓮華王出生大覺名佛母總持按吳興曰此經從密部流出故名灌頂章句諸經皆説名題者以約攝繁令易授持也六助道分文八説是語已結敘即時阿難及諸大衆得蒙如來開示密印般怛羅義兼聞此經通指前經奧義了義名目頓悟禪那修進聖位增上妙理心慮虗凝斷除三界修心六品微細煩惱即從座起頂禮佛足合掌恭敬而白佛言大威德世尊慈音無遮善開衆生微細沈惑令我今日身心快然得大饒益世尊若此妙明真淨妙心本來遍圓如是乃至大地草木蠕動含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生修羅人天等道世尊此道為復本來自有為是衆生妄習生起世尊如寶蓮香比丘尼持菩薩戒私行淫欲妄言行淫非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒燃墮無間獄琉璃大王善星比丘琉璃為誅瞿曇族姓善星妄説一切法空生身陷入阿鼻地獄此諸地獄為有定處為復自然彼彼發業各各私受惟垂大慈發開童蒙令諸一切持戒衆生聞決定義歡喜頂戴謹潔無犯疏説是下領解獲益修道所斷之惑謂貪等煩惱於三界九地各分九品斷欲界六品證二果斷後三品證三果斷上界各九品證無學阿難已獲初果故於此中更斷六品而證二果仁王云一切衆生煩惱不出三界一切衆生果報亦不出三界諸佛應化法身亦不出三界是故説云若信衆生本業是諸菩薩本所修行十地所修是佛本業世尊下問業因者兼於扶律故戒寶蓮香之淫貪琉璃王之誅殺善星之妄語定處謂地獄所在自然謂隨業感現私受即作者自受衆所不能同見同見則是其處有定自然則是私受而已佛告阿難快哉此問令諸衆生不入邪見汝今諦聽當為汝説阿難一切衆生實本真淨因彼妄見有妄習生因此分開內分外分阿難內分即是衆生分內因諸愛染發起妄情情積不休能生愛水是故衆生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤心著行淫男女二根自然流液阿難諸愛雖別流結是同潤濕不升自然從墜此名內分阿難外分即是衆生分外因諸渴仰發明虗想想積不休能生勝氣是故衆生心持禁戒舉身輕清心持呪印顧盻雄毅心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命阿難諸想雖別輕舉是同飛動不沈自然超越此名外分阿難一切世間生死相續生從順習死從變流臨命終時未捨暖觸一生善惡俱時頓現死逆生順二習相交純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊於四天所去無礙其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏安法忍是等如天龍八部之類親住如來座下情想均等不飛不墜生於人間想明斯聰情幽斯鈍情多想少流入橫生重為毛羣輕為羽族七情三想沈下水輪生於火際受氣猛火身為餓鬼常被焚燒水能害己無食無飲經百千劫九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄純情即沈入阿鼻獄若沈心中有謗大乘毀佛禁戒誑妄説法虗貪信施濫膺恭敬五逆十重更生十方阿鼻地獄循造惡業雖則自招衆同分中兼有元地阿難此等皆是彼諸衆生自業所感造十習因受六交報一內分因果衆生由情續生故稱有情而愛為情惑之本故稱分內以想為外者由漸超情囿上而不沈此指人天想心非三乘智想也事善知識自輕身命則亦輕舉之類次下分別情想夫愛生惡死衆生之情故生順死逆此情見之惑也福慧之想則能見佛兼情之想則能飛升乃至持戒護法則出世淨想故能親住如來座下沈下水輪者俱舍云大地最下有金水風輪有八寒熱獄以火為身故受氣猛火見水則焚是水亦害己也熱獄第八亦名五無間受罪苦具身量劫數壽命五者皆無遮間故謗大乘經斷滅佛種其罪最重故入此中兼有元地者言各隨元由也云何十因阿難一者淫習交接發於相磨研磨不休如是故有大猛火光於中發動如人以手自相摩觸暖相現前二習相然故有鐵床銅柱諸事是故十方一切如來色目行淫同名欲火菩薩見欲如避火坑二者貪習交計發於相吸吸攬不止如是故有積寒堅氷於中凍冽如人以口吸縮風氣有冷觸生二習相陵故有吒吒波波羅羅青赤白蓮寒氷等事是故十方一切如來色目多求同名貪水菩薩見貪如避瘴海三者慢習交陵發於相恃馳流不息如是故有騰逸奔波積波為水如人口舌自相綿味因而水發二習相鼓故有血河灰河熱沙毒海融銅灌吞諸事是故十方一切如來色目我慢名飲癡水菩薩見慢如避巨溺四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金如是故有刀山鐵梱劍樹劍輪斧鉞鎗鋸如人銜冤殺氣飛動二習相擊故有宮割斬斫銼刺槌擊諸事是故十方一切如來色目瞋恚名利刀劍菩薩見瞋如避誅戮五者詐習交誘發於相調引起不住如是故有繩木絞校如水浸田草木生長二習相延故有杻械枷鎖鞭杖檛棒諸事是故十方一切如來色目姦偽同名讒賊菩薩見詐如畏豺狼溫陵十習初言所感之境次明所報之事淫感火業因相磨而發能所交熾名二習相然故有鐵牀等報如來為導師故色目以警之菩薩為行人故深怖以避之貪習感水由吸取而發吸積風為寒風結水為氷俱舍云吒吒波波忍寒之聲青赤白蓮寒氷之色慢習輕陵由恃己而發驕逸馳流故感騰逸奔波之境積致惡毒故有血河灌吞之報心屬火氣屬金瞋者由心作氣反動其心加之衝擊抵忤則心火轉熾氣金轉剛故心熱發火鑄氣為金詐習依姦起惡而漸滋蔓故如水灌田草木斯長由調引相延故感繩木延引之事讒賊姦詐敗正者也疏獄事皆一物兩見者由先明所具後明所施如瞋習有刀山鐵梱劍樹劍輪之具則有宮擊槌銼之施有斧鉞鎗鋸之體則有斬斫刺銼之用成實云以無謂有名詐曲心詐善名諂諂心事成名誑憍慢差別者婆沙云染著自法慠逸名驕方他自舉名慢六者誑習交欺發於相罔誣罔不止飛心造姦如是故有塵土屎尿穢汙不淨如塵隨風各無所見二習相加故有沒溺騰擲飛墜漂淪諸事是故十方一切如來色目欺誑同名劫殺菩薩見誑如踐蛇虺七者冤習交嫌發於銜恨如是故有飛石投礰匣貯車檻甕盛囊撲如陰毒人懷抱畜惡二習相吞故有投擲擒捉擊射拋撮諸事是故十方一切如來色目冤家名違害鬼菩薩見冤如飲鴆酒八者見習交明如薩迦耶見戒禁取邪悟諸業發於違拒出生相反如是故有王使主吏正執文籍如行路人來往相見二習相交故有勘問權詐考訊推鞫察訪披究照明善惡童子手執文簿辭辨諸事是故十方一切如來色目惡見同名見坑菩薩見諸虗妄偏執如臨毒壑九者枉習交加發於誣謗如是故有合山合石碾磑耕磨如讒賊人逼枉良善二習相排故有押捺捶按蹙漉衡度諸事是故十方一切如來色目冤謗同名讒虎菩薩見枉如遭霹𮦷十者訟習交喧發於藏覆如是故有鑑見照燭如於日中不能藏影二習相陳故有惡友業鏡火珠披露宿業對驗諸事是故十方一切如來色目覆藏同名陰賊菩薩觀覆如戴高山履於巨海溫陵誑者其志誣罔其心飛揚如風鼓塵使人無見故感塵土穢惡之境沒溺騰墜之報冤習銜恨陰隱為傷故感飛石囊撲之境投擲拋撮之報疏飛石以投也如張良擊秦投石以擲也如封人投礰礰完石子也匣貯以擒也以脫函人曰匣貯車檻以捉也甕盛以擊射即覆火鍾之事囊撲以拋撮也如秦撲二弟皆陰隱為傷使人無見也見習證驗由我執起薩迦耶云身即我見也戒取者非果執果見取者非因執因由違拒相反故感斯境勘問王使也權詐主吏也證執文籍所以考訊推究也路人往來必有訪察披究照明驗實及獄門邏逋之事皆惡見所感也溫陵於不宜曲而曲之曰枉枉非真情由誣謗所發逼壓於人感報如此疏蹙漉瀝血也即合山合石之事衡度橫出也即碾磑耕磨之事溫陵訟非官訟公發其覆之謂也此覆彼喧曰交喧陰賊覆藏發則自害覆罪適足以自陷自墜故如戴山履海疏鑑見惡友也照燭業鏡火珠也披露明顯故如日中不能藏影云何六報阿難一切衆生六識造業所招惡報從六根出云何惡報從六根出一者見報招引惡果此見業交則臨終時先見猛火滿十方界亡者神識飛墜乘煙入無間獄發明二相一者明見則能遍見種種惡物生無量畏二者暗見寂然不見生無量恐如是見火燒聽能為鑊湯洋銅燒息能為黑煙紫𦦨燒味能為焦丸鐵糜燒觸能為熱灰爐炭燒心能生星火迸灑煽鼓空界二者聞報招引惡果此聞業交則臨終時先見波濤沒溺天地亡者神識降注乘流入無間獄發明二相一者開聽聽種種閙精神愗亂二者閉聽寂無所聞幽魄沈沒如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧灑諸毒蟲周滿身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄三者嗅報招引惡果此嗅業交則臨終時先見毒氣充塞遠近亡者神識從地涌出入無間獄發明二相一者通聞被諸惡氣熏極心擾二者塞聞氣掩不通悶絶於地如是嗅氣衝息則能為質為履衝見則能為火為炬衝聽則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千眼無量咂食衝思則能為灰為瘴為飛沙礰擊碎身體六交六根造業由於因中互相緣助故感果時於六根中亦交相受報溫凌見覺屬火故感猛火畏見於境恐藏於心聞聽屬水故為鑊湯洋銅鼻嗅主氣為黑煙紫焰舌主味丸糜味類也身主觸灰炭觸類也二聞報注聞發聲故為罪責詰情注見為雷吼水薄火成聲也注息為雨露水隨氣變也乃至為雷電皆隨感而應也三嗅報質礙履通皆嗅業所依飢餒乖爽味類綻折爛壞形類意雜亂思感為灰沙四者味報招引惡果此味業交則臨終時先見鐵網猛𦦨熾烈周覆世界亡者神識下透挂網倒懸其頭入無間獄發明二相一者吸氣結成寒氷凍裂身肉二者吐氣飛為猛火焦爛骨髓如是嘗味歷嘗則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為弩為射歷思則能為飛熱鐵從空雨下五者觸報招引惡果此觸業交則臨終時先見大山四面來合無復出路亡者神識見大鐵城火蛇火狗虎狼獅子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄發明二相一者合觸合山逼體骨肉血潰二者離觸刀劍觸身心肝屠裂如是合觸歷觸則能為道為觀為廳為按歷見則能為燒為爇歷聽則能為撞為擊為剚為射歷息則能為括為袋為考為縛歷嘗則能為耕為鉗為斬為截歷思則能為墜為飛為煎為炙六者思報招引惡果此思業交則臨終時先見惡風吹壞國土亡者神識被吹上空旋落乘風墮無間獄發明二相一者不覺迷極則荒奔走不息二者不迷覺知則苦無量煎燒痛深難忍如是邪思結思則能為方為所結見則能為鑑為證結聽則能為大合石為氷為霜為土為霧結息則能為大火車火船火檻結嘗則能為大叫喚為悔為泣結觸則能為大為小為一日中萬生萬死為偃為仰阿難是名地獄十因六果皆是衆生迷妄所造若諸衆生惡業同一本作圓造入阿鼻獄受無量苦經無量劫六根各造及彼各所作兼境兼根是人則入八無間獄身口意三作殺盜淫是人則入十八地獄三業不兼中間或為一殺一盜是人則入三十六地獄見見一根單犯一業是人則入一百八地獄由是衆生別作別造承上五惡業不同於世界中入同分地妄想發生非本來有四味報溫陵舌噉生命使彼乘忍故歷嘗發苦使己承忍依見貪味故為然金石依聽發惡故為利刀兵依嗅籠味故為大鐵籠觸味傷物故感弓箭以自傷緣味思物故感飛鐵以充味五觸報大山來合皆惡觸雜感也觸業所依不出離合屠裂離相也道趨獄路觀獄王門闕也廳案治罪之處身處所依也括袋所以收氣也思業漂蕩故感飛墜以刃曰剚剚射考縛則相因旁舉也六思報思屬土而飄蕩故惡風壞國荒奔迷思也知苦覺思也憑思則有所故為受罪方所疏見能證鑑聽為氷霜聞波所結也為車檻火船息所出入也為叫喚悔泣舌所出言也為大小偃仰身與身業也阿難下總結經意十因俱起為圓造由他所起為兼境由身所起為兼根泥犁經云火獄有八寒獄有八又有十八鬲子地獄即有間也及三十六獄一百八獄皆眷屬獄也復次阿難是諸衆生非毀破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然後還罪畢受諸鬼形若於本因貪物為罪是人罪畢遇物成形名為怪鬼貪色為罪是人罪畢遇風成形名為魃鬼貪惑為罪是人罪畢遇畜成形名為魅鬼貪恨為罪是人罪畢遇蟲成形名蠱毒鬼貪憶為罪是人罪畢遇衰成形名為厲鬼貪傲為罪是人罪畢遇氣成形名為餓鬼貪罔為罪是人罪畢遇幽為形名為魘鬼貪明為罪是人罪畢遇精為形名魍魎鬼貪成為罪是人罪畢遇明為形名役使鬼貪黨為罪是人罪畢遇人為形名傳送鬼阿難是人皆以純情墜落業火燒乾上出為鬼此等皆是自妄想業之所招引若悟菩提則妙圓明本無所有四鬼道本因指造罪之處遇物即感果之時隨貪何物為因則感何物為果色貪者乾枯感旱魃惑貪者迷罔感魑魅恨貪者蜇螫感蠱毒憶貪者念舊感衰厲慠貪者虗驕感餓鬼罔貪者幽綿感魘鬼明貪者精耀感魍魎成貪者期功感役使黨貪者趨勢感傳送復次阿難鬼業既盡則情與想二俱成空方於世間與元負人冤對相值身為畜生酬其宿債物怪之鬼物銷報盡生於世間多為梟類風魃之鬼風銷報盡生於世間多為咎徵一切異類畜魅之鬼畜死報盡生於世間多為狐類蟲蠱之鬼蠱滅報盡生於世間多為毒類衰厲之鬼衰窮報盡生於世間多為蛔類受氣之鬼氣銷報盡生於世間多為食類綿幽之鬼幽銷報盡生於世間多為服類和情之鬼和銷報盡生於世間多為應類明靈之鬼明滅報盡生於世間多為休徵一切諸類依人之鬼人亡報盡生於世間多為循類阿難是等皆以業火乾枯酬其宿債旁為畜生此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為浮虗妄想凝結五畜生物銷報盡夙業已償故轉形畜道以酬餘報鴟梟附塊貪物餘報咎徵凶事前驗魃雪餘報狐狼多惑蛇虺多毒蟯蛔惡類豬羊食類蠶蟲服類燕隼應類休徵麟類貓犬循類各從其餘也復次阿難從是畜生酬償先債若彼酬者分越所酬此等衆生還復為人反徵其剩如彼有力兼有福德則於人中不捨人身酬還彼力若無福者還為畜生償彼餘直阿難當知若用錢物或役其力償足自停如於中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息除奢摩他及佛出世不可停寢汝今應知彼梟倫者酬足復形生人道中參合頑類彼咎徵者酬足復形生人道中參合異類我狐倫者酬足復形生人道中參於庸類彼毒倫者酬足復形生人道中參合狠類彼蛔倫者酬足復形生人道中參合微類彼食倫者酬足復形生人道中參合柔類彼服倫者酬足復形生人道中參合勞類彼應倫者酬足復形生人道中參合文類彼休徵者酬足復形生人道中參合明類彼諸循倫酬足復形生人道中參於達類阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者六人道溫陵為畜正酬酬過其分則為反徵過分謂非理苦役食噉無度等疏梟倫復形而為人參合頑類者是亦餘習使然頑木無別親疏也異詭奇庸駑鈍也凶狼微賤柔懦勤勞以至文明而通達者由隨習之不同故感報亦然也阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十種仙阿難彼諸衆生堅固服餌而不休息食道圓成名地行仙堅固草木而不休息藥道圓成名飛行仙堅固金石煉養丹砂而不休息化道圓成名遊行仙堅固動止運氣調身而不休息氣精圓成名空行仙堅固津液吐故納新而不休息潤德圓成名天行仙堅固精色服虹飲露而不休息吸粹圓成名通行仙堅固呪禁而不休息術法圓成名道行仙堅固思念澄凝精思而不休息思憶圓成名照行仙堅固交遘而不休息感應圓成名精行仙堅固變化而不休息覺悟圓成名絶行仙阿難是等皆於人中煉心不修正覺別得生理壽千萬歲休止深山或大海島絶於人境斯亦輪回妄想流轉不修三昧報盡還來散入諸趣七仙道仙者山中人也絶世離俗存想固形是為別修然必和順仁信為質故比天為劣於人為優藥餌駐壽未能輕舉曰地行還丹點化遊戲人間曰遊行此假物成行者也伏息導引動止自運名空行津液內潤婥約皎潔名天行吸取精粹引生光色名通行呪術靈祕變化萬物名道行此能通力者也明鍊精思念心獨照名照行坎離水火自相交遘名精行深窮化理覺物自然名絶行此最超越者也阿難諸世間人不求常住未能捨諸妻妾恩愛於邪淫中心不流逸澄瑩生明命終之後鄰於日月如是一類名四天王天於己妻房淫愛微薄於淨居時不得全味命終之後超日月明居人間頂如是一類名忉利天逢欲暫交去無思憶於人間世動少靜多命終之後於虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須𦦨摩天一切時靜有應觸來未能違戾命終之後上升精微不接下界諸人天境乃至劫壞三災不及如是一類名兜率陀天我無欲心應汝行事於橫陳時味如嚼蠟命終之後生越化地如是一類名樂變化天無世間心同世行事於行事交了然超越命終之後遍能出超化無化境如是一類名他化自在天阿難如是六天形雖出動心迹尚交自此以還名為欲界八天道欲界一四天者非己匹配名曰邪淫能窒邪淫則心淵澄瑩感生初天二忉利者前止邪淫未制其正今亦微薄故得生彼三夜摩者前雖云薄心尚綿微未能純於淨居之味此既暫交於前有間故動少靜多感報於此四兜率溫陵雖靜心愈多亦未免應觸此能少欲未能無心五變化疏我本無心應汝而已嚼蠟言無味超越化地越於也六他化自在前雖無心猶應境事此雖超越故暫同世間鎮澄讚曰修行增進證果功圓首楞萬行一言詮助道意乾乾諸趣紛然戒備在心田傳如截流曰明五種經題謂之結經分者前開理解修證文義浩博必須結撮綱要乃便記憶故文殊師利言當何名此經我及衆生云何受持是經名大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼者此全從神呪得名義兼體宗用也悉怛多般怛囉乃神呪之總稱呪從大覺頂中所説故曰無上能別魔外故曰寶印三世諸佛莫不由此破諸妄塵徹照萬象故曰清淨海眼海之一滴即具百川故但舉眼全體斯在亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海者文見四卷之中此用契宗體以得名也亦名如來密因了義者文雖分屬見道其體本遍初後此兼宗體力用及以教相得名也亦名大方廣妙蓮華王十方佛母陀羅尼呪文見五卷之前此兼體用以得名也亦名灌頂章句諸菩薩萬行首楞嚴者此雖分屬修證二分亦徹於前以用兼體宗故也言灌頂者西竺凡方等深經有密語者通灌頂部攝若約當經則諸佛放光交灌其頂及明菩薩受職智水灌頂是故云也天台凡釋題具有五重所謂名體宗用教相名中復有七種謂單三復三及具足一此經首題人法喻三悉皆具足大佛頂兼化佛人也呪心法也寶印喻也餘可例知此經實相為體經云欲令汝等通達實相故微密觀察為宗明妙奢摩他等為十方諸佛成道之法因果圓該故破妄顯真為用經廣明諸法虗幻斷諸惑業顯常住真心故大乘生酥為教相經始於常心終克極果類法華其間漸次深入廣顯性真多談相妄且非維摩所談不二法門明天魔勞侶皆為侍者等圓覺所談大光明藏一切障礙即究竟覺得念失念無非解脫等華嚴圓彰法界婆須密女無厭足王勝熱婆羅門諸善知識若逆若順皆為法門等智者大師謂華嚴尚兼一別此經判屬方等不及法華純一無雜斯言當哉説是經題之後阿難大衆得蒙如來開示密印般怛囉義之義者無上寶印十方如來清淨海眼義為佛頂神呪所表曰密經題非一故曰兼聞了義名目頓悟禪那修進聖位增上妙理者此通結見修證三分之益斷除三界修心六品微細煩惱者蓋聞深證淺且思惑未盡機教權實可知結經之後將明助道先舉寶蓮香比丘尼之淫琉璃王之殺善星之妄淫殺妄中義兼于盜四種律儀隨破一種皆致泥犁之苦今示此者務使末世多聞及諸博地因教知非怖果絶因也衆生心念循境下流謂分內之情衆生志慮逆情外慕謂分外之想今寶蓮香等唯順惡業故皆陷入地獄文舉十習六交種種苦報具明地獄相也地獄報盡還為餓鬼鬼報既盡更生畜生畜生報盡仍復為人所謂如汲井輪無有暫已行者窮研佛語不毛竪者真一闡底迦也音釋刳音枯噉音淡舐袖爾切吻武粉切鎣瑩同胤羊晉切鑽祖官切復音福愞乳苑切涎徐延切液音亦盻匹見切毅音貮綏音雖濫盧暫切吸許及切吒師加反忤五故切梱與閫同斫職略切銼千臥切刺七迹切槌音椎調徒弔切絞古巧切校音教撾陟瓜切棒步頂反讒助咸切豺音才誣音無屎音始尿乃弔切擲音直虺許鬼切銜音咸礰音歷檻丁斬切撲普卜切撮七活反鴆直禁切鞠音菊碾尼展切磑魚對切押乙甲切捺乃葛切槌音堆蹙子六切漉音鹿迸北盂切煽音扇愗音茂詰音吉雹弼角切餒奴罪切咂作答切矟色角切潰胡對切剚側刺切魃音跋癘音例魘於琰切魍音罔魎音兩剩其證切狠乎懇切
