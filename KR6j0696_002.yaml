body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第二顯常性之餘爾時阿難及諸大衆聞佛示誨身心泰然念無始來失却本心妄認緣塵分別影事今日開悟如失乳兒忽遇慈母合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性時波斯匿王體諸大衆欲問之心起立白佛我昔未承諸佛誨敕見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃我雖值佛今猶狐疑云何發揮證知此心不生滅地今此大衆諸有漏者咸皆願聞佛告大王汝身現在今復問汝汝此肉身為同金剛常住不朽為復變壞世尊我今此身終從變滅佛言大王汝未曾滅云何知滅世尊我此無常變壞之身雖未曾滅我觀現前念念遷謝新新不住如火成灰漸漸銷殞殞亡不息決知此身當從滅盡佛言如是大王汝今生齡已從衰老顏貌何如童子之時世尊我昔孩孺膚腠潤澤年至長成血氣充滿而今頺齡迫於衰耄形色枯悴精神昏昧髮白面皺逮將不久如何見比充盛之時佛言大王汝之形容應不頓朽王言世尊變化密移我誠不覺寒暑遷流漸至於此何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十於今六十又過於二觀五十時宛然強壯世尊我見密移雖此殂落其間流易且限十年若復令我微細思惟其變寧唯一紀十二年為一紀一云十年二紀實惟年變豈唯年變亦兼月化何直月化兼又日遷沈思諦觀剎那剎那念念之間不得停住故知我身終從變滅佛告大王汝見變化遷改不停悟知汝滅亦於滅時汝知身中有不滅耶波斯匿王合掌白佛我實不知佛言我今示汝不生滅性大王汝年幾時見恆河水王言我生三歲慈母擕我謁耆婆天經過此流爾時即知是恆河水佛言大王如汝所說二十之時衰於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何王言如三歲時宛然無異乃至於今年六十二亦無有異佛言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恆水與昔童時觀河之見有童耄不王言不也世尊佛言大王汝面雖皺而此見精性未曾皺皺者為變不皺非變變者受滅彼不變者元無生滅云何於中受汝生死而猶引彼末伽梨等都言此身死後全滅王聞是言信知身後捨生遺假形趣生全真性與諸大衆踊躍歡喜得未曾有五觀河之見疏即無常生滅之身顯常住不滅之性故指觀河為喻以明流而不易之體也夫一切有身無不皆滅若俱舍以二種觀無常所謂鄰虗分剎那滅者即身心二念性也此文所顯略有三節即三念處一從佛問汝未曾滅下是以心念處觀無常念念遷謝心之體也新新不住無常之性也如火成灰者不更新之意二從問汝今生齡下是以身念處觀無常顏貌膚腠身之相也孩孺者稚齡而血氣者壯年色也頺耄枯悴總指老年之狀以至於逮將不久者言無常之理然也三從問汝之形容下是以法念處觀無常寒暑歲月諸法之體也我年二十下取十年為限以寬數粗觀也實惟年變下取從寬至促以細相密觀也殂落者遷謝之義年變月化皆無常之體以至于終從變滅者指必然之勢也佛告下顯不遷之性蓋生生者不生化化者不化故雖受世間之身而不受變於世此觀河之見所以無童耄也孤山見精即見性也皺者為變則顯生死無常不皺非變則顯涅槃常住疏涅槃論五種常一無窮常二無起常三恆在常四湛然常五無變常無變常即觀河之性阿難即從座起禮佛合掌長跪白佛世尊若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事願興慈悲洗我塵垢即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手結印為正為倒阿難言世間衆生以此為倒而我不知誰正誰倒佛告阿難若世間人以此為倒即世間人將何為正阿難言如來豎臂兜羅綿手解見前卷上指於空則名為正佛即豎臂告阿難言若此顛倒首尾相換諸世間人一倍瞻視則知汝身與諸如來清淨法身比類發明比于手指正倒之類而發明之如來之身名正遍知汝等之身號性顛倒隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒於時阿難與諸大衆瞪瞢瞻佛目睛不瞬不知身心顛倒所在佛興慈悲哀愍阿難及諸大衆發海潮音遍告同會諸善男子我常說言色心諸緣及心所使諸所緣法唯心所現汝身幻身汝心妄心皆是妙明真精妙心中所現物云何汝等遺失本妙圓妙明心寶明妙性認悟中迷晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎及山河虗空大地咸是妙明真心中物譬如澄清百千大海棄之惟認一浮漚體目為全潮窮盡瀛渤汝等即是迷中倍人如我垂手等無差別如來說為可憐愍者六離倒真性溫陵因王問答反動疑塵以謂真性有生有滅可說遺失既無生滅云何能遺佛答謂諸佛衆生同一體性固無遺失特因見倒言之也如手順垂為正反以為倒逆豎為倒反以為正是失真也疏此下漸約即境明心故佛廣舉根身器界顯遍知也色心諸緣即根塵之法以體言之為寶明妙性心所使者即染淨諸法以遍言之為圓妙明心蓋諸法所生惟心所現是本來之悟遺此本悟取之色身是認悟中迷矣晦昧下明顛倒之處謂真性圓遍無內無外由一念晦昧變頑為空次則結晦昧為色雜想相為身其妄動之情聚緣於內奔流於外昏擾不停而人則取此緣氣以為己心遂謂此心在藐爾身中不知外及山河虗空大地咸是妙明之體也故法華云是法住法位世間相常住由其取小遺大如棄海認漚故為迷中倍人倍猶增倍也阿難承佛悲救深誨垂泣叉手而白佛言我雖承佛如是妙音悟妙明心元所圓滿常住心地而我悟佛現說法音現以緣心允所瞻仰信尊佛說徒獲此心即上妙明之心未敢認為本元心地願佛哀愍宣示圓音拔我疑根歸無上道阿耨菩提佛告阿難汝等尚以緣心聽法此法亦緣非得法性如人以手指月示人彼人因指當應看月若復觀指以為月體此人豈唯亡失月輪亦亡其指何以故以所標指為明月故豈唯亡指亦復不識明之與暗何以故即以指體為月明性明暗二性無所了故汝亦如是若以分別我說法音為汝心者此心自應離分別音有分別性譬如有客寄宿旅亭暫止便去終不常住而掌亭人都無所去名為亭主此亦如是若真汝心則無所去云何離聲無分別性斯則豈唯聲分別心分別我容離諸色相無分別性如是乃至分別都無非色非空拘舍離等昧為冥諦離諸法緣無分別性則汝心性各有所還云何為主阿難言若我心性各有所還則如來說妙明元心云何無還惟垂哀愍為我宣說佛告阿難且汝見我見精明元此見雖非妙精明心如第二月非是月影汝應諦聽今當示汝無所還地阿難此大講堂洞開東方日輪升天則有明耀中夜黑月雲霧晦暝則復昏暗戶牖之隙則復見通牆宇之間則復觀壅分別之處則復見緣頑虗之中遍是空性雜𡋯沓之象則紆結昏塵澄霽斂氛又觀清淨阿難汝咸看此諸變化相即上八種相吾今各還本所因處云何本因阿難此諸變化明還日輪何以故無日不明明因屬日是故還日暗還黑月通還戶牗壅還墻宇緣還分別頑虗還空𡋯還塵清明還霽則諸世間一切所有不出斯類汝見八種見精明性當欲誰還何以故若還於明則不明時無復見暗雖明暗等種種差別見無差別諸可還者自然非汝不汝還者非汝而誰則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被漂溺是故如來名可憐愍七無還常性溫陵因聞法音悟妙明心本來圓滿了無遺失故曰常住心地然情猶鹵莽見未精明尚以能聞緣心為所悟妙性此固常情疑混根於心而難拔者故願佛拔之疏阿難以緣心聽法即前緣塵分別故復以客義推徵亭中主人喻常住之性即八中無還者也此顯奢摩他之終將明起行故示無還之性溫陵聲分別心指聲上緣心即分別法音者也分別我容謂色上緣心即允所瞻仰者也如是乃至者即該舉六塵皆無自性也緣塵之心離塵無體故拘舍離等昧為冥諦吳興阿難問妙明元心佛以見精為答者應知此見亦是前來緣塵之見但緣塵分別之見有還緣塵能見之性無還如下文所謂其目周視但如鏡中無別分析即見精者也汝識於中次第標指是文殊等即緣塵分別者也疏明精明心即第八妙圓真心見精明元則眼根映色之性六湛精明乃第八所分名第二月由妙心全體難見故指見精以示無還成實云以指按目則見二月阿難下欲示無還之性先指可還之相言本因者謂日為明因黑為暗因隙為通因乃至霽為清淨因此皆有還惟見精無還也顯見性文七此下經義多即境顯性義當三摩波提由其境界與觀照義相應故涉能所性顯即離故且以由前寂靜之力照體既立理應發諸事業蓋所以賞觸類之妙盡緣情之鑑由真立俗理應然故義例如前亦分七種見性阿難言我雖識此見性無還云何得知是我真性佛告阿難吾今問汝今汝未得無漏清淨承佛神力一聲聞見見於初禪得無障礙二羅漢見而阿那律見閻浮提如觀掌中菴摩羅果三菩薩見諸菩薩等見百千界四如來見十方如來窮盡微塵清淨國土無所不矚五衆生見衆生洞視不過分寸阿難且吾與汝觀四天王所住宮殿上自四天中間遍覽水陸空行下至大地雖有昏明種種形像一切物相所在之處無非前塵目前諸塵分別留礙汝應於此分別自我他物今吾將汝擇於見中誰是我體誰為物象一本作相阿難極汝見源盡汝眼力從日月宮最上物相是物非汝至七金山居中物相周遍諦觀雖種種光亦物非汝此以下最下物相漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚則諸物類自有差別見性無殊此精妙明誠汝見性一能遍一切見性佛告下泛敘見用由阿難至如來略分四種見相衆生洞視不過分寸者不能觀障外也且吾下先指物境是諸下後顯見用見精即能遍之性遠近即所遍之境見境性異是謂分別自他也按佛地論說妙觀察智有十種因由三摩波提者是觀察性故此智以觀三界為性故十因者論云觀察智以觀世界衆生為建立因觀器世間為生起因以觀世界洲渚日月四天王天三十三天及夜摩兜率變化乃至梵衆天為分別因釋曰此分別因即今文所顯者但經約順觀故從初禪而下論約逆觀故從洲渚而上經所謂分別自他者即分別因也若見是物則汝亦可見吾之見若同見者名為見吾吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝又則汝今見物之時汝既見物物亦見汝體性紛雜則汝與我并諸世間不成安立阿難若汝見時是汝非我見性周遍非汝而誰云何自疑汝之真性性汝不真取我求實照應二無相之見疏地論觀察智以觀空無相法界教理為降伏怨敵因由觀空故無見相又法界者無見相故若見下示見非是物真際曰若見是物吾見亦同是物汝應可見疏若同下圓悟以物為香臺尤為易曉謂阿難與佛同見香臺名見佛見者若佛不見香臺汝何所見耶縱謂佛不見香臺吾亦不見名見佛見者此亦非佛不見之相彼不見之相本自無相豈汝所能見之若不下謂性無見相若不起見則即汝之性也又若謂見是物則物應有見故物亦見汝若相見者即有雜亂之過故不成安立溫陵見性周遍即汝真性何疑不真而求質於我耶此結答云何得知是我真性之問也阿難白佛言世尊若此見性必我非餘我與如來觀四天王勝藏寶殿居日月宮此見周圓遍娑婆國退歸精舍秪見伽藍清心戶堂但瞻簷廡世尊此見如是其體本來周遍一界今在室中唯滿一室為復此見縮大為小為當墻宇夾令斷絶我今不知斯義所在願垂弘慈為我敷演佛告阿難一切世間大小內外諸所事業各屬前塵不應說言見有舒縮譬如方器喻前塵中見方空喻見體吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空應不圓若不定者在方器中應無方空汝言不知斯義所在義性如是云何為在阿難若復欲令入無方圓但除器方空體無方不應說言更除虗空方相所在若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面若築墻宇能夾見斷穿為小竇寧無續跡是義不然三隨量應現觀四天等者約量為問言各屬前塵者即見隨境顯非性有舒縮也以器喻量空喻體性量故定方空故不定入無方圓者言不隨情起限量見也又地論以觀世界自相共相為斷疑因謂如大千世界大小輪圍之所圍繞以大輪圍為共相小輪圍為自相譬如鏡智雖知自共相而不能說惟觀察智能說以斷他疑釋曰按經此見遍娑婆國此共相也乃至但瞻簷廡此自相也為復縮大令小此問疑也一切衆生從無始來迷己為物失於本心為物所轉故於是中觀大觀小若能轉物則同如來身心圓明不動道場於一毛端遍能含受十方國土四轉物同如轉前塵之物同真如之體則無小大之觀亦能含受無礙所以顯同如之用也又轉物者前以即空門中約實際理地不受一塵故己身皆物今以觀照義邊約事相門中不捨一法故外物皆己又地論以觀世界共相種種衆會為受用因釋曰按他受用身亦為如來之義則經言含受是約自體也阿難白佛言世尊若此見精必我妙性今此妙性現在我前見必我真我今身心復是何物而今身心分別有實彼見無別分辨我身若實我心令我今見見性實我而身非我何殊如來先所難詰言物能見我惟垂大慈開發未悟佛告阿難今汝所言見在汝前是義非實若實汝前汝實見者則此見精既有方所非無指示且今與汝坐祇陀林遍觀林渠及與殿堂上至日月前對恆河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空如是乃至草樹纖毫大小雖殊但可有形無不指著若必其見現在汝前汝應以手確實指陳何者是見阿難當知若空是見既已成見何者是空若物是見既已是見何者為物汝可微細披剝萬象析出精明淨妙見元指陳示我同彼諸物分明無惑阿難言我今於此重閣講堂洎遠恆河上觀日月舉手所指縱目所觀指皆是物無是見者世尊如佛所說況我有漏初學聲聞乃至菩薩亦不能於萬物象前剖出精光離一切物別有自性佛言如是如是五即物所顯由上云轉物故以山河皆我自性為難然經中之意在即物所顯陰者是林下言除物無見喻離相無體故云若離物有體則可指陳若空是見下言物若是見即別無物體故云若見是物則無見可剖今于萬象不能剖出應即物所顯矣故僧問趙州如何是佛州云庭前柏樹又地論觀察智以觀種種可玩園林池等為歡喜因是則無一物不播如來之名無情共說義在茲矣佛復告阿難如汝所言無有見精離一切物別有自性則汝所指是物之中無是見者今復告汝汝與如來坐祇陀林更觀林苑乃至日月種種象殊必無見精受汝所指汝又發明此諸物中何者非見阿難言我實遍見此祇陀林不知是中何者非見何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空我又思惟是萬象中微細發明無非見者佛言如是如是六離物所顯復告下謂見非是物方有所見故云若樹非見云何見樹又物若即見則無所見故云若樹即見復云何樹是萬象中無非見者此可剖出也又前以能所互奪故除樹無見今以能所互分故樹能有見故長慶云萬象之中獨露身而法眼問云是撥萬象不撥萬象此辨驗之意也地論以此因同上謂歡喜因也又地論與此經有開合不同有先後各異謂地論約相分所起故先以建立因總觀世界衆生此經約見分所起故先以分別因別觀日月泗洲等於是大衆非無學者聞佛此言茫然不知是義終始一時惶悚失其所守如來知其魂慮變懾心生憐愍安慰阿難及諸大衆諸善男子無上法王證極之號是真實語如稱義所如真如說不誑不妄非末伽黎四種不死矯亂論議汝諦思詳審推無忝辱哀慕是時文殊師利法王子愍諸四衆在大衆中即從座起頂禮佛足合掌恭敬而白佛言世尊此諸大衆不悟如來發明二種精見色空是非是義世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖非是疇昔善根輕鮮惟願如來大慈發明此諸物象色空與此見精元是何物於其中間無是非是佛告文殊及諸大衆十方如來及大菩薩於其自住證三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊如是世尊我真文殊無是文殊何以故若有是者則二文殊然我今日非無文殊於中實無是非二相佛言此見妙精見明與諸空色空塵亦復如是本是妙明無上菩提淨圓真心妄為色空及與聞見如第二月誰為是月又誰非月文殊但一月真中間自無是月非月是以汝今觀見與塵種種發明名為妄想不能於中出是非是由是精真妙覺明性故能令汝出指非指七證性離言將入自住三昧絶相離言無所對待故以文殊問明無是非義精見色空名為二種是非者是見非見是空非空也吳興始終者始則見性是物終則見性非物疏自證三摩地者自證境也自性為見色空為緣分別之情名所想相俱無所有故如空華如汝文殊喻妙圓無二更有文殊是文殊者離增益也為無文殊離損減也若二文殊則有第二之月即起是非之情然世間之月本無第二喻妙圓真心本無聞見亦無是非也由是下結明經意是空是見名為可指非空非見名不可指妙覺真精此相俱離是故出之三摩地五蘊論云即三摩波提也而梵語差殊有多種名義如涅槃云毗婆舍那一名正見一名了見一名能見一名遍見一名次第見此皆觀照義性也故地論釋觀察智品云即陀羅尼及三摩地俱名為門有通生義故又彼論說三摩地名妙生菩薩得此定故立妙生號而妙生者文殊也故以此定之人發此定之問釋三摩波提竟簡情文七此下經意多為簡情顯性義當禪那由離前空假沉掉二境顯中道故及平等性中融無二故顯圓成實絶戲論故蓋以見網易縈若不訊諸動寂將或謬以隨迎是以擬議四句甄陶二邊剪諸見之萌褰積疑之網然聖言每約屬意多途前哲由茲作論後賢所以殷學阿難白佛言世尊誠如法王佛所說覺緣遍十方界湛然性住性非生滅與先梵志外道娑毗迦羅所談冥諦及投灰等諸外道種說有真我遍滿十方有何差別世尊亦曾於楞伽山為大慧等敷演斯義彼外道等常說自然我說因緣非彼境界我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非因緣與彼自然云何開示不入羣邪獲真實心妙覺明性佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然阿難若必自然自須甄辨明有自然體汝且觀此妙明見中以何為自此見為復以明為自以暗為自以空為自以塞為自阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者明於明時見性斷滅云何見明一簡自然言覺緣者指前見與見緣根境之法亦即下文覺緣非眚之體然黃髮之徒亦說有真我遍界以濫真說故佛於楞伽山上說因緣義破彼境界今觀覺性有自然體則與外道自然有何分別且汝下約明暗色空推自然性如謂妙見以明為自體者則性一於明應無見暗若性非自然之體則因緣之性俱為情計可知故中觀論云若無有自性云何有他性按經論所破各有差別謂經約遍破諸見故以自然為初論約竪窮諸見故以生滅為首阿難言必此妙見性非自然我今發明是因緣生心猶未明咨詢如來是義云何合因緣性佛言汝言因緣吾復問汝汝今因見見性現前此見為復因明有見因暗有見因空有見因塞有見阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞當知如是精覺妙明非因非緣亦非自然非不自然無非不非無是非是離一切相即一切法汝今云何於中精覺措著念心以諸世間戲論名相而得分別如以手掌撮摩虗空秪益自勞虗空云何隨汝執捉二因緣此中因緣義同前破謂見若因明則性一於明固無見暗故淨名經云法不屬因不在緣故溫陵假物為因循物為緣既無定趣非因緣矣因緣自然皆為遍計故曰離一切相遍計既離圓成實現故曰即一切法疏經言非因緣等者離一切相也非不自然等者即一切法也此中諸句略有四義一非因緣等者顯非相義及一相義辨中邊論云故說一切法非空非不空有無及有故是則契中道一相者佛性論云一切法性惟有一相所謂非相非相即是平等法性二離一切相等者顯遠離義及圓融義地論云遠離異相即無有相遠離非相即無無相又當離即法離無離相當法即離即無即相離即不二圓融之旨也精覺妙明義性如是故非世間戲論名相可能分別阿難白佛言世尊必妙覺性非因非緣世尊云何常與比丘宣說見性具四種緣所謂因空因明因心因眼引經問難是義云何佛言阿難我說世間諸因緣相非第一義阿難吾復問汝諸世間人說我能見云何名見云何不見阿難言世間因於日月燈光見種種相名之為見若復無此三種光明則不能見阿難若無明時名不見者應不見暗若必見暗此但無明云何無見阿難若在暗時不見明故名為不見今在明時不見暗相還名不見如是二相俱名不見若復二相自相陵奪非汝見性於中暫無如是則知二俱名見云何不見是故阿難汝今當知見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞四義成就汝復應知見見之時見非是見見猶離見見不能及云何復說因緣自然及和合相汝等聲聞狹劣無識不能通達清淨實相吾今誨汝當善思惟無得疲怠妙菩提路三世間溫陵緣生之法因空而有因明而顯因心而知因眼而見乃世間名相於第一義皆為戲論疏入楞伽云第一義諦即圓成實性故第一義空經云眼等以第一義諦故無世諦故有又成實論云以世諦故得成中道釋曰謂若第一義諦無有世諦即成一邊之見不名中道故淨名云法住實際諸邊不動故是故下顯超情義見聞覺知為根明暗色空為境是非是明者以明真性超境緣也見非是見者以明真性超根緣也故天童覺云超見緣也是而無是出情量也當而無當又下文以見與見緣為我覺明所緣之眚而我覺明之體不墮眚中即超出之意也阿難白佛言世尊如佛世尊為我等輩宣說因緣及與自然諸和合相與不和合心猶未開一疑而今更聞見見非見重增迷悶二疑伏願弘慈施大慧目觀空者開示我等覺心明淨作是語已悲淚頂禮承受聖旨爾時世尊憐愍阿難及諸大衆將欲敷演大陀羅尼諸三摩提妙修行路告阿難言汝雖強記但益多聞於奢摩它三止微密觀照三觀心猶未了汝今諦聽吾當為汝分別開示亦令將來諸有漏者獲菩提果阿難一切衆生輪回世間由二顛倒分別迷別為同迷同為別見妄當處發生當業輪轉云何二見一者衆生別業妄見二者衆生同分妄見云何名為別業妄見阿難如世間人目有赤眚夜見燈光別有圓影五色重疊於意云何此夜燈明所現圓光為是燈色為當見色阿難此若燈色則非眚人何不同見而此圓影唯眚之觀若是見色見已成色則彼眚人見圓影者名為何等復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出離見別有應非眼矚云何眚人目見圓影是故當知色實在燈見病為影影見俱眚見眚非病終不應言是燈是見於是中有非燈非見如第二月非體非影何以故第二之觀揑所成故諸有智者不應說言此揑根元是形非形離見非見此燈影亦如是目眚所成今欲名誰是燈是見何況分別非燈非見四別業問見見非見下發明二業之疑也別業者一人妄見同業者多人妄見燈影之喻以明妄不妨真即寂而照名奢摩他微密觀照故俱舍云中定者即靜而慮名靜慮故何難下孤山曰目喻本具真智燈喻本具真理赤眚喻妄業圓影喻妄境境即五陰也是故下色實在燈理體本真也見病為影妄心成境也見病非眚者謂有智眚人知因目眚終不執言緣影實有故雖見眚不為見病補注惟眚之觀謂獨有眚者見之名為何等謂若是見色既以成色不可名見矣疏中觀論云燈中自無暗住處亦無暗暗者即影像住處者境界也燈中無暗故知妄影本虗真智本明雖有眚色不為見病以明即妄而真之意云何名為同分妄見阿難此閻浮提除大海水中間平陸有三千洲水環陸地曰洲正中大洲指閻浮東西括量大國凡有二千三百其餘小洲在諸海中其間或有三兩百國或一或二至于三十四十五十此皆布于大洲之外者阿難若復此中有一小洲最小秪有兩國最少唯一國人同感惡緣則彼小洲當土同業衆生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珮玦彗孛飛流負耳虹霓種種惡相但此國見彼國衆生本所不見亦復不聞阿難吾今為汝以此二事進退合明阿難如彼衆生別業妄見矚燈光中所現圓影雖似前境終彼見者目眚所成眚即見勞非色所造然見眚者終無見咎例汝今日以目觀見山河國土及諸衆生皆是無始見病所成見與見緣似現前境元我覺明見所緣眚覺見即眚本覺明心覺緣非眚五同業疏引不祥境界以明同業之妄夫眚災變易非常之有也由衆生妄業所感故象見於天暈適珮玦日月之災象也日月食曰適禮云適見天日為之食適謫也周禮輝有十種輝暈也惡氣環日相連曰珮中斷曰玦諸暈皆環而無端唯虹有端倪故曰虹霓虹紅也白虹貫日曰彌螮蝀旁升曰隮即赤虹也皆因日而有故並曰暈彗孛飛流星辰之災象也彗曰旄頭孛曰蔽暗春秋有星孛于東方常星不見繁露作星茀茀即孛也蓋災星變象其行有凌犯逆順之殊疾徐留守之異飛疾行也流徐行也所以省下民德過之祥示天下吉凶之象故素問氣交變大論云以道留久逆守而小是為省下以道而去去而速來是謂省過此飛流之象也又曰久留而環或離或附是謂議災與其德也此負耳之象也阿難下以少例多曰進以多例少曰退同業多別業少而彼衆合下進別例同也例汝今日下退同例別也皆是無始等者釋成妄本也元我覺明者言妄依真起也覺見即眚者覺則本覺見即見緣言本覺雖有覺見之眚而本覺明心能覺眚緣者性非眚耳覺所覺眚覺非眚中此實見見云何復名覺聞知見是故汝今見我及汝并諸世間十類衆生皆即見眚非見眚者彼見真精性非眚者故不名見阿難如彼衆生同分妄見例彼妄見別業一人一病目人同彼一國彼見圓影眚妄所生此衆同分所現不祥同見業中瘴惡所起俱是無始見妄所生例閻浮提三千洲中兼四大海娑婆世界并洎十方諸有漏國及諸衆生同是覺明無漏妙心見聞覺知虗妄病緣和合妄生和合妄死若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨本心本覺常住疏覺所覺眚覺非眚中者重釋本覺明心離眚之義以答明前問也覺見即見見也云何復名者顯智超情謂而性覺之體離名言也故論云以智實性離名言故智非智境以智超過一切境故不可說是智非智境釋曰按圓覺云修禪那者無知覺明不依諸礙永得超過礙無礙境受用世界及與身心相在塵域如器中鍠聲出于外煩惱涅槃不相留礙則覺明者即本覺明心也超過礙無礙境者即覺非眚中也受用世界即器世間也以本覺明心非著世間非出世間故世界身心相在塵域而超然塵外也例彼妄業下展轉例明十方衆生同業別業虗妄見相亦復如是又中觀論云大聖說二業思與從思生是業別相中種種分別說又淨印法門經云菩薩於一切智無所依著隨順緣生之法如實覺了無因無緣不斷不常遠離邊見故淨名云世間出世間為二世間性空即是出世間於其中不入不出是為入不二法門阿難汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合阿難吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性而自疑惑證菩提心和合起者則汝今者妙淨見精為與明和為與暗和為與通和為與塞和若明和者且汝觀明當明現前何處雜見見相可辨雜何形象若非見者云何見明若即見者云何見見必見圓滿何處和明若明圓滿不合見和見必異明雜則失彼性明名字雜失明性和明非義彼暗與通及諸羣塞亦復如是復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合若明合者至於暗時明性已滅此見即不與諸暗合云何見暗若見暗時不與暗合與明合者應非見明既不見明云何明合了明非暗彼暗與通及諸羣塞亦復如是六和合次破和合之見和如水乳合如函蓋雜如金沙所云因緣和合者婆沙論云近是因遠是緣近則和合遠則不和合因親緣疏故分二義資中曰若明和下明屬前相見屬內心齊何處所而論其雜見之與相目擊可分明見相雜作何形像溫陵若非下謂明若非見則不能見明明若即見誰為能見疏所云見者則必異于明方云有見若兩相參雜則見與明名字俱失豈得為見明哉性即見也雜則既失明性兩名則知謂見和明不成義理復次下別推合義和則雜而不辨合則附而不離既不離明應無見暗今既見暗則非合明又中觀論破染相而不說和者應知和即染義阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶佛言汝今又言覺非和合吾復問汝此妙見精非和合者為非明和為非暗和為非通和為非塞和若非明和則見與明必有邊畔汝且諦觀何處是明何處是見在見在明自何為畔阿難若明際中必無見者則不相及自不知其明相所在畔云何成彼暗與通及諸羣塞亦復如是又妙見精非和合者為非明合為非暗合為非通合為非塞合若非明合則見與明性相乖角如耳與明了不相觸見且不知明相所在云何甄明合非合理彼暗與通及諸羣塞亦復如是阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得七非和合溫陵和則同而無畔不和則異而有畔且求畔不得非非和矣吳興非和約體不相入故以際畔求之非合約處各異位故以乖角破之疏中觀論云見可見見者是三各異方如是三法異終無有合時已上七義皆以互簡偏情互明中道忘然存然逈超言謂而無生之理顯矣故中觀論云諸法不自生亦不從他生不共不無因是故說無生汝猶下結歸圓實既當生隨滅則幻妄名相無容稱謂矣其性真為妙覺明體者以明幻相雖妄其性則真故佛性論說生滅斷常等八遣相門皆有真如實性也言生滅去來本如來藏常住妙明者由離生滅斷常之見而得圓妙藏性之體故淨印經云相即是生無相即滅若無相無無相則諸法本來常住法界無壞真如無動實際不變是則解了緣生之法現證實際無為真理又起信論是心生滅因緣相能示摩訶衍相用故釋曰既知生滅去來皆真如之相用則知妙圓真性含裹三世可謂如來藏性無有終窮故曰性真常中求於去來迷悟生死皆不可得斯則圓極之妙談稱性之玄旨也五如來藏性之一五陰疏從五陰六入至七大等皆明藏性所言藏者蘊攝為義恆沙德用總在其中百千法門皆由此起是以神謨繼闡庶開幽奧今明此體略有二義一如來義二藏性義如來者有四種一佛性論云謂從自性來至故名如來此如來者約本覺法身說故二成實云乘如實道來成正覺故曰如來此如來者約始覺報身如來說故三涅槃云所說不變名曰如來如十二部經三世諸佛皆如是說此如來者約後得智化身如來說故四今言如來藏妙真如性者合體用諸法說故二釋藏性略有三義即體相用三大之法佛性論總以如來藏性為體通攝凡聖因果性故故顯體分云如來藏有三義一所攝義謂如如性如如者即妙真性也此義屬因攝衆生體故二隱覆義謂衆生如來性隱不現此隱覆者即五陰體五陰者隱覆義故三能攝義謂果地功德此指出纏如來藏故此三藏者總顯體大義也言相大者辨相品云佛性種相有十義一自體相耶自然性二因相三緣相即因緣性四事相即七大性五總相即藏體性六別相即入處界性七位相即色空性八遍相即周遍法界性九無變相即清淨本然性十無差別相即妙真如性三用大者即體用交作繁興為用若依漸次釋者謂體相用三由顯示義邊理無頓設是則經談五陰所以顯於體空入處七大所以攝乎相用又經廣推因緣生滅去來之相者所以顯即相之真言本如來藏妙真如性者融即真之妄故起信云是心真如相即示摩訶衍體故是心生滅因緣相能示摩訶衍相用故又云體大者謂一切法真如平等相大者謂如來藏具性功德用大者謂能生世間善惡因果阿難云何五陰本如來藏妙真如性阿難譬如有人以清淨目觀晴明空唯一晴空逈無所有其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相色陰當知亦復如是阿難是諸狂華非從空來非從目出如是阿難若空來者既從空來還從空入若有出入即非虗空空若非空自不容其華相起滅如阿難體不容阿難若目出者既從目出還從目入即此華性從目出故當合有見若有見者去既華空旋合見眼若無見者出既翳空旋當翳眼又見華時目應無翳云何晴空號清明眼是故當知色陰虗妄本非因緣非自然性俱舍云諸有為法和合聚集是為蘊義此義有三辨中邊論云一非一義謂過現等色略為一聚二總略義謂一切諸色略為一聚三分段義謂各別安立色等相故譬如下釋色陰所起也空喻藏體本淨華喻色陰虗妄言不動目睛者喻取著之相也是諸下言華從空有則空不生華若是從眼生則眼非有翳故圓覺云非唯惑此虗空實性亦復迷彼實華生處溫陵若有出入則有實體故非虗空非空則實故如阿難體更無所容若華從目出則得目之性故應有見今旋時既不見眼又不翳眼非目出矣又若華從目出則華在空時其目已應無翳何待須見晴空無華方號清明眼耶阿難譬如有人手足宴安百骸調適忽如忘生性無違順其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相受陰當知亦復如是阿難是諸幻觸不從空來不從掌出如是阿難若空來者既能觸掌何不觸身不應虗空選擇來觸若從掌出應非待合又掌出故合則掌知離則觸入臂腕骨髓應亦覺知入時踪跡必有覺心知出知入自有一物身中往來何待合知要名為觸是故當知受陰虗妄本非因緣非自然性疏受想等蘊義同前釋謂過現等受略為一聚名受蘊等溫陵納境於心曰受宴安調適喻藏性本無諸受由妄情引起也若空來者謂空體常遍不應有擇掌當自出不應有待阿難譬如有人談說酢梅口中水出思踏懸崕足心酸澀想陰當知亦復如是阿難如是酢說不從梅生非從口入如是阿難若梅生者梅合自談何待人說若從口入自合口聞何須待耳若獨耳聞此水何不耳中而出想踏懸崖與說相類是故當知想陰虗妄本非因緣非自然性疏成實論云受想行等皆心差別如道品中一念五名溫陵人談梅而口水耳不能談則計梅出者妄也耳聞梅而心想口不能聞則計口入者妄也阿難譬如瀑流波浪相續前際後際不相踰越行陰當知亦復如是阿難如是流性不因空生不因水有亦非水性非離空水如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺若因水有則此瀑流性應非水有所有相今應現在若即水性則澄清時應非水體若離空水空非有外水外無流是故當知行陰虗妄本非因緣非自然性行因識生從妙湛流出而明暗色空皆八識真體故以空水為難若行因空生則空當流動若因水有則流與水應為二物又瀑流性應不是水而瀑流性未嘗非水也有所有相者資中曰能有是水所有是流二相若殊俱應現在疏又若此瀑流即水性者則瀑流滅性亦應滅而波瀾滅則為澄水性既不滅則此瀑流非水性也溫陵空非有外水流其間水外無流流終依水則瀑流性非離空水矣阿難譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國識陰當知亦復如是阿難如是虗空非彼方來非此方入如是阿難若彼方來則本瓶中既貯空去於本瓶地應少虗空若此方入開孔倒瓶應見空出是故當知識陰虗妄本非因緣非自然性疏論云總攝八種識名為識蘊按俱舍謂識最微細總取境相難分別故者約第八說故孤山瓶喻妄業空喻妄識業牽識走如瓶擎空行捨身受身喻以遠行現陰如此國後陰如他國溫陵性空真覺周遍法界一迷為識故如瓶中之空內外一空喻性識一體塞其兩孔喻妄分同異也空無來往不可擎餉喻性無生滅亦無捨受今言擎餉者比迷性為識妄隨流轉之狀也疏毗婆沙云遠行是心業即第八識續生心也第八名藏識按楞伽以藏識為如來藏謂若無藏識名如來藏者則無生滅然諸聖人皆有生滅故云生滅去來本如來藏也今應更釋五陰差別俱舍云色謂總名分別則有十色即眼界色界乃至觸界受有三種苦樂及捨分別則有六受即眼受等想謂取像男女長短分別則有六想當如受說有為名行分別有六思身行名造作思是業性總取境相為識分別則有六識謂眼等識即此所說受想行蘊及無表色三種無為於處門中說名法處於界門中立為法界疏今並釋法界者華嚴云應觀法界性一切惟心造俱舍云造是因義謂法界一分無表業色是所造故又界是種子等義如十八界說中邊論云由聖法因義說為法界此中界者即是因義俱舍云法界一分是見有所緣故十八界中全是無常准法界一分無為是常釋曰已上通釋染淨法界也疏又法界無差別論云清淨法性即是法界佛性論云由修習三種因故一切如來唯法界勝謂修大乘定慧大悲三因此顯法界是熏生故俱舍云法界唯一剎那生謂從無漏苦法忍一剎那中生佛性論云初地獲理量二智得通達法界理故又俱舍云法界是等流生從同類因遍行因所生亦果報生非增長生無礙法界非增長故法界攝無為性惟是同分由無邊意識非已生當生故由聖人剎那生心於第二剎那皆成境界緣一切境無不周遍是故法界恆名同分餘十七界各有同分及彼同分故釋淨法界竟應釋因熏習者佛地論云以淨法界離名言故然諸法教亦不唐捐是證法界展轉因故由此教法是諸如來大悲所流能展轉證離言說義如以衆彩彩畫虗空甚為希有鎮澄讚曰發明見性直示緣塵若能轉物即能仁離指自觀心妙覺常春五陰本來真傳如截流曰爾時阿難及諸大衆蒙佛示誨自陳開悟者即了達客塵主空之義也誠能悟此則身心真妄虗實現前生滅及不生滅復何所疑但阿難所以為悟者一為世尊所捱逼一傍陳如之齒唇正謂依他作解反省猶迷故願顯出二義冀以發明也及匿王所陳觀河不變之見雖屬見精其體元真即前觀光本無動靜之見耳了此見體本無動靜亦如佛手本無正倒於無正倒而正倒立即無生滅而生滅起生滅起而照性亡故曰晦昧只此晦昧為空為色色雜妄想而五陰之軀備焉如是則根由塵隔智逐情昏雖承如來如是法音現以緣心允所瞻仰此心既緣色聲而有即非常住之主故世尊復標指外之月示無還之性擴心見齊物我一撤真妄是非之藩直造妙淨常遍之境故寄酬文殊云十方如來自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是言汝今觀見與塵種種發明名為妄想不能於中出是非是者由迷己逐物是非迭生也由是真精妙覺明性發明故能令汝出指非指者由達境即心是非雙亡也以上總答阿難身心真妄二發明性之問耳阿難言誠如法王所說覺緣遍滿十方湛然法住性非生滅者蓋領上見性常遍無是無非之旨也言與娑毗迦羅所談冥諦及諸外道說有真我遍滿十方有何差別者以梵志所計濫真故須甄別也阿難雖矯外道自然之失不自知其所執因緣亦非蓋覺精明見本非明暗塞空所能有故不可言因此而緣彼也汝復應知見見之時見非是見者言此真見不獨離浮塵根四種之外塵且離見精明元也然此見精尚遣餘復何言故曰見猶離見見不能及云何復說因緣自然及和合相阿難於是重增迷悶者蓋見見既進於見精覺覺始離乎覺眚故世尊先舉別業一時易知之眚影以開慶喜積劫難了之見緣故云例汝今日以目觀見山河國土及諸衆生皆是無始見病所成然能覺此見聞覺知悉皆是妄者何嘗為妄所終覆故言覺所覺眚覺非眚中惟覺超眚外方知眚妄故曰此實見見云何復明覺聞知見者責其未達現前身心本如空華無當見見之體也言彼見真精至故不名見者所謂見者可見而見見者不可見有云盡大地是沙門隻眼者知言哉此下若同若別交互具顯展轉推廣使悟十方法界凡所有相皆是虗妄故曰例閻浮提乃至十方諸有為國及諸衆生同是覺明無漏妙心見聞覺知虗妄病緣和合妄生和合妄死然由有見聞覺知之妄因遂有根身器界之妄緣因緣和合一切妄計生死死生浩然無極若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨妙體本覺常住惜阿難和合之疑未釋世尊重約四義辨之更廣陳諸相者務令遣情必盡柝法無遺也浮塵諸幻化相當處出生隨處滅盡者如言初生即有滅也幻妄稱相者物無當名之實也實惟一真故曰其性真為妙覺明體如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅者躡總以開別也殊不能知生滅去來本如來藏妙真如性者背覺合塵故也性真常中求於去來迷悟生死了無所得者所謂實際理地生佛并忘也色受想行識通為妙心區宇故曰五陰音釋胝音支殞于敏切腠倉奏切頽徒回切耄音帽殂才枯切瞪澄應切瞢莫鄧切瞬音舜瀛音嬴渤音勃𡋯蒲沒切紆一俱切廡音武確克角切柝先的切悚音聳懾之涉切鮮音鮮甄稽延切撮倉活切秪音支眚所景切揑乃結切暈音運只藏本秪字今依會解而書聲義異後同適陟革切玦音決彗徐醉切霓研奚切逈戶頂切澀色入切腕烏貫切酢倉故切踏徒合切瀑薄報切餉式亮切
