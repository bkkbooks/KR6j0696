body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第五發心之餘文六阿難白佛言世尊如來雖說第二義門今觀世間解結之人若不知其所結之元我信是人終不能解世尊我及會中有學聲聞亦復如是從無始際與諸無明俱滅俱生雖得如是多聞善根名為出家猶隔日瘧惟願大慈哀愍淪溺今日身心云何是結從何名解亦令未來苦難衆生得免輪回不落三有作是語已普及大衆五體投地雨淚翹誠佇佛如來無上開示初無明根本疏已說第二義門將明第一義諦圓明顯德故問解結因緣而為此經發起所結之元即無明本根也此根本無明乃第一義諦中所治之惑始無所始故謂之無始言俱滅俱生者以積迷不覺而為生住異滅妄想所遷如聲聞善根名雖出家而根本之惑猶然未斷愈而還發故為隔日之瘧是以殷求解結冀無上開示釋曰按起信生住異滅四相無明以凡夫覺滅相聲聞覺異相乃至滿足方便位菩薩覺生相猶是未覺以未能離念故是則阿難言俱生俱滅者以無明果相言之也佛以立知見為本者以無明因相言之也知見謂增益損減諸邊等見即以此體為無明性故五蘊論云邊見者障中道以出離為業即今經無明也今應總釋無明體者謂無明者即是愚癡故俱舍以癡為無明故唯識以愚為無明故又無明者即不了知等婆沙以不達不解不了知為無明故釋曰論說無明者謂三界無知按成實云謂不知過去世等不知色等及無常等故名為無明又無明者即是無智五蘊論以無知為無明故又無明者即是見惑五蘊論又以慢疑見等為無明又成實以不明如實及邪分別為無明或邪明故為無明又以能生煩惱因緣及邪念性皆是無明此皆見惑所攝性也又無明者即第八識三無性論云無明者即阿黎耶識為諸惑本而起三界業果故圓覺云身心等性皆是無明又師子吼經說諸取皆以無明為本又無明者即是思惑三無性論云有漏即是無明有取即是貪愛由過去煩惱已滅不可分別故總曰無明釋曰按論說取是漏家果由因已謝去故名曰漏果來在現故名曰取則知無明之體以隨愚何法即以此愚為無明故品數衆多不出三界業果之法矣爾時世尊憐愍阿難及諸會中諸有學者亦為未來一切衆生為出世因作將來眼以閻浮檀紫金光手摩阿難頂即時十方普佛世界六種震動微塵如來住世界者各有寶光從其頂出其光同時於彼世界來祇陀林灌如來頂是諸大衆得未曾有於是阿難及諸大衆俱聞十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根唯汝六根更無他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪回安樂妙常同是六根更非他物佛告阿難根塵同源縛脫無二識性虗妄猶如空華阿難由塵發知因根有相相見無性同於交蘆是故汝今知見立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物二解結根本疏爾時下答明問意摩阿難頂者顯無上開示也各放寶光者表同破無明也言生死結根及安樂妙常唯汝六根者顯無二之體也故寶積經論云明與無明無異無別為橫執謗邊顯示中道以無明即明故非他物佛告下釋成無二根塵相因而有故曰同源縛脫皆由此起故曰無二知見立知者示無明本始也知見無見者明解結之門也以靈知性見本六用之菩提但不因此增益見知以滋無明結根非別有所謂菩提涅槃矣體本真淨故中不容他此即釋成皆汝六根之旨也釋曰前已略釋無明之體今應更釋依人所斷寶性論云聲聞辟支及大力菩薩皆不離無明住地所謂漏無漏二無明為緣而起三界意生之果又瓔珞云妙覺地中所斷無明名不了一切法而起三界業果則知三乘與佛所有無明皆依三界所斷也蓋無明感業非唯三乘乃至妙覺猶酬業果盡妙覺位業果方空故仁王云三賢十聖住果報唯佛一人居淨土是則三乘與佛無明雖有淺深粗細之不同皆以感果於三界為體也乃所謂生相無明住相無明者即三界業果生滅之性由修斷位中分劑頭數而覺觀之智有淺深漸次之異至妙覺位業果俱空生相乃盡是謂生相無明始盡也若約諸位所斷有三十生故仁王云圓智無相三界王三十生盡等大覺又仁王云一切衆生煩惱業果報不出三界諸佛應化亦不出三界三界外無衆生佛何所化故佛說一切衆生三界業果報若盡者即名為佛然經云知見立知即無明本者而知見亦不出三界法也爾時世尊欲重宣此義而說偈言真性有為空緣生故如幻無為無起滅不實如空華言妄顯諸真妄真同二妄猶非真非真云何見所見中間無實性是故若交蘆結解同所因聖凡無二路解即聖結即凡汝觀交中性空有二俱非迷晦即無明發明便解脫解結因次第六解一亦亡根選擇圓通入流成正覺二破執明中疏真性下破執以顯明法體者婆沙云有為無為俱通勝義世俗諦攝小品云如來名無所住不住有為性不住無為性即離二邊義也故淨名云有為無為二若離一切數心如虗空以清淨慧無所礙者是為入不二法門然佛地論云大覺池中無邊功德有為無為二種所攝但諸行者邊執未亡起有為無為之見故掌珍論釋此頌義有兩重比量皆為破執謂論云有為無為二所知境愚夫不覺諦理妄執諸法自性差別有為者謂眼等十一處今以真性立宗真義自體說名真性即勝義諦故立為空非謂世俗諸緣生法皆無自性亦即是空亦皆無生釋曰此即第七比量也論又曰今當遣除朋黨毒執住處中慧無為者即虗空擇滅非擇滅及真如性亦就真性故無有實為宗即此所立就真性故無實虗空二宗皆許為不起故此二比量元無異品此審定言諸不起者皆無有實非審定言諸無實者悉皆不起雖復勤勇所發不遍同品亦許為宗故此無過釋曰此即第二比量也言妄下頌真妄無二交中則離于二邊故曰俱非以蘆喻者明執一則不立也迷晦發明頌縛脫無二淨明云生死涅槃為二若見生死性則無生死無縛無脫是為入不二法門陀那微細識習氣成暴流真非真恐迷我常不開演自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立是名妙蓮華不淨不污金剛王寶覺如幻三摩提彈指超無學此阿毗達磨無比法十方薄伽梵一路涅槃門四頌明惑本溫陵陀那下頌根結初起之由也陀那此翻執持執持種子發起現行即第八黎耶含藏種子為習氣積生識浪為暴流湛由是分結由是起也此識依真如合生滅雜乎真妄之間故曰真非真也若以為真恐迷妄習而自誤以為非真恐迷自性而外求故權小教中皆不開演也深密經曰阿陀那識甚微細一切種子成暴流我於凡愚不開演恐彼分別執為我外道所執神我即此識也疏今應總釋此識體者一雜集云阿陀羅者謂令相續及持諸根佛性論云意即阿陀羅五蘊論云阿賴耶亦名阿陀羅釋曰按成業論云以能續後有及執持名阿陀羅能攝藏種子名阿賴耶能酬業果名為異孰則知諸識皆隨義之名也暴流者即生滅性從習所生而說有多種如金剛經三心不可得義淨本云心陀羅者說名無持由無持故心遂流轉而陳譯以流轉為相續隋譯以相續為流注故知暴流者即相續等義也由此識性全離取捨但是自心故譬為妙蓮華者染淨無妨無所住著言金剛王覺者斷結摧邪究竟堅固此大定法門非幻無以為譬故云如幻正受聖足所履其乘無二故云一路也於是阿難及諸大衆聞佛如來無上慈誨指前偈祇夜伽陀雜糅精瑩妙理清徹心目開明歎未曾有阿難合掌頂禮白佛我今聞佛無遮大悲博濟性淨妙常真實法句心猶未達六解一亡舒結倫次惟垂大慈再愍斯會及與將來施以法音洗滌沈垢即時如來於師子座整涅槃僧斂僧伽梨攬七寶几引手於几取劫波羅天所奉華巾於大衆前綰成一結示阿難言此名何等阿難大衆俱白佛言此名為結於是如來綰疊華巾又成一結重問阿難此名何等阿難大衆又白佛言此亦名結如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等阿難大衆亦復如是次第酬佛此名為結佛告阿難我初綰巾汝名為結此疊華巾先實一條第二第三云何汝曹復名為結阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一結名若百綰成終名百結何況此巾秪有六結終不至七亦不停五云何如來秪許初時第二第三不名為結佛告阿難此寶華巾汝知此巾元止一條喻真體本空我六綰時名有六結汝審觀察巾體是同真體無二因結有異六用妄分於意云何初綰結成名為第一如是乃至第六結生吾今欲將第六結名成第一不不也世尊六佶若存斯第六名終非第一縱我歷生盡其明辨如何令是六結亂名五解結次第疏祇夜云應頌又云重頌即頌上長行也伽陀云諷誦亦云略偈即孤起頌也二頌合明故曰雜糅糅米不純也涅槃僧裏衣僧伽黎大衣劫波羅時分天也吳興同謂一真之性理本無差譬巾之體也異謂六根之情事用有別如巾之結也疏巾譬真體無二結喻六用妄分故第六名終非第一即如眼根之名不可作耳等矣若樂成一體莫非解除結惑不生則同異圓泯故有下文解結之喻佛言如是六結不同循顧本因一巾所造令其雜亂終不得成則汝六根亦復如是畢竟同中真性生畢竟異六根佛告阿難汝必嫌此六結不成願樂一成復云何得阿難言此結若存是非鋒當作蜂起於中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此尚不名一六云何成佛言六解一亡亦復如是由汝無始心性狂亂知見妄發根結之由發妄不息勞見發塵如勞目睛則有狂華於湛精明無因亂起一切世間山河大地生死涅槃皆即狂勞顛倒華相阿難言此勞同結云何解除如來以手將所結巾偏掣其左喻邊見問阿難言如是解不不也世尊旋復以手偏牽右邊喻邊見又問阿難如是解不不也世尊佛告阿難吾今以手左右各牽竟不能解汝說方便云何解成阿難白佛言世尊當於結心解即分散喻觀中道則二邊俱解佛告阿難如是如是若欲除結當於結心阿難我說佛法從因緣生非取世間和合粗相如來發明世出世法六凡四聖知其本因隨所緣出如是乃至恆遠沙界外一滴之雨亦知頭數現近前種種松直棘曲鵠白烏玄皆了元由是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待阿難吾今問汝此劫波羅巾六結現前同時解縈得同除不不也世尊是結本以次第綰生今日當須次第而解六結同體結不同時則結解時云何同除佛言六根解除亦復如是此根初解先得人空空性圓明成法解脫解脫法已俱空不生是名菩薩從三摩地得無生忍六正陳解結疏無始知見正示根結之由狂華謂無而妄有結者系而不解之義也左右牽巾喻生死涅槃之二邊行人執而不解故如雙結然當於結心解即分散喻觀中道則二邊俱解知其本因從所緣出乃至恆沙雨滴亦知頭數者此明如來覺法皆盡證其所說皆誠諦語圓覺云禪那名數門故大千界主居四禪之極能知恆沙雨滴則松直棘曲皆了緣由者即所知障盡故能學法之實也此根下結成三觀修證始從初解六根而獲人空從人空而證法空從法空而證俱空以明三觀修進漸次法如是故成實云佛法初不頓深猶如大海皆所以示漸次之義也故首楞嚴三昧經云學首楞嚴三昧者先學愛樂心次學深心如是漸增乃至得無生法忍諸佛授記能入第八地又復漸增乃至具十地受佛職位得一切菩薩三昧然後得首楞嚴三昧復引喻云如人學射先射大准次學射的能射的已次學射杖乃至能射百毛之一於是結云是名善射隨意不空復云是人若於夜中聞人音聲若人非人不用心力射之皆中此楞嚴三昧漸次之義也四說圓通分此下究圓通本根阿難及諸大衆蒙佛開示慧覺圓通得無疑惑一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙雖復悟知一六亡義然猶未達圓通本根世尊我輩飄零積劫孤露何心何慮預佛天倫如失乳兒忽遇慈母再見若復因此際會道成所得密言還同本悟則與未聞無有差別惟垂大悲惠我祕嚴成就如來最後開示作是語已五體投地退藏密機冀佛冥授爾時世尊普告衆中諸大菩薩及諸漏盡大阿羅漢汝等菩薩及阿羅漢生我法中得成無學吾今問汝最初發心悟十八界誰為圓通從何方便入三摩地疏五陰六入十八界本如來藏妙真如性佛欲將顯諸菩薩萬行首楞嚴故寄選根令二十五聖間衆妙之門顯彼無非正修即一一門莫不究竟圓通真實所以革小成於後心根大衍於初會者也溫陵慧覺圓通存乎一心已蒙開示故身心皎然圓通本根冥乎萬法猶未通達故冀佛冥授憍陳那五比丘即從座起頂禮佛足而白佛言我在鹿苑及於雞園觀見如來最初成道於佛音聲悟明四諦生住異滅佛問比丘我初稱解如來印我名阿若多妙音密圓我於音聲得阿羅漢佛問圓通如我所證音聲為上疏從於音塵默悟圓理此依內證故名曰密即如如智證境自性也一塵密證諸塵圓契故曰圓通優婆尼沙陀即從座起頂禮佛足而白佛言我亦觀佛最初成道觀不淨相生大厭離悟諸色性以從不淨白骨微塵歸於虗空空色二無成無學道如來印我名尼沙陀塵色既盡妙色密圓我從色相得阿羅漢佛問圓通如我所證色因為上溫陵優婆尼沙陀亦云塵性微塵是色之少分因塵悟解故得此名由多貪欲佛令作不淨觀也香嚴童子即從座起頂禮佛足而白佛言我聞如來教我諦觀諸有為相我時辭佛宴晦清齊見諸比丘燒沈水香香氣寂然來入鼻中我觀此氣非木非空非煙非火去無所著來無所從由是意銷發明無漏如來印我得香嚴號塵氣倐滅妙香密圓我從香嚴得阿羅漢佛問圓通如我所證香嚴為上疏非木等者觀中道也非木則不住有非空則不住無有無俱非中道顯矣藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言我無始劫為世良醫口中嘗此娑婆世界草木金石名數凡有十萬八千如是悉知苦酢醎淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能遍知承事如來了知味性非空非有非即身心非離身心分別味因從是開悟蒙佛如來印我昆季藥王藥上二菩薩名今於會中為法王子因味覺明位登菩薩佛問圓通如我所證味因為上吳興空有味塵也身心舌識也味非空故非離身心味非有故非即身心跋陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言我等先於威音王佛聞佛出家於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有宿習無忘乃至今時從佛出家令得無學彼佛名我跋陀婆羅妙觸宣明成佛子住佛問圓通如我所證觸因為上吳興水因謂所觸之因塵體即能觸之緣塵境無染體亦常淨能所如幻二邊俱空故中間覺觸之心安然契性疏勝思惟經論云何名跋陀婆羅等名大賢士以為示現心行勝故謂教化衆生等摩訶迦葉及紫金光比丘尼等即從座起頂禮佛足而白佛言我於往劫於此界中有佛出世名日月燈我得親近聞法修學佛滅度後供養舍利燃燈續明以紫光金塗佛形像自爾以來世世生生身常圓滿紫金光聚此紫金光比丘尼等即我眷屬同時發心我觀世間六塵變壞唯以空寂修於滅盡身心乃能度百千劫猶如彈指我以空法成阿羅漢世尊說我頭陀為最妙法開明銷滅諸漏佛問圓通如我所證法因為上疏頭陀有十二行今則以抖擻法塵為號也以紫金塗佛感報如此因深果茂其理宜然阿那律陀即從座起頂禮佛足而白佛言我初出家常樂睡眠如來訶我為畜生類我聞佛訶啼泣自責七日不眠失其雙目世尊示我樂見照明金剛三昧我不因眼觀見十方精真洞然如觀掌果如來印我成阿羅漢佛問圓通如我所證旋見循元斯為第一疏樂見照明金剛三昧即不因眼根見色者也旋映色之性循真精之元周利槃特迦即從座起頂禮佛足而白佛言我闕誦持無多聞性最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前佛愍我愚教我安居調出入息我時觀息微細窮盡生住異滅諸行剎那其心豁然得大無礙乃至漏盡成阿羅漢住佛座下印成無學佛問圓通如我所證反息循空斯為第一疏寶積經云愚癡報有多種因謂吝惜法故得不聞障報依不聞故得愚癡報於現法中不生正解及於未來衆緣不具或復有義若請不請一向不說棄捨正法或妬心倒說如是障法因緣令生難處憍梵鉢提即從座起頂禮佛足而白佛言我有口業於過去劫輕弄沙門世世生生有牛呞病如來示我一味清淨心地法門我得滅心入三摩地觀味之知非體非物應念得超世間諸漏內脫身心外遺世界遠離三有如鳥出籠離垢銷塵法眼清淨成阿羅漢如來親印登無學道佛問圓通如我所證還味旋知斯為第一疏波提口如牛哨乃輕弄報佛為遮謗以數珠念佛是為一味心地法門畢陵伽婆蹉即從座起頂禮佛足而白佛言我初發心從佛入道數聞如來說諸世間不可樂事乞食城中心思法門不覺路中毒刺傷足舉身疼痛我念有知知此深痛雖覺覺痛覺清淨心無痛痛覺我又思惟如是一身寧有雙覺攝念未久身心忽空三七日中諸漏虗盡成阿羅漢得親印記發明無學佛問圓通如我所證純覺遺身斯為第一疏無痛痛覺即清淨覺心痛不能及之地不可樂事即無常苦空等之法門由繫念故因刺足而悟空又三七日諸漏虗盡者始因頓悟乘悟並消也須菩提即從座起頂禮佛足而白佛言我曠劫來心得無礙自憶受生如恆河沙初在母胎即知空寂如是乃至十方成空亦令衆生證得空性蒙如來發性覺真空空性圓明得阿羅漢頓入如來寶明空海同佛知見印成無學解脫性空我為無上佛問圓通如我所證諸相入非非所非盡旋法歸無斯為第一疏諸相入非非者空也非所非盡能空所空皆盡也故曰旋法歸無無者即空之異稱舍利弗即從座起頂禮佛足而白佛言我曠劫來心見清淨如是受生如恆河沙世出世間種種變化一見則通獲無障礙我於中路逢迦葉波兄弟相逐宣說因緣悟心無際從佛出家見覺明圓得大無畏成阿羅漢為佛長子從佛口生從法化生佛問圓通如我所證心見發光光極知見斯為第一吳興世出世間四諦之境也種種變化生滅之相也由眼識明利故一見斯通普賢菩薩即從座起頂禮佛足而白佛言我已曾與恆沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名世尊我用心聞分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我與其人暗中摩頂擁護安慰令其成就佛問圓通我說本因心開發明分別自在斯為第一疏普賢亦曰遍吉以等覺位後無行不修無德不備故曰普賢以心聞者法華云我於寶威德上王佛國遙聞此娑婆世界說法華經以心聞也又普賢現身安慰等如普賢觀經中所說孫陀羅難陀即從座起頂禮佛足而白佛言我初出家從佛入道雖具戒律於三摩地心常散動未獲無漏世尊教我及拘絺羅觀鼻端白我初諦觀經三七日見鼻中氣出入如煙身心內明圓洞世界遍成虗淨猶如琉璃煙相漸銷鼻息成白心開漏盡諸出入息化為光明照十方界得阿羅漢世尊記我當得菩提佛問圓通我以銷息息久發明明圓滅漏斯為第一疏陀以散心故而觀鼻息所以行對治也蓋數息所以發識觀息所以駐識富樓那彌多羅尼子即從座起頂禮佛足而白佛言我曠劫來辨才無礙宣說苦空深達實相如是乃至恆沙如來祕密法門我於衆中微妙開示得無所畏世尊知我有大辨才以音聲輪教我發揚我於佛前助佛轉輪因師子吼成阿羅漢世尊印我說法無上佛問圓通我以法音降伏魔怨銷滅諸漏斯為第一溫陵說法第一辨才無礙因以降魔滅漏皆舌識力也優波離即從座起頂禮佛足而白佛言我親隨佛踰城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏承佛教戒如是乃至三千威儀八萬微細性業遮業悉皆清淨身心寂滅成阿羅漢我是如來衆中綱紀親印我心持戒修身衆推為上佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一疏俱舍云染汙心名性罪假制罪名遮罪如以酒制戒是也依身有識故先從執身次第執心大目犍連即從座起頂禮佛足而白佛言我初於路乞食逢遇優樓頻螺迦耶那提三迦葉波宣說如來因緣深義我頓發心得大通達如來惠我袈裟著身鬚髮自落我遊十方得無罣礙神通天心慧性發明推為無上成阿羅漢寧唯世尊十方如來歎我神力圓明清淨自在無畏佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一疏意為諸法生因萬法緣此以通故聞因緣頓發神通論以神境通亦云如意成境是也烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言我常先憶久遠劫前性多貪欲有佛出世名曰空王說多淫人成猛火聚教我遍觀百骸四肢諸冷暖氣神光內凝化多淫心成智慧火從是諸佛皆呼召我名為火頭我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔冤護法佛問圓通我以諦觀身心暖觸無礙流通諸漏既銷生大寶𦦨摧魔登無上覺斯為第一疏百骸暖氣暖氣火也力士以呵護為道即三門火首金剛然此經法門精粗無二故塵勞欲火俱證圓通持地菩薩即從座起頂禮佛足而白佛言我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土如是勤苦經無量佛出現於世或有衆生於闤闠處要人擎物我先為擎至其所詣放物即行不取其直毗舍浮佛現在世時世多饑荒我為負人無問遠近唯取一錢或有車牛被於泥溺我有神力為其推輪拔其苦惱時國大王延佛設齊我於爾時平地待佛毗舍如來摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別微塵自性不相觸摩乃至刀兵亦無所觸我於法性悟無生忍成阿羅漢回心今入菩薩位中聞佛如來宣妙蓮華佛知見地我先證明而為上首佛問圓通我以諦觀身界二塵等無差別本如來藏虗妄發塵塵銷智圓成無上道斯為第一疏俱舍云微塵性體不相觸同於空也故悟此實性而刀兵無所觸古今注云闤市垣闠市門月光童子即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地觀於身中水性無呌奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一應同見水身中與世界外浮幢王剎諸香水海等無差別我於是時初成此觀但見其水未得無身當為比丘室中安禪我有弟子窺窗觀室唯見清水遍在室中了無所見童稚無知取一瓦礫投於水內激水作聲顧盻而去我出定後頓覺心痛如舍利弗遭違害鬼我自思惟今我已得阿羅漢道久離病緣因何今日忽生心痛將無退失爾時童子捷來我前說如上事我則告言汝更見水可即開門入此水中除去瓦礫童子奉教後入定時還復見水瓦礫宛然開門除出我後出定身質如初逢無量佛如是至於山海自在通王如來方得亡身與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一疏初成水觀復逢無量佛乃得亡身以明聖道長遠乃可成就然聖人皆有身苦有無不定故十二緣不立病文琉璃光法王子即從座起頂禮佛足而白佛言我憶往昔經恆沙劫有佛出世名無量聲開示菩薩本覺妙明觀此世界及衆生身皆是妄緣風力所轉我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別我時覺了此羣動性來無所從去無所至十方微塵顛倒衆生同一虗妄如是乃至三千大千一世界內所有衆生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂閙逢佛未幾得無生忍爾時心開乃見東方不動佛國為法王子事十方佛身心發光動徹無礙佛問圓通我以觀察風力無依了妄悟菩提心達真入三摩地證圓通合十方佛同佛果傳一妙心化衆生斯為第一疏琉璃光風觀逢無量聲佛亦猶月光水觀承事水天以表師資一道用而不雜則今諸家教觀多務圓攝失其旨矣虗空藏菩薩即從座起頂禮佛足而白佛言我與如來定光佛一本佛字作向所得無邊身爾時手執四大寶珠照明十方微塵佛剎化成虗空又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來入鏡內涉入我身身同虗空不相妨礙身能善入微塵國土廣行佛事得大隨順此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍佛問圓通我以觀察虗空無邊入三摩地妙力圓通斯為第一疏空體無邊故得無邊之身為顯此明遍圓一切手執四珠照十方際空能顯物為大圓鏡虗空無二為同佛國也彌勒菩薩即從座起頂禮佛足而白佛言我憶往昔經微塵劫有佛出世名日月燈明我從彼佛而得出家心重世名好遊族姓爾時世尊教我修習唯心識定入三摩地歷劫以來以此三昧事恆沙佛求世名心歇滅無有至然燈佛出現於世我乃得成無上妙圓識心三昧乃至盡空如來國土淨穢有無皆是我心變化所現世尊我了如是惟心識故識性流出無量如來今得授記次補佛處佛問圓通我以諦觀十方唯識識心圓明入圓成實遠離依他及遍計執得無生忍斯為第一疏識性不守如如而外分別名相是遊族姓而求名也故今瑜伽唯識差別名相皆從慈氏演出又此三性者有多不同密嚴云妄立種種名是為遍計性衆生若諸法此悉依他性三無性論云塵即分別性識即依他性如如即真實性又塵名無相性識名無生性如如名無性此經論各有所立也大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名曰香光莊嚴我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一疏勢至以見大入圓由總攝六根故但云念佛文中三喻二人喻生佛初感子母喻氣分已接染香喻法身冥會故十住毗婆沙云念佛者先念色身次念法身鎮澄讚曰六根受用生死巖阿縱今解脫更非他六解一誰河諸聖吹螺決意應高科傳如截流曰阿難詢第二義結解之元世尊摩頂佛光灌頂者表諸佛之道皆悉無上今將開示也六種震動者將解六結瑞兆也諸佛告以安樂妙常輪轉生死皆由六根更非他物者蓋離結無解故也言根塵同源縛脫無二者由塵發知則知本是幻因根有相則塵本是幻二種皆空故喻交蘆是得同源是得無二也根境既空識本不有故曰識性虗妄猶如空華如是則本無知見而知見立即無明本了無知見而知見亡斯即涅槃涅槃之體一切圓滿絶待故曰無漏真淨云何是中更容他物偈云真性者即涅槃之體也此體不同有為之空故曰真性有為空緣生故如幻者釋成空義也此體亦不同無為之無起滅故曰無為無起滅不實如空華者釋成無起滅也若以有為為妄無為為真是為言妄顯諸真妄真同二妄斯不得謂之無漏真淨之性今真妄雙遣故曰猶非真非真知無為之真尚遣況有為之妄乎故曰云何見所見見即根所見即塵根塵兩立而中虗故喻之以交蘆識居二者之間是曰交中性根塵兩非識體何在聖人了此是為解凡夫昧此是為結故曰解結同所因聖凡無二路也汝觀交中性者舉喻重令審詳也知交中之性未嘗因交而始有不交而後空故曰空有二俱非言迷晦即無明發明便解脫者結成聖凡無二路即知見立知等意也言解結因次第六解一亦亡者即應前一入六淨之義根選入圓通入流成正覺者應前誰為圓通及逆生死欲流之義欲流逆歸便合妙湛故成正覺知觀音因入流相成就菩提也偈指流之所自故云陀那微細識習氣成瀑流陀那此云執持即賴耶所變之初相也由賴耶受薰而起故曰習氣念念代謝其相甚微故曰瀑流後文云由生滅等於妙圓中粘湛發知浮根四塵流逸奔法者本此或疑浮根奔逸其相甚粗焉稱微細經云本自一精明分為六和合蓋從妙圓粘湛發流但舉六識而八識斯在矣此之識體言真則外道計為神我言妄則凡夫無從進修故言真非真恐迷我常不開演也世間依正全性轉變本無能所而強生計別是為自心取自心非幻成幻法此頌知見立知即無明本也不取無非幻非幻尚不生幻法云何立此頌知見無見斯即涅槃也蓮華處染而常淨華果以同時經談結解同所因聖凡無二路故名妙蓮華金剛為堅利之寶諸物莫攖其鋒今經真妄悉破故名金剛王寶覺昔也由迷而結是為生死垢濁今也由悟而解是為涅槃真淨迷悟轉變本于無住故名如幻三摩提能一達此則惑盡而真亦究故得彈指超無學如是無上之法諸聖莫不由斯故曰此阿毗達磨十方薄伽梵一路涅槃門阿難既曰祇夜伽陀雜糅精瑩偈及長行固多出入耳阿難已知解結之因而復欲知六解一亡舒結倫次佛取劫波羅巾挽結詳問令審一巾無異妄起六結倫次也初綰結成名為第一此倫次之相已定也吾今能將第六結名成第一否者令知倫次不可亂名則知六根不相為用故合法云畢竟同中成畢竟異汝必嫌此六結不成者嫌前一不成六也既嫌乎彼必樂乎此故曰願樂一成一成者一以成六也對前不成故曰復云何得此結若存是非蜂起而彼此相非者如前不可亂名也欲無彼此莫如解除故言若總解除則無彼此以彼此俱無故言尚不名一六云何成此正答願樂一成之問也尚不名一即一亡六云何成即六解故曰亦復如是言一切世間生死涅槃皆即狂勞顛倒華相者妙淨體中不獨計有為生死之為結計無為涅槃亦即是結也後文云將欲復真欲真已非真真如性者此爾解結當於結心者真妄兩亡中道觀智也我說佛法下此杜阿難之情計使知因根修證也杜計者前云解結因次第又云結解同所因是則因迷而結緣悟而解恐阿難計為世間之因緣故曰我說佛法從因緣生非取世間和合粗相佛法者佛種之法衆生計世間因緣是為凡夫之法今因入流而成正覺是為出世佛法惟得此法故於世出世法知其本因隨所緣出如是故應選擇六根一門深入而銷諸妄也已言此根初解先得人空者由逆欲流之功見思虗習於是銷落故曰人空見思雖落塵沙尚存是為法執進破此惑故曰空性圓明成法解脫塵沙雖亡尚須中觀對破無明無明若盡觀智亦亡故曰解脫法已俱空不生從三摩地得無生忍者即以如幻三昧照破三惑而真常之體於是頓顯即無得而得也既稱妙三摩地此似次第者未達三觀一體則圓亦歷別了無一三用在一時矣阿難大衆已知六解一亡故言慧覺圓通得無疑惑未示一門深入故言然猶未達圓通本根所得密言還同本悟則與未聞無有差別者慧覺雖明了無實證故須別求祕嚴乃可造修也祕嚴即隱密義阿難將謂別有祕嚴故退藏密機冀以冥授然不了前之所示根根塵塵無隱乎爾故世尊普告大衆詢以最初發心悟十八界誰為圓通從何方便入三摩地經自陳那至迦葉悟六塵次那律至空生悟六根自鶖子至目蓮悟六識自烏芻瑟摩至大勢至悟七大當知諸聖之所陳陳如來之所宣如來之所宣宣諸聖之所證差別有祕嚴可授非一路涅槃門矣至下觀之所證未越乎此為施對治悉檀故廣演勝妙之相非諸聖之所不能耳音釋瘧逆約切糅女救切攬音覽綰烏板切緝七入切績七入切績則力切掣尺列切縈於營切倐音叔呞音詩蹉倉何切隘烏介切闤音還闠胡對切推他回切液夷益切漩旬宣切澓房六切抖音斗擻音叟癃音隆稚直利切礫音歷啾即留切
